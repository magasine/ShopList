          'Empty stock',
          'Swipe an item to the right on the All tab to add it to stock'
        );
        return;
      }

      const fragment = document.createDocumentFragment();

      // Header
      // const header = createElement('div', 'stock-header', `
      //   <div class="stock-header-name">Item</div>
      //   <div class="stock-header-col">Mín.</div>
      //   <div class="stock-header-col">Atual</div>
      // `);
      // fragment.appendChild(header);

      let lastSection = '';

      for (const it of list) {
        const section = sectionKeyOf(it);
        if (section !== lastSection) {
          const label = createElement('div', 'sec-label', section);
          fragment.appendChild(label);
          lastSection = section;
        }

        const s = getStatus(it);
        const rowClass = s === 'ok' ? 'row-ok' : s === 'warn' ? 'row-warn' : 'row-crit';
        const row = createElement('div', `stock-row ${rowClass}`);

        // Name
        const nameDiv = createElement('div', 'stock-name');
        nameDiv.innerHTML = `
          <div class="item-name">${esc(it.name)}</div>
          <div class="item-sub">${esc(it.desc)}</div>
        `;
        row.appendChild(nameDiv);

        // Fav
        const favBtn = createElement('div', `fav-btn ${it.fav ? 'on' : ''}`);
        favBtn.dataset.favId = it.id;
        favBtn.innerHTML = it.fav ? ICONS.starOn : ICONS.starOff;
        favBtn.title = it.fav ? 'Remove from favorites' : 'Add to favorites';
        favBtn.onclick = () => toggleFav(it.id);
        row.appendChild(favBtn);

        // ── Helper: constrói um stepper sem handlers inline ──────────────────
        function buildStepper({ wrapClass, stepperId, initialVal, label, onChange, onStepChange }) {
          const wrap = createElement('div', `stepper-wrap ${wrapClass}`);
          const stepperEl = createElement('div', 'stepper');
          stepperEl.id = stepperId;

          const btnMinus = createElement('div', 'stepper-btn minus', '−');
          const input = createElement('input', 'stepper-val');
          const btnPlus = createElement('div', 'stepper-btn plus', '+');

          input.type = 'number';
          input.min = '0';
          input.value = initialVal;
          input.inputMode = 'numeric';
          input.onchange = (e) => onChange(e.target.value);

          stepperEl.appendChild(btnMinus);
          stepperEl.appendChild(input);
          stepperEl.appendChild(btnPlus);

          const labelEl = createElement('div', 'stepper-label', label);
          wrap.appendChild(stepperEl);
          wrap.appendChild(labelEl);

          // ── Controle de foco robusto ──────────────────────────────────────
          // Impede que o pointerdown nos botões roube o foco do input:
          // o foco permanece no input durante todo o ciclo de incremento.
          [btnMinus, btnPlus].forEach(btn => {
            btn.addEventListener('pointerdown', (e) => {
              e.preventDefault(); // evita blur do input ativo
            });
          });

          // Incremento/decremento via pointer (mouse + touch unificado)
          // Atualiza o input visualmente e chama onStepChange com o novo valor
          function doStep(delta) {
            const cur = parseInt(input.value, 10) || 0;
            const next = Math.max(0, cur + delta);
            input.value = next;
            onStepChange(next);  // passa o valor já calculado
          }
          btnMinus.addEventListener('pointerup', () => doStep(-1));
          btnPlus.addEventListener('pointerup', () => doStep(+1));

          return { wrap, input };
        }

        // Min stepper — oculto por padrão (stepper-min-wrap)
        const { wrap: minWrap, input: minInput } = buildStepper({
          wrapClass: 'stepper-min-wrap',
          stepperId: `stepper-min-${it.id}`,
          initialVal: it.min,
          label: 'min.',
          onChange: (v) => updateMin(it.id, v),
          onStepChange: (v) => updateMin(it.id, v, { silent: true }),
        });
        row.appendChild(minWrap);

        // Qty stepper — sempre visível; controla exibição do minWrap
        const { wrap: qtyWrap, input: qtyInput } = buildStepper({
          wrapClass: '',
          stepperId: `stepper-qty-${it.id}`,
          initialVal: it.qty,
          label: 'current',
          onChange: (v) => updateQty(it.id, v),
          onStepChange: (v) => updateQty(it.id, v, { silent: true }),
        });

        // ── Visibilidade do minWrap: baseada em foco real nos dois wrappers ──
        // Um único timer compartilhado evita race conditions entre focus/blur events.
        let hideTimer = null;

        function scheduleHide() {
          clearTimeout(hideTimer);
          hideTimer = setTimeout(() => {
            const active = document.activeElement;
            if (!minWrap.contains(active) && !qtyWrap.contains(active)) {
              minWrap.classList.remove('min-visible');
            }
          }, 250);
        }

        function cancelHide() {
          clearTimeout(hideTimer);
          minWrap.classList.add('min-visible');
        }

        qtyInput.addEventListener('focus', cancelHide);
        qtyInput.addEventListener('blur', scheduleHide);
        minInput.addEventListener('focus', cancelHide);
        minInput.addEventListener('blur', scheduleHide);

        // pointerdown nos botões ±  também cancela o timer de ocultação
        // (o preventDefault já está no buildStepper, aqui só garantimos o cancelHide)
        minWrap.querySelectorAll('.stepper-btn').forEach(b => b.addEventListener('pointerdown', cancelHide));
        qtyWrap.querySelectorAll('.stepper-btn').forEach(b => b.addEventListener('pointerdown', cancelHide));

        row.appendChild(qtyWrap);

        fragment.appendChild(row);
      }

      container.appendChild(fragment);
    }

    function emptyState(icon, title, sub, actionLabel = '', actionFn = '') {
      const btn = actionLabel
        ? `<div class="empty-action" onclick="${actionFn}">${actionLabel}</div>`
        : '';
      return `
        <div class="empty">

    function render() {
      updateBadges();
      updateFooter();
      renderPanel0();
      renderPanel1();
      renderPanel2();
    }

    // Salva e re-renderiza — use em mutações de dados reais
    function saveAndRender() {
      save();   // única fonte de escrita: grava savedAt, incrementa contador, atualiza badge
      render(); // re-renderiza painéis (updateBadges já foi chamado dentro de save())
    }

    function updateBadges() {
      const all = filteredItems();
      document.getElementById('badge-0').textContent = all.length;
      document.getElementById('badge-1').textContent = stockItems().length;
      document.getElementById('badge-2').textContent = buyItems().filter(it => !it._done).length;
      // Timestamp: lido direto do localStorage — fonte única da verdade
      (function () {
        const el = document.getElementById('title-sub');
        if (!el) return;
        const ts = readSavedAt();
        if (!ts) { el.textContent = ''; return; }
        const d = new Date(ts);
        if (isNaN(d)) { el.textContent = ''; return; }
        const pad = n => String(n).padStart(2, '0');
        el.textContent = `Saved at: ${pad(d.getDate())}/${pad(d.getMonth() + 1)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      })();

      // Badge de localidade do sync
      updateSyncBadge();
    }

    function updateSyncBadge() {
      const el = document.getElementById('sync-locality');
      if (!el) return;
      try {
        const meta = JSON.parse(localStorage.getItem('ShopList_driveSync') || '{}');
        const connected = (() => {
          try {
            const t = JSON.parse(localStorage.getItem('ShopList_driveToken') || 'null');
            return t && t.access_token && Date.now() < t.expires_at;
          } catch { return false; }
        })();
        // Sem arquivo/pasta vinculada → oculto
        const hasSyncTarget = meta.syncFileId || meta.folderId;
        if (!connected || !hasSyncTarget) {
          el.style.display = 'none';
          return;
        }
        // pickedManually=true sempre significa arquivo do dono → shared
        const isShared = meta.pickedManually === true || meta.folderOwnedByMe === false;
        const hasDup = !!meta.duplicateFolderId;
        if (hasDup) {
          el.textContent = '⚠ duplicate';
          el.className = 'loc-duplicate';
          el.title = 'Two sync folders detected — click to resolve';
        } else if (isShared) {
          el.textContent = '🔓 shared';
          el.className = 'loc-shared';
          el.title = 'Syncing to a file shared with you — click for details';
        } else {
          el.textContent = '🔒 owner';
          el.className = 'loc-owner';
          el.title = 'Syncing to your own folder — click for details';
        }
        el.style.display = 'inline-flex';
      } catch { el.style.display = 'none'; }
    }

    function updateFooter() {
      const addBtn = document.getElementById('add-btn');
      addBtn.style.display = currentTab === 0 ? 'flex' : 'none';
    }

    // ==================== EVENTOS E AÇÕES ====================
    function switchTab(idx) {
      currentTab = idx;
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
      document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === idx));
      syncChips();
      render();
    }

    function toggleFilterBar() {
      const bar = document.getElementById('filter-bar');
      const btn = document.getElementById('btn-traffic');
      const open = bar.classList.toggle('open');
      btn.classList.toggle('active', open);
      btn.textContent = open ? '🚥' : '🚦';

      // Ao fechar: reseta todos os filtros do grupo — crit/warn/ok e fav/fav-off
      // Segue o padrão dos demais botões: o grupo fecha = estado neutro
      if (!open && activeQuickFilter !== '') {
        activeQuickFilter = '';
        document.querySelectorAll('.filter-btn').forEach(b => b.removeAttribute('data-active'));
        syncFavBtn();   // reseta o visual do botão fav para estado default
        saveUI();
        render();
      }
    }

    function toggleSearch() {
      const bar = document.getElementById('search-bar');
      const btn = document.getElementById('btn-search');
      bar.classList.toggle('open');
      btn.classList.toggle('active');
      if (bar.classList.contains('open')) {
        document.getElementById('search-input').focus();
      } else {
        clearSearch();
      }
    }

    function onSearch() {
      const input = document.getElementById('search-input');
      searchQuery = input.value;
      // Autocomplete de categoria no campo de busca
      acOnInputSearch(input);
      render();
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      searchQuery = '';
      checkFilter = '';
      syncChips();
      // clearSearch não redefine mais o filtro fav — o botão agora está sempre
      // visível no filter-badge-group e opera independente do search bar.
      render();
    }

    // Sincroniza #fav-filter-btn (no filter-badge-group) com os 3 estados do ciclo
    function syncFavBtn() {
      const btn = document.getElementById('fav-filter-btn');
      if (!btn) return;

      const icon = btn.querySelector('.fav-filter-icon');
      if (!icon) return;

      const state = activeQuickFilter === 'fav' ? 'fav-on'
        : activeQuickFilter === 'fav-off' ? 'fav-off'
          : 'default';

      // data-state para CSS (borda/fundo)
      btn.dataset.state = state;

      // Troca classe do ícone para animar o visual
      icon.classList.remove('fav-default', 'fav-on', 'fav-off');
      icon.classList.add(state === 'default' ? 'fav-default' : state);

      // Título de acessibilidade
      const titles = {
        default: 'Favorites filter — click to show favorites only',
        'fav-on': 'Showing favorites only — click to show non-favorites',
        'fav-off': 'Showing non-favorites — click to clear filter',
      };
      btn.title = titles[state];
    }

    function applyQuickFilter(type) {
      // Limpa estado ativo de todos os botões de status
      document.querySelectorAll('.filter-btn').forEach(b => b.removeAttribute('data-active'));

      if (type === 'fav') {
        // Ciclo de 3 estados: default → fav-on → fav-off → default
        if (activeQuickFilter === '') {
          activeQuickFilter = 'fav';
          const favCount = items.filter(i => i.fav).length;
          toast(favCount > 0
            ? `⭐ ${favCount} favorite${favCount !== 1 ? 's' : ''} shown`
            : '⭐ No favorites added yet');
        } else if (activeQuickFilter === 'fav') {
          activeQuickFilter = 'fav-off';
          const nonFavCount = items.filter(i => !i.fav).length;
          toast(`✩ ${nonFavCount} non-favorite${nonFavCount !== 1 ? 's' : ''} shown`);
        } else {
          // fav-off → default
          activeQuickFilter = '';
          toast('Favorites filter cleared');
        }
      } else {
        // Filtros de status (crit/warn/ok) — comportamento original toggle on/off
        const wasActive = activeQuickFilter === type;
        if (wasActive) {
          activeQuickFilter = '';
        } else {
          // Garante que o filter-bar esteja visível ao ativar um filtro de status
          const fb = document.getElementById('filter-bar');
          const tb = document.getElementById('btn-traffic');
          if (fb && !fb.classList.contains('open')) {
            fb.classList.add('open');
            if (tb) { tb.classList.add('active'); tb.textContent = '🚥'; }
          }
          activeQuickFilter = type;
          const btn = document.querySelector(`.filter-btn[data-filter="${type}"]`);
          if (btn) btn.setAttribute('data-active', 'true');
        }
      }

      syncFavBtn();
      saveUI();
      render();
    }
    function toggleStock(id) {
      const it = items.find(i => i.id === id);
      if (!it) return;
      it.inStock = !it.inStock;
      if (!it.inStock) {
        it.qty = 0;
        it._done = false;
      }
      saveAndRender();
    }

    function toggleFav(id) {
      const it = items.find(i => i.id === id);
      if (!it) return;
      it.fav = !it.fav;

      // Micro-feedback: atualiza TODOS os botões fav deste item em qualquer painel renderizado
      document.querySelectorAll(`[data-fav-id="${id}"]`).forEach(btn => {
        btn.classList.toggle('on', !!it.fav);
        btn.innerHTML = it.fav ? ICONS.starOn : ICONS.starOff;
        btn.title = it.fav ? 'Remove from favorites' : 'Add to favorites';
        const row = btn.closest('.item-row, .stock-row, .buy-row');
        if (row) row.classList.toggle('fav-on', !!it.fav);
      });

      // Re-render completo apenas se o modo fav estiver ativo (para reordenar)
      if (sortMode === 'fav' || activeQuickFilter === 'fav') {
        saveAndRender();
      } else {
        save();
      }
      // Garante sincronização do #search-fav-btn se o filtro fav estiver ativo
      syncFavBtn();
    }

    function stepperChange(field, id, delta) {
      // Lê o valor atual do input dentro do stepper
      const stepper = document.getElementById(`stepper-${field}-${id}`);
      if (!stepper) return;
      const input = stepper.querySelector('input');
      const current = parseInt(input.value, 10) || 0;
      const next = Math.max(0, current + delta);
      input.value = next;
      if (field === 'min') updateMin(id, next);
      else updateQty(id, next);
    }

    function updateMin(id, val, { silent = false } = {}) {
      const it = items.find(i => i.id === id);
      if (it) {
        it.min = Math.max(0, parseInt(val) || 0);
        silent ? save() : saveAndRender();
      }
    }

    function updateQty(id, val, { silent = false } = {}) {
      const it = items.find(i => i.id === id);
      if (it) {
        it.qty = Math.max(0, parseInt(val) || 0);
        // Qualquer ajuste no current sugere nova necessidade de refill — restaura estado
        if (it._done) it._done = false;
        silent ? save() : saveAndRender();
      }
    }

    function toggleDone(id) {
      const it = items.find(i => i.id === id);
      if (!it) return;

      if (it._done) {
        it._done = false;
        saveAndRender();
        return;
      }

      pendingDoneId = id;
      const deficit = Math.max(0, it.min - it.qty);

      openModal(`
        <div class="modal-header">
          <div class="modal-title">${esc(it.name)}</div>
          <div class="modal-sub">${esc(it.desc)} · current stock: <strong>${it.qty}</strong> · minimum: <strong>${it.min}</strong></div>
        </div>
        <div class="modal-body">
          <label class="modal-label">How many units did you acquire?</label>
          <div style="display:flex;justify-content:center;margin-top:8px">
            <div class="stepper-wrap" style="width:160px">
              <div class="stepper">
                <div class="stepper-btn minus" ontouchstart="" onmousedown="doneStepperChange(-1)">−</div>
                <input class="stepper-val" id="done-qty" type="number" min="0" value="${deficit}" />
                <div class="stepper-btn plus" ontouchstart="" onmousedown="doneStepperChange(+1)">+</div>
              </div>
              <div class="stepper-label">units acquired</div>
            </div>
          </div>
        </div>
        <div class="modal-foot">
          <div class="modal-btn cancel" onclick="closeModal()">Cancel</div>
          <div class="modal-btn confirm" onclick="confirmDone()">Confirm</div>
        </div>
      `);
    }

    function doneStepperChange(delta) {
      const input = document.getElementById('done-qty');
      if (!input) return;
      input.value = Math.max(0, (parseInt(input.value, 10) || 0) + delta);
    }

    function confirmDone() {
      const val = parseInt(document.getElementById('done-qty').value || 0) || 0;
      if (val <= 0) {
        closeModal();
        return;
      }
      const it = items.find(i => i.id === pendingDoneId);
      if (it) {
        it.qty += val;
        it._done = true;
      }
      closeModal();
      saveAndRender();
      toast(`+${val} added to stock`);
    }

    let _secMenuEl = null;

    function closeSectionMenu() {
      if (_secMenuEl) {
        _secMenuEl.remove();
        _secMenuEl = null;
      }
    }

    // Posiciona e exibe o dropdown próximo ao botão ⋯
    function _showSectionMenu(triggerEl, html) {
      closeSectionMenu();

      const menu = document.createElement('div');
      menu.className = 'sec-action-menu';
      menu.innerHTML = html;
      document.body.appendChild(menu);
      _secMenuEl = menu;

      // Posicionamento: abaixo do trigger, alinhado à direita
      const rect = triggerEl.getBoundingClientRect();
      const menuW = 220;
      let left = rect.right - menuW;
      let top = rect.bottom + 6;

      // Garante que não sai da tela
      if (left < 8) left = 8;
      if (top + 220 > window.innerHeight) top = rect.top - 220;

      menu.style.left = left + 'px';
      menu.style.top = top + 'px';
      menu.style.width = menuW + 'px';

      // Fecha ao clicar fora
      setTimeout(() => {
        document.addEventListener('mousedown', _outsideMenuHandler);
        document.addEventListener('touchstart', _outsideMenuHandler, { passive: true });
      }, 0);
    }

    function _outsideMenuHandler(e) {
      if (_secMenuEl && !_secMenuEl.contains(e.target)) {
        closeSectionMenu();
        document.removeEventListener('mousedown', _outsideMenuHandler);
        document.removeEventListener('touchstart', _outsideMenuHandler);
      }
    }

    // ── Menu para categoria (sortMode === 'cat') ───────────────────────────
    function openCatSectionMenu(triggerEl, cat) {
      const catItems = items.filter(i => getCategoryOf(i) === cat);

      const key = _registerBulk(catItems.map(i => i.id));

      _showSectionMenu(triggerEl, `
        <div class="sec-action-header">#${esc(cat)} · ${count} item${count !== 1 ? 's' : ''}</div>
        <div class="sec-action-item" data-action="rename-cat" data-cat="${esc(cat)}">

          <span class="sec-action-icon">🗑️</span> Delete all ${count} item${count !== 1 ? 's' : ''}
        </div>
      `);

      // Listener delegado no menu — evita onclick inline com dados interpolados
      _secMenuEl.addEventListener('click', e => {
        const item = e.target.closest('[data-action]');

        const action = item.dataset.action;

    // ── Rename de categoria inline ─────────────────────────────────────────
    // Substitui o sec-label pelo campo de edição inline; confirma com Enter/blur
    function startCatRename(cat) {
      // Acha o sec-label cujo texto começa com #cat
      const labels = document.querySelectorAll('.sec-label');
      let targetLabel = null;
      for (const l of labels) {
        const txt = l.querySelector('.sec-label-text');
        if (txt && txt.textContent.trim().toLowerCase() === ('#' + cat).toLowerCase()) {
          targetLabel = l;
          break;
        }
      }
      if (!targetLabel) return;

      // Guarda innerHTML original para cancelar
      const originalHTML = targetLabel.innerHTML;

      // Remove o ::before pseudo via classe temporária
      targetLabel.style.setProperty('--before-opacity', '0');

      // Cria input inline
      const input = document.createElement('input');
      input.className = 'sec-label-input';
      input.value = cat;
      input.maxLength = 40;
      input.spellcheck = false;

      targetLabel.innerHTML = '';
      // Mantém o pseudo ::before visual mas o sec-label vira container do input
      const bar = document.createElement('span');
      bar.style.cssText = 'width:3px;height:11px;border-radius:2px;background:var(--accent);flex-shrink:0;opacity:0.5';
      targetLabel.appendChild(bar);
      targetLabel.appendChild(input);

      const hint = document.createElement('span');
      hint.style.cssText = 'font-size:10px;color:var(--text3);font-weight:400;letter-spacing:0.02em;flex-shrink:0';
      hint.textContent = 'Enter ↵ to save';
      targetLabel.appendChild(hint);

      input.focus();
      input.select();

      function applyRename() {
        const newCat = input.value.trim().toLowerCase().replace(/\s+/g, '-');
        if (!newCat || newCat === cat) {
          targetLabel.innerHTML = originalHTML;
          return;
        }
        // Atualiza o campo desc de todos os itens da categoria
        items.forEach(it => {
          if (getCategoryOf(it) === cat) {
            it.desc = it.desc.replace(new RegExp('#' + cat.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), '#' + newCat);
          }
        });
        saveAndRender();
        toast(`Category renamed to #${newCat}`);
      }

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); applyRename(); }
        if (e.key === 'Escape') { targetLabel.innerHTML = originalHTML; }
      });
      input.addEventListener('blur', applyRename);
    }

    // ── Executa bulk delete ───────────────────────────────────────────────
    // Registro temporário de lotes — evita serialização de arrays em atributos HTML
    const _bulkRegistry = {};

    function _registerBulk(ids) {
      const key = 'b' + Date.now();
      _bulkRegistry[key] = ids;
      return key;
    }

    function doBulkDelete(key) {
      const ids = _bulkRegistry[key];
      if (!ids) return;
      delete _bulkRegistry[key];
      const idSet = new Set(ids);
      const before = items.length;
      items = items.filter(i => !idSet.has(i.id));
      const removed = before - items.length;
      closeModal();
      saveAndRender();
      toast(`${removed} item${removed !== 1 ? 's' : ''} deleted`);
    }

    function importFile(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const parsed = JSON.parse(ev.target.result);

          // Suporte a arquivo exportado com payload ou array legado
          let data = null;
          let importedSavedAt = null;

          if (Array.isArray(parsed)) {
            // Formato legado (array puro)
            data = parsed;
            importedSavedAt = new Date().toISOString(); // data atual como fallback
          } else if (parsed && Array.isArray(parsed.data)) {
            // Formato novo com savedAt
            data = parsed.data;
            importedSavedAt = parsed.savedAt || new Date().toISOString();
          } else {
            throw new Error('Invalid format');
          }

          if (!data) throw new Error('Invalid format');

          // Atualiza os itens
          items = data;

          // Remove _done antes de salvar (estado de sessão)
          const toSave = items.map(({ _done, ...rest }) => rest);

          // PRESERVA O TIMESTAMP DO ARQUIVO IMPORTADO
          const payload = {
            savedAt: importedSavedAt,
            data: toSave
          };

          localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
          changeCounter = 0; // Reset contador após importação

          closeModal();
          render();         // re-renderiza painéis com os novos dados
          updateBadges();   // garante que o badge leia o savedAt recém-gravado no storage
          toast('Data imported successfully');

        } catch (err) {
          toast('Error: invalid file');
          console.error(err);
        }
        e.target.value = '';
      };
      reader.readAsText(file);
    }

    function copyBuyList() {
      // Usa buyItems() para respeitar activeQuickFilter e searchQuery ativos
      const base = buyItems();
      if (!base.length) {
        toast('No pending items');
        return;
      }

      // Aplica a mesma ordenação visível na aba Reposição
      const list = sorted(base);

      // ── Helper: descrição limpa (sem a #tag, mantém anotações extras) ──
      function cleanDesc(it) {
        if (!it.desc) return '';
        // Remove a #hashtag de categoria mas preserva o resto (ex: "· 500g")
        return it.desc.replace(/#[^\s·,]+\s*/g, '').replace(/^[\s·,]+|[\s·,]+$/g, '').trim();
      }

      // ── Helper: linha de item ──
      function itemLine(it, showFavStar = true) {
        const star = (showFavStar && it.fav) ? '⭐ ' : '';
        const qty = `+${it.min - it.qty}`;
        const desc = cleanDesc(it);
        const detail = desc ? ` _(${desc})_` : '';
        return `- ${star}*${it.name}*: ${qty}${detail}`;
      }

      // ── Cabeçalho dinâmico reflete o modo ativo ──
      const modeLabel = {
        az: 'A–Z',
        cat: 'by category',
        fav: 'favorites first',
      }[sortMode];

      const filterLabel = activeQuickFilter === 'fav' ? ' · favorites only' : '';
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const datestamp = `${pad(now.getDate())}/${pad(now.getMonth() + 1)} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

      let lines = [];
      lines.push(`🛒 *SHOP LIST* · ${modeLabel}${filterLabel}`);
      lines.push(`_${datestamp} · ${list.length} ite${list.length !== 1 ? 'ns' : 'm'}_`);

      // ── Corpo: espelha exatamente a renderização do painel ──
      if (sortMode === 'cat') {
        // Agrupa por categoria com cabeçalho *#categoria* em negrito
        let lastSection = null;
        list.forEach(it => {
          const section = sectionKeyOf(it); // ex: "#laticínios" ou "—"
          if (section !== lastSection) {
            lines.push('');
            lines.push(`*${section}*`);
            lastSection = section;
          }
          lines.push(itemLine(it));
        });

      } else if (sortMode === 'fav') {
        // Dois blocos: ⭐ Favoritos e · Demais itens
        const favs = list.filter(it => it.fav);
        const others = list.filter(it => !it.fav);

        if (favs.length) {
          lines.push('');
          lines.push('*⭐ Favorites*');
          favs.forEach(it => lines.push(itemLine(it, false)));
        }
        if (others.length) {
          lines.push('');
          lines.push('*· Other items*');
          others.forEach(it => lines.push(itemLine(it, false)));
        }

      } else {
        // A–Z: lista simples; favoritos recebem ⭐ inline
        lines.push('');
        list.forEach(it => lines.push(itemLine(it)));
      }

      const text = lines.join('\n');

      // ── Disparo: Web Share API (mobile) ou clipboard (desktop) ──
      if (navigator.share) {
        closeModal();
        navigator.share({ title: 'Shop List', text: text.trim() })
          .then(() => toast('List shared!'))
          .catch(err => {
            if (err.name !== 'AbortError')
              navigator.clipboard.writeText(text.trim()).then(() => toast('List copied!'));
          });
      } else {
        navigator.clipboard.writeText(text.trim()).then(() => {
          closeModal();
          toast('List copied to clipboard!');
        }).catch(() => toast('Error copying list'));
      }
    }

    // ==================== AUTOCOMPLETE ====================
    const UNIT_SUGGESTIONS = [
      { label: 'bx', icon: '📦', desc: 'box' },
      { label: 'dz', icon: '🔢', desc: 'dozen' },
      { label: 'jar', icon: '🫙', desc: 'jar' },

      { label: 'kg', icon: '⚖️', desc: 'kilograms' },

      { label: 'un', icon: '🔢', desc: 'unit' },
    ];

    // De-duplica por label para lista limpa
    const UNITS = [...new Map(UNIT_SUGGESTIONS.map(u => [u.label, u])).values()];

    let acTarget = null;       // input sendo monitorado
    let acMode = null;         // 'category' | 'unit'
    let acFocusIdx = -1;       // índice do item com foco de teclado

    function getExistingCategories(query = '') {
      const cats = new Set();
      items.forEach(it => {
        if (!it.desc) return;
        // Extrai todos os tokens #palavra do desc, ignorando o que vier depois
        const matches = it.desc.matchAll(/#([^\s·,;#]+)/g);
        for (const m of matches) {
          const cat = m[1].trim().toLowerCase();
          if (cat) cats.add(cat);
        }
      });
      const q = query.toLowerCase();
      return [...cats]
        .filter(c => !q || c.startsWith(q))
        .sort()
        .map(c => ({ label: c, icon: '🏷️', desc: '' }));

    function getUnitSuggestions(query = '') {
      const q = query.toLowerCase();
      // Unidades padrão filtradas
      const defaults = UNITS.filter(u => !q || u.label.startsWith(q));
      // Unidades já usadas nos itens
      const usedSet = new Set();
      items.forEach(it => {
        if (!it.desc) return;
        const m = it.desc.match(/\d+\s*([a-zA-Záàãéíóú]+)/g);
        if (m) m.forEach(tok => {
          const unit = tok.replace(/\d+\s*/, '').toLowerCase();
          if (unit && unit.length <= 5) usedSet.add(unit);
        });
      });
      const extra = [...usedSet]
        .filter(u => !UNITS.find(d => d.label === u) && (!q || u.startsWith(q)))

      return [...defaults, ...extra];

        const hashPos = val.lastIndexOf('#');

      } else if (acMode === 'search-cat') {
        // No campo de busca: substitui tudo após o # pelo termo e dispara busca
        const hashPos = val.lastIndexOf('#');

        searchQuery = acTarget.value;
        render();
      } else if (acMode === 'unit') {
        // Substitui "NNN " pelo "NNN sugestão"
        acTarget.value = val.replace(/(\d+)\s*$/, '$1') + sugs[idx].label;
      }

      acClose();
      acTarget.focus();
    }

    function acOnInput(e) {
      const input = e.target;
      const val = input.value;
      const drop = document.getElementById('ac-dropdown');

      // --- MODO CATEGORIA: disparado por "#" ---
      const hashPos = val.lastIndexOf('#');
      if (hashPos !== -1) {
        const afterHash = val.slice(hashPos + 1);
        // Só dispara se não há espaço após o # (ainda digitando a categoria)
        if (!/\s/.test(afterHash)) {
          const cats = getExistingCategories(afterHash);
          if (cats.length) {
            acOpen(input, 'category', cats, '🏷️ Categories');
            return;
          }

      }

      // --- MODO UNIDADE: disparado por "NNN " (número seguido de espaço) ---
      const unitMatch = val.match(/(\d+)\s(\S*)$/);
      if (unitMatch) {
        const typed = unitMatch[2] || '';
        const units = getUnitSuggestions(typed);
        if (units.length) {
          acOpen(input, 'unit', units, '📐 Units');
          return;
        }
      }

      acClose();

        e.preventDefault();
        acFocusIdx = Math.min(acFocusIdx + 1, items.length - 1);
        acHover(acFocusIdx);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        acFocusIdx = Math.max(acFocusIdx - 1, 0);
        acHover(acFocusIdx);
      } else if (e.key === 'Enter' || e.key === 'Tab') {

          e.preventDefault();
          acPick(acFocusIdx);

  <script>

                _folderId = d.id;
                // Aproveita o retorno para gravar folderOwnedByMe se ainda ausente
                // Só enriquece folderOwnedByMe se NÃO foi vinculado via Picker de arquivo.
                // pickedManually=true indica Shared user — folderOwnedByMe já foi gravado
                // corretamente em pickSharedFolder e não deve ser sobrescrito pela API
                // (que retornaria ownedByMe referente à pasta, não ao arquivo).
                if (!meta.pickedManually && typeof meta.folderOwnedByMe !== 'boolean' && typeof d.ownedByMe === 'boolean') {
                  _saveMeta({ folderOwnedByMe: d.ownedByMe });
                  console.log('[DriveSync] folderOwnedByMe enriched from API:', d.ownedByMe);
                }
                console.log('[DriveSync] folder from cache:', _folderId);
                return _folderId;
              }
            } catch (_) { }
            _saveMeta({ folderId: null, duplicateFolderId: null });
          }

          // ── 2. Busca em todos os drives acessíveis ─────────────────────────────
          const folders = await Drive._findAllFolders();
          console.log('[DriveSync] folders found:', folders);

          if (folders.length === 0) {
            // ── 3. Nenhuma encontrada — cria no My Drive ────────────────────────
            // DIAGNÓSTICO: se isto disparar para um usuário compartilhado, significa
            // que o escopo drive.file ainda não "viu" a pasta do dono. O proprietário
            // precisa compartilhar a pasta via Drive para que sharedWithMe=true a retorne.
            console.warn(
              '[DriveSync] Nenhuma pasta encontrada nas 3 buscas (myDrive / allDrives / sharedWithMe). ' +
              'Se este é um usuário compartilhado, o proprietário deve compartilhar a pasta ' +
              'diretamente pelo Google Drive antes de o app tentar sincronizar. ' +
              'Criando nova pasta como fallback.'
            );
            const cr = await Drive._api('/files', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                name: FOLDER_NAME,
                mimeType: 'application/vnd.google-apps.folder',
              }),
            });
            const cd = await cr.json();
            _folderId = cd.id;
            _saveMeta({ folderId: _folderId, folderSource: 'created', folderOwnedByMe: true, duplicateFolderId: null });
            console.log('[DriveSync] folder created:', _folderId);
            return _folderId;
          }

          if (folders.length === 1) {
            _folderId = folders[0].id;
            _saveMeta({
              folderId: _folderId,
              folderSource: folders[0].source,
              folderOwnedByMe: folders[0].ownedByMe,
              duplicateFolderId: null,
            });
            console.log('[DriveSync] single folder resolved:', _folderId, folders[0].source);
            return _folderId;
          }

          // ── 4. Múltiplas pastas — prefere a compartilhada (não-própria) ────────
          //    A pasta ownedByMe=false é a original do dono do compartilhamento.
          //    A pasta ownedByMe=true é a que este usuário criou por engano.
          const preferred = folders.find(f => !f.ownedByMe) || folders[0];
          const duplicates = folders.filter(f => f.id !== preferred.id);

          _folderId = preferred.id;
          _saveMeta({
            folderId: _folderId,
            folderSource: preferred.source,
            folderOwnedByMe: preferred.ownedByMe,
            duplicateFolderId: duplicates[0]?.id || null,
            duplicateCount: duplicates.length,
          });
          console.warn('[DriveSync] duplicate folders detected — using shared, ignoring own:', duplicates.map(f => f.id));
          return _folderId;
        },

        // Nome fixo do arquivo de sync — único arquivo por pasta, atualizado in-place.
        // Elimina a necessidade de versionamento por nome e de drive.readonly para o Shared.
        SYNC_FILENAME: 'Shop-List-Sync.json',

        /** Busca o arquivo de sync pelo nome fixo na pasta. Retorna { id, modifiedTime } ou null */
        async findSyncFile(folderId) {
          const q = encodeURIComponent(
            `'${folderId}' in parents and name='${Drive.SYNC_FILENAME}' and trashed=false`
          );
          const r = await Drive._api(
            `/files?q=${q}&fields=files(id,name,modifiedTime)&spaces=drive&supportsAllDrives=true`
          );
          const d = await r.json();
          if (d.error) { console.warn('[DriveSync] findSyncFile error:', d.error); return null; }
          const files = d.files || [];
          console.log(`[DriveSync] findSyncFile: ${files.length} result(s) in folder ${folderId}`);
          return files[0] || null;
        },

        /** Baixa conteúdo de um arquivo pelo ID */
        async downloadFile(fileId) {
          const r = await Drive._api('/files/' + fileId + '?alt=media&supportsAllDrives=true');
          return r.text();
        },

        /** Cria o arquivo de sync (primeira vez — Owner) */
        async createSyncFile(folderId, content) {
          const metadata = { name: Drive.SYNC_FILENAME, parents: [folderId], mimeType: 'application/json' };
          const form = new FormData();
          form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
          form.append('file', new Blob([content], { type: 'application/json' }));
          const r = await Drive._upload(
            '/files?uploadType=multipart&fields=id,name,modifiedTime&supportsAllDrives=true',
            { method: 'POST', body: form }
          );
          return r.json();
        },

        /** Atualiza o arquivo de sync existente in-place (Owner e Shared) */
        async patchSyncFile(fileId, content) {
          const form = new FormData();
          form.append('file', new Blob([content], { type: 'application/json' }));
          const r = await Drive._upload(
            `/files/${fileId}?uploadType=multipart&fields=id,name,modifiedTime&supportsAllDrives=true`,
            { method: 'PATCH', body: form }
          );
          return r.json();
        },
      };

      // ─── MÓDULO sync/ ───────────────────────────────────────────────────────────
      const Sync = {
        /** Extrai timestamp ISO do nome YYYYMMDD.HHmm-Shop-List.json */
        filenameToDate(name) {
          const m = name.match(/^(\d{4})(\d{2})(\d{2})\.(\d{2})(\d{2})-Shop-List\.json$/);
          if (!m) return null;
          return new Date(`${m[1]}-${m[2]}-${m[3]}T${m[4]}:${m[5]}:00`);
        },

        /** Gera nome canônico para o timestamp dado */
        dateToFilename(date) {
          const pad = n => String(n).padStart(2, '0');
          return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}`
            + `.${pad(date.getHours())}${pad(date.getMinutes())}-Shop-List.json`;
        },

        /** Retorna o payload local {savedAt, data} como string JSON pronta para upload.
         *  Retorna null se os dados locais ainda são o modelo inicial (_isDefaultData=true)
         *  ou se não há savedAt — ambos os casos indicam que não há dados reais para sincronizar.
         *  Isso impede que dados modelo subam para o Drive e sobrescrevam dados reais do dono.
         */
        _localPayload() {
          try {
            const raw = localStorage.getItem(window.STORAGE_KEY || 'Shop_List_v20260529');
            if (!raw) return null;
            const parsed = JSON.parse(raw);
            if (!parsed.savedAt) return null;

            // Detecção intrínseca de dados modelo: todos os IDs começam com 'model-'.
            // Esta verificação é imune a save(), reload, ou qualquer mutação de payload
            // porque os IDs são propriedades dos próprios objetos de dado.
            const data = parsed.data;
            if (Array.isArray(data) && data.length > 0 && data.every(i => typeof i.id === 'string' && i.id.startsWith('model-'))) {
              console.log('[DriveSync] _localPayload: dados modelo detectados por MODEL_ID_PREFIX — ignorando para sync');
              return null;
            }

            return raw;
          } catch { return null; }
        },

        /** Importa payload JSON recebido do Drive para o localStorage e re-renderiza */
        _applyCloud(jsonText) {
          try {
            const parsed = JSON.parse(jsonText);
            let data, savedAt;

            if (Array.isArray(parsed)) {
              data = parsed;
              savedAt = new Date().toISOString();
            } else if (parsed && Array.isArray(parsed.data)) {
              data = parsed.data;
              savedAt = parsed.savedAt || new Date().toISOString();
            } else {
              throw new Error('Formato inválido');
            }

            // Guarda defensiva: nunca aplica dados modelo vindos do Drive.
            // Improvável, mas possível se o dado subiu antes desta correção.
            if (Array.isArray(data) && data.length > 0 && data.every(i => typeof i.id === 'string' && i.id.startsWith('model-'))) {
              console.warn('[DriveSync] _applyCloud: arquivo no Drive contém apenas dados modelo — ignorado.');
              return;
            }
            const payload = { savedAt, data };
            localStorage.setItem(window.STORAGE_KEY || 'Shop_List_v20260529', JSON.stringify(payload));

            // Atualiza o array `items` em memória do script 1.
            // `let items` não é propriedade de window, mas window.items foi exportado
            // como referência ao mesmo array. Escrever em window.items não basta —
            // é preciso usar o callback window._applyItems que o script 1 registra
            // para substituir a binding local e depois chamar render().
            if (typeof window._applyItems === 'function') {
              window._applyItems(data);   // substitui items + chama render() + updateBadges()
            } else {
              // Fallback: render() irá reler do localStorage (dados já gravados acima)
              if (typeof window.render === 'function') window.render();
              if (typeof window.updateBadges === 'function') window.updateBadges();
            }
            if (typeof toast === 'function') toast('☁️ Data updated from Drive');
          } catch (e) {
            console.error('[DriveSync] applyCloud error:', e);
          }
        },

        async run(trigger = 'manual') {
          if (_syncing) return;
          _syncing = true;
          _setStatus('syncing', 'Syncing with Google Drive…');
          console.log('[DriveSync] sync triggered by:', trigger);

          try {
            await Auth.ensureToken();
            const meta = _loadMeta();

            // ── Resolve o fileId do arquivo fixo ───────────────────────────────
            // Opção A: syncFileId gravado (já conhecido — Owner ou Shared pós-Picker)
            // Opção B: busca pelo nome fixo na pasta (Owner no primeiro sync)
            // Opção C: cria o arquivo (Owner, pasta vazia)
            let syncFileId = meta.syncFileId || null;
            let cloudDate = null;
            const folderId = await Drive.ensureFolder();
            if (typeof window.updateSyncBadge === 'function') window.updateSyncBadge();

            if (!syncFileId) {
              // Ainda não conhecemos o fileId — busca pelo nome na pasta
              const found = await Drive.findSyncFile(folderId);
              if (found) {
                syncFileId = found.id;
                cloudDate = found.modifiedTime ? new Date(found.modifiedTime) : null;
                _saveMeta({ syncFileId });
                console.log('[DriveSync] sync file found:', syncFileId);
              }
            } else {
              // Já temos o ID — usa cloudModifiedAt gravado (tempo do servidor Drive)
              // como fonte primária, evitando divergência com relógio do dispositivo.
              // Se não houver cloudModifiedAt, confirma via API.
              const cachedCloudTime = meta.cloudModifiedAt;
              if (cachedCloudTime) {
                cloudDate = new Date(cachedCloudTime);
                console.log('[DriveSync] using cached cloudModifiedAt:', cachedCloudTime);
                // Ainda valida que o arquivo existe (sem buscar modifiedTime de novo)
                try {
                  const r = await Drive._api(`/files/${syncFileId}?fields=id&supportsAllDrives=true`);
                  const d = await r.json();
                  if (!d.id) {
                    console.warn('[DriveSync] syncFileId inválido — resetando', syncFileId);
                    syncFileId = null; cloudDate = null;
                    _saveMeta({ syncFileId: null, cloudModifiedAt: null });
                  }
                } catch (e) { console.warn('[DriveSync] existence check failed', e); }
              } else {
                // Sem cache — busca modifiedTime atual da API
                try {
                  const r = await Drive._api(`/files/${syncFileId}?fields=id,modifiedTime&supportsAllDrives=true`);
                  const d = await r.json();
                  if (d.id) {
                    cloudDate = d.modifiedTime ? new Date(d.modifiedTime) : null;
                  } else {
                    console.warn('[DriveSync] syncFileId inválido — resetando', syncFileId);
                    syncFileId = null;
                    _saveMeta({ syncFileId: null });
                  }
                } catch (e) { console.warn('[DriveSync] meta check failed, proceeding without cloudDate', e); }
              }
            }

            // ── Payload local ───────────────────────────────────────────────────
            const localRaw = Sync._localPayload();
            const localDate = localRaw ? (() => {
              try { const p = JSON.parse(localRaw); return p.savedAt ? new Date(p.savedAt) : null; }
              catch { return null; }
            })() : null;

            const localMs = localDate ? localDate.getTime() : 0;
            const cloudMs = cloudDate ? cloudDate.getTime() : 0;
            const EPSILON = 30_000;

            console.log(
              `[DriveSync] conflict | local=${localDate?.toISOString() ?? 'none'}` +
              ` | cloud=${cloudDate?.toISOString() ?? 'none'}` +
              ` | syncFileId=${syncFileId ?? 'none'}`
            );

            if (!localRaw) {
              // Sem dados locais reais (primeiro uso ou dados modelo)
              if (syncFileId) {
                const txt = await Drive.downloadFile(syncFileId);
                Sync._applyCloud(txt);
                _saveMeta({ lastSync: new Date().toISOString(), lastFile: Drive.SYNC_FILENAME });
                _setStatus('connected', '☁️ Data downloaded from Drive');
              } else {
                _setStatus('connected', '☁️ Drive is empty, nothing to sync');
              }

            } else if (!syncFileId) {
              // Dados locais existem mas arquivo ainda não existe no Drive → cria
              const created = await Drive.createSyncFile(folderId, localRaw);
              _saveMeta({ syncFileId: created.id, lastSync: new Date().toISOString(), lastFile: Drive.SYNC_FILENAME });
              _setStatus('connected', '☁️ Synced to Drive');
              console.log('[DriveSync] sync file created:', created.id);

            } else if (localMs > cloudMs + EPSILON) {
              // Local mais recente → patch in-place.
              // Grava cloudModifiedAt com o modifiedTime retornado pelo servidor —
              // na próxima comparação, cloudMs virá deste valor (tempo do servidor,
              // não do relógio do dispositivo), eliminando divergência de clock.
              const patched = await Drive.patchSyncFile(syncFileId, localRaw);
              const serverTime = patched.modifiedTime || new Date().toISOString();
              _saveMeta({ lastSync: new Date().toISOString(), lastFile: Drive.SYNC_FILENAME, cloudModifiedAt: serverTime });
              _setStatus('connected', '☁️ Synced to Drive');
              console.log('[DriveSync] patched sync file:', syncFileId, '| server modifiedTime:', serverTime);

            } else if (cloudMs > localMs + EPSILON) {
              // Drive mais recente → download.
              const txt = await Drive.downloadFile(syncFileId);
              Sync._applyCloud(txt);
              // Grava cloudModifiedAt para que a próxima comparação use tempo do servidor
              _saveMeta({ lastSync: new Date().toISOString(), lastFile: Drive.SYNC_FILENAME, cloudModifiedAt: cloudDate?.toISOString() });
              _setStatus('connected', '☁️ Data updated from Drive');
              console.log('[DriveSync] downloaded sync file:', syncFileId);

            } else {
              _saveMeta({ lastSync: new Date().toISOString() });
              _setStatus('connected', '☁️ Already in sync');
              console.log('[DriveSync] already in sync');
            }

          } catch (e) {
            console.error('[DriveSync] sync error:', e);
            _setStatus('error', '⚠️ Drive sync failed: ' + (e.message || 'unknown error'));
          } finally {
            _syncing = false;
            if (typeof window.updateSyncBadge === 'function') window.updateSyncBadge();
          }
        },
      };

      // ─── MÓDULO picker/ ────────────────────────────────────────────────────────
      // Abre o Google Picker para que o usuário selecione explicitamente uma pasta
      // do Drive — incluindo "Compartilhados comigo". O folderId retornado é
      // introduzido ao escopo drive.file automaticamente, resolvendo o problema
      // de descoberta do usuário compartilhado sem depender de queries frágeis.
      const Picker = {
        _loaded: false,

        /** Carrega a Picker API (gapi.load) — idempotente */
        load() {
          return new Promise((resolve, reject) => {
            if (this._loaded) { resolve(); return; }
            if (typeof gapi === 'undefined') {
              reject(new Error('Google API (gapi) não carregado. Verifique a tag <script> do apis.google.com'));
              return;
            }
            gapi.load('picker', { callback: () => { this._loaded = true; resolve(); }, onerror: reject });
          });
        },

        /**
         * Abre o Picker em modo de seleção de pasta.
         * Resolve com { id, name } da pasta escolhida, ou rejeita se o usuário cancelar.
         */
        /**
         * Abre o Picker em dois modos:
         *   mode='file'   (default) — seleciona o arquivo Shop-List-Sync.json
         *                             usado pelo usuário Shared para vincular o arquivo do dono
         *   mode='folder' — seleciona a pasta (usado pelo Owner na configuração inicial)
         */
        open(accessToken, mode = 'file') {
          return new Promise((resolve, reject) => {
            let view;
            if (mode === 'folder') {
              view = new google.picker.DocsView(google.picker.ViewId.FOLDERS)
                .setSelectFolderEnabled(true)
                .setIncludeFolders(true);
            } else {
              // Seleciona arquivo JSON — filtra por mimeType para mostrar só JSON
              view = new google.picker.DocsView()
                .setMimeTypes('application/json')
                .setOwnedByMe(false)  // prioriza arquivos de outros (pasta do dono)
                .setLabel('Shared with me');
            }

            // Segunda view: My Drive (fallback para o Owner)
            const myView = mode === 'folder'
              ? null
              : new google.picker.DocsView()
                .setMimeTypes('application/json')
                .setOwnedByMe(true)
                .setLabel('My Drive');

            let builder = new google.picker.PickerBuilder()
              .setOAuthToken(accessToken)
              .setDeveloperKey('')
              .addView(view)
              .setTitle(mode === 'folder' ? 'Select sync folder' : 'Select the Shop-List-Sync.json file')
              .setMaxItems(1)
              .setCallback((data) => {
                if (data.action === google.picker.Action.PICKED) {
                  const doc = data.docs[0];
                  resolve({ id: doc.id, name: doc.name, ownedByMe: doc.isOwned || false, parentId: doc.parentId });
                } else if (data.action === google.picker.Action.CANCEL) {
                  reject(new Error('picker-cancelled'));
                }
              });

            if (myView) builder = builder.addView(myView);
            builder.build().setVisible(true);
          });
        },
      };

      // ─── META / PERSISTÊNCIA DE ESTADO ─────────────────────────────────────────
      function _loadMeta() {
        try { return JSON.parse(localStorage.getItem(SYNC_KEY) || '{}'); } catch { return {}; }
      }

      function _saveMeta(patch) {
        try {
          const cur = _loadMeta();
          localStorage.setItem(SYNC_KEY, JSON.stringify({ ...cur, ...patch }));
        } catch (_) { }
      }

      // ─── SINCRONIZAÇÃO PERIÓDICA ────────────────────────────────────────────────
      function _startTimer() {
        if (_syncTimer) clearInterval(_syncTimer);
        _syncTimer = setInterval(() => {
          if (Auth.isValid()) Sync.run('periodic');
        }, SYNC_INTERVAL_MS);
      }

      // ─── API PÚBLICA ────────────────────────────────────────────────────────────
      // Sobrescreve o stub declarado no script principal; _ready=true sinaliza ao
      // stub que o módulo real está disponível e chamadas podem ser despachadas.
      window.DriveSync = {
        _ready: true,
        /** Inicializa o módulo — chamado ao carregar o app */
        async init() {
          const hasToken = Auth.load();
          if (hasToken) {
            _setStatus('connected', '☁️ Drive connected');
            _startTimer();

            await Sync.run('startup');
          } else {
            _setStatus('', 'Google Drive (not connected)');
          }

          // Volta online → sincroniza
          window.addEventListener('online', () => {
            if (Auth.isValid()) Sync.run('back-online');
          });
        },

        /** Chamado após cada save() — enfileira sync após 2s de debounce */
        afterSave: (() => {
          let t = null;
          return () => {
            clearTimeout(t);
            t = setTimeout(() => {
              if (Auth.isValid()) Sync.run('after-save');
            }, 2000);
          };
        })(),

        /** Abre painel de configuração do Drive no modal existente do app */
        openPanel() {
          const meta = _loadMeta();
          const connected = Auth.isValid();
          const lastSync = meta.lastSync
            ? new Date(meta.lastSync).toLocaleString('pt-BR') : '—';
          const lastFile = meta.lastFile || '—';
          const hasDuplicate = !!meta.duplicateFolderId;
          const ownedByMe = meta.folderOwnedByMe;
          const folderKnown = meta.folderId && typeof ownedByMe === 'boolean';

          // ── Helper: gera um card de pasta ─────────────────────────────────────
          // Usa exclusivamente CSS vars do tema — sem hex hardcoded — para que
          // light e dark mode sejam respeitados automaticamente.
          //   isShared=true  → paleta accent (teal/verde)  — pasta do dono do compartilhamento
          //   isShared=false → paleta purple (índigo/azul) — pasta própria do usuário
          // _folderCard: renderiza card com classes .ds-* — CSS em <style>, sem inline
          function _folderCard({ id, isShared, inUse, fileCount, lastFileName }) {
            const paletteClass = isShared ? 'ds-card--shared' : 'ds-card--owned';
            const inuseClass = inUse ? ' ds-card--inuse' : '';
            const icon = isShared ? '🔓' : '🔒';
            const typeLabel = isShared ? 'Shared with you' : 'Owned by you';

            const inUseBadge = inUse
              ? `<span class="ds-card__inuse">IN USE</span>` : '';

            const filesInfo = fileCount != null
              ? `<div class="ds-card__files">
                 ${fileCount} file${fileCount !== 1 ? 's' : ''}${lastFileName ? ' · last: ' + lastFileName.slice(0, 16) : ''}
               </div>` : '';

            const useBtn = !inUse
              ? `<div class="ds-card__btn" onclick="DriveSync.resolveFolder('${id}')">Use this folder</div>` : '';

            const trashBtn =
              `<div class="ds-card__btn ds-card__btn--trash"
                  onclick="DriveSync.trashFolder('${id}', ${inUse})"
                  title="Move to Drive trash">🗑</div>`;

            return `
            <div class="ds-card ${paletteClass}${inuseClass}">
              <div class="ds-card__head">
                <span class="ds-card__icon">${icon}</span>
                <span class="ds-card__name">${FOLDER_NAME}</span>
                <span class="ds-card__type">${typeLabel}</span>
                ${inUseBadge}
              </div>
              ${filesInfo}
              <div class="ds-card__actions">${useBtn}${trashBtn}</div>
            </div>`;
          }

          // ── Seção de pasta(s) ─────────────────────────────────────────────────
          let folderSection = '';
          if (connected && folderKnown) {
            if (hasDuplicate) {
              // Banner de aviso — usa CSS vars warn já definidas no tema
              folderSection = `
              <div class="ds-warn-banner">
                <span class="ds-warn-banner__icon">⚠️</span>
                <div class="ds-warn-banner__text">
                  <strong>Two folders detected.</strong> Choose which one to use for sync,
                  or move the unwanted one to trash.
                </div>
              </div>
              ${_folderCard({ id: meta.folderId, isShared: !ownedByMe, inUse: true, fileCount: null, lastFileName: meta.lastFile })}
              ${_folderCard({ id: meta.duplicateFolderId, isShared: !!ownedByMe, inUse: false, fileCount: null, lastFileName: null })}`;
            } else {
              // Pasta única em uso
              folderSection = _folderCard({
                id: meta.folderId, isShared: !ownedByMe,
                inUse: true, fileCount: null, lastFileName: meta.lastFile,
              });
            }
          }

          if (typeof openModal !== 'function') return;

          openModal(`
          <div class="modal-header">
            <div class="modal-title">Google Drive Sync</div>
            <div class="modal-sub">${connected ? '🟢 Connected' : '⚪ Not connected'}</div>
          </div>
          <div class="modal-body">

            ${folderSection}

            <div class="ds-sync-panel">
              <div class="ds-sync-panel__label">Last sync</div>
              <div class="ds-sync-panel__date">${lastSync}</div>
              <div class="ds-sync-panel__file">${lastFile}</div>
            </div>

            <div class="ds-note">
              Files are <em>never overwritten</em> — each sync creates a new versioned file.<br>
              Share the folder in Drive to collaborate with others.
            </div>

            ${!connected ? `
            <div class="ds-config-warn">
              ⚙️ Before connecting, make sure <code>CLIENT_ID</code> is configured in the
              DriveSync module and your domain is listed as an <em>Authorized JavaScript origin</em>
              in Google Cloud Console.
            </div>` : ''}

          </div>
          <div class="modal-foot" style="flex-wrap:wrap;gap:8px">
            <div class="modal-btn cancel" onclick="closeModal()">Close</div>
            ${connected
              ? `<div class="modal-btn" style="background:var(--surface2);color:var(--text)"
                      onclick="closeModal();DriveSync.manualSync()">🔄 Sync now</div>
                 <div class="modal-btn" style="background:var(--accent-light);color:var(--accent-text);border:1.5px solid var(--row-ok-border)"
                      onclick="closeModal();DriveSync.pickSharedFolder()">🔗 Link shared file</div>
                 <div class="modal-btn danger-btn"
                      onclick="closeModal();DriveSync.disconnect()">Disconnect</div>`
              : `<div class="modal-btn confirm"
                      onclick="closeModal();DriveSync.connect()">Connect Google Drive</div>`
            }
          </div>
          <div class="ds-pwa-strip" onclick="closeModal();showPWAInstructions()">
            <div class="ds-pwa-strip__icon">📲</div>
            <div>
              <div class="ds-pwa-strip__title">Install app on device</div>
              <div class="ds-pwa-strip__sub">Add to home screen (iOS / Android)</div>
            </div>
          </div>
        `);
        },

        async connect() {
          try {
            await Auth.ensureToken();
            _setStatus('connected', '☁️ Drive connected');
            _startTimer();
            if (typeof toast === 'function') toast('✅ Google Drive connected');
            await Sync.run('manual');
          } catch (e) {
            _setStatus('error', '⚠️ Could not connect to Drive');
            if (typeof toast === 'function') toast('❌ Drive connection failed');
            console.error('[DriveSync] connect error:', e);
          }
        },

        disconnect() {
          clearInterval(_syncTimer);
          _syncTimer = null;
          Auth.revoke();
        },

        manualSync() {
          Sync.run('manual');
        },

        /** Elege uma pasta como ativa, descartando a outra como duplicata */
        resolveFolder(chosenId) {
          const meta = _loadMeta();
          // Identifica qual é a outra pasta
          const otherId = chosenId === meta.folderId
            ? meta.duplicateFolderId
            : meta.folderId;

          // Busca metadados da pasta escolhida para recompor ownedByMe
          // A pasta escolhida pode ser a atual (ownedByMe já gravado) ou a duplicata (invertido)
          const chosenIsCurrentlyInUse = chosenId === meta.folderId;
          const chosenOwnedByMe = chosenIsCurrentlyInUse
            ? meta.folderOwnedByMe
            : !meta.folderOwnedByMe; // duplicata tem ownership inversa

          _folderId = chosenId;
          _saveMeta({
            folderId: chosenId,
            folderOwnedByMe: chosenOwnedByMe,
            duplicateFolderId: otherId || null,   // mantém o outro como duplicata para oferecer lixeira
            lastFile: null,
            lastSync: null,
          });

          if (typeof closeModal === 'function') closeModal();
          if (typeof toast === 'function') toast('📁 Folder switched — syncing…');
          if (typeof window.updateSyncBadge === 'function') window.updateSyncBadge();
          Sync.run('resolve');
          // Reabre o painel atualizado após sync
          setTimeout(() => window.DriveSync.openPanel(), 3500);
        },

        /**
         * Abre o Google Picker para vincular uma pasta compartilhada.
         * Chamado pelo botão no startup modal e pelo botão "Link folder" no painel Drive.
         * Resolve o problema central: introduz o folderId ao escopo drive.file
         * sem depender de queries de descoberta (sharedWithMe / allDrives).
         */
        /**
         * Abre o Picker para o usuário Shared vincular o arquivo Shop-List-Sync.json
         * do dono. O fileId selecionado é gravado como syncFileId — o Sync.run
         * opera diretamente sobre ele, sem query de descoberta e sem drive.readonly.
         */
        async pickSharedFolder() {
          try {
            const token = await Auth.ensureToken();
            if (typeof toast === 'function') toast('📂 Select the Shop-List-Sync.json file…');
            await Picker.load();

            let picked;
            try {
              picked = await Picker.open(token, 'file');  // modo arquivo
            } catch (e) {
              if (e.message === 'picker-cancelled') return;
              throw e;
            }

            // Valida que o arquivo selecionado tem o nome correto
            if (picked.name !== Drive.SYNC_FILENAME) {
              if (typeof toast === 'function')
                toast(`⚠️ Please select the file named "${Drive.SYNC_FILENAME}"`);
              return;
            }

            // Grava syncFileId — Sync.run usará este ID diretamente, sem busca na pasta
            _folderId = null;
            _saveMeta({
              syncFileId: picked.id,
              folderId: picked.parentId || null,
              folderOwnedByMe: false,   // arquivo do dono → pasta não é própria
              duplicateFolderId: null,
              lastFile: Drive.SYNC_FILENAME,
              lastSync: null,
              pickedManually: true,
            });

            _setStatus('connected', '☁️ Drive connected');
            _startTimer();
            if (typeof toast === 'function')
              toast('✅ File linked: ' + picked.name + ' — syncing…');
            if (typeof window.updateSyncBadge === 'function') window.updateSyncBadge();

            await Sync.run('manual');
            setTimeout(() => window.DriveSync.openPanel(), 1800);

          } catch (e) {
            console.error('[DriveSync] pickSharedFolder error:', e);
            if (typeof toast === 'function') toast('❌ Could not link file: ' + e.message);
          }
        },

        /** Move uma pasta para a lixeira do Drive via API */
        async trashFolder(folderId, isCurrentlyInUse) {
          if (isCurrentlyInUse) {
            const meta = _loadMeta();
            if (!meta.duplicateFolderId) {
              if (typeof toast === 'function') toast('⚠️ Cannot trash the only folder in use');
              return;
            }
            // Troca para a outra antes de deletar
            await window.DriveSync.resolveFolder(meta.duplicateFolderId);
            await new Promise(r => setTimeout(r, 500));
          }

          try {
            await Auth.ensureToken();
            await Drive._api('/files/' + folderId, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ trashed: true }),
            });

            // Limpa o registro da pasta descartada
            const meta = _loadMeta();
            const patch = {};
            if (meta.duplicateFolderId === folderId) patch.duplicateFolderId = null;
            if (meta.folderId === folderId) { patch.folderId = null; _folderId = null; }
            _saveMeta(patch);

            if (typeof closeModal === 'function') closeModal();
            if (typeof toast === 'function') toast('🗑 Folder moved to Drive trash');
            if (typeof window.updateSyncBadge === 'function') window.updateSyncBadge();
            setTimeout(() => window.DriveSync.openPanel(), 600);
          } catch (e) {
            console.error('[DriveSync] trashFolder error:', e);
            if (typeof toast === 'function') toast('❌ Could not move folder to trash');
          }
        },
      };

      // ─── HOOK NO save() EXISTENTE ───────────────────────────────────────────────
      // Aguarda o DOM+scripts estarem prontos, então patcha o save global
      document.addEventListener('DOMContentLoaded', () => {
        // Patch não-destrutivo: envolve o save() original
        const _origSave = window.save;
        if (typeof _origSave === 'function') {
          window.save = function (...args) {
            _origSave.apply(this, args);
            window.DriveSync.afterSave();
          };
        }

        // Inicializa o módulo
        window.DriveSync.init();
      });

    })();
  </script>
</body>

</html>
