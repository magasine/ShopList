<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Shop List</title>
  <meta name="theme-color" content="#00796B" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0E1621" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shop List">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      /* ── Light Theme — MD3 Futuristic ── */

      /* Base surfaces: fundo frio mineral com leve tint cyan */
      --bg: #F2F5F8;
      --surface: #FFFFFF;
      --surface2: #EBF0F5;

      /* Borders */
      --border: #CDD8E0;
      --border2: #AABBC8;

      /* Typography */
      --text: #0D1B2A;
      --text2: #4A6070;
      --text3: #8AA0AE;

      /* Accent — Teal Esmeralda MD3 */
      --accent: #00796B;
      --accent-light: #E0F2F1;
      --accent-text: #004D40;

      /* Warn — âmbar dourado */
      --warn: #B45309;
      --warn-light: #FEF3C7;

      /* Crit — coral-vermelho */
      --crit: #C62828;
      --crit-light: #FFEBEE;

      /* Purple — Índigo elétrico para destaques UI */
      --purple: #3F51B5;
      --purple-light: #E8EAF6;

      /* Radii & shadows */
      --radius: 10px;
      --radius-lg: 16px;
      --shadow: 0 1px 4px rgba(13, 27, 42, 0.08);
      --transition: 0.16s cubic-bezier(0.4, 0, 0.2, 1);

      /* Row semantic tints */
      --row-off: #FFF8F0;
      --row-off-border: #F5D9B0;
      --row-off-hover: #FDEFD6;
      --row-ok: #E8F5F3;
      --row-ok-border: #A7D7D2;
      --row-ok-hover: #D0EDEA;
      --row-crit: #FFEBEE;
      --row-crit-border: #FFCDD2;
      --row-crit-hover: #FFCDD2;

      /* Filter badge fills */
      --filter-ok-bg: #D0EDEA;
      --filter-ok-hover: #B2DDD9;
      --filter-warn-bg: #FDEFD6;
      --filter-warn-hover: #FADDAA;
      --filter-crit-bg: #FFCDD2;
      --filter-crit-hover: #FFAAB3;

      /* Header / Footer */
      --header-bg: linear-gradient(135deg, #E4EEF5 0%, #EBF3F8 45%, #E2EBF5 100%);
      --footer-bg: linear-gradient(135deg, #E2EBF5 0%, #EBF3F8 55%, #E4EEF5 100%);
      --header-border: rgba(0, 121, 107, 0.14);

      /* Typography Scaling */
      --fs-xs: 11px;
      --fs-sm: 13px;
      --fs-base: 15px;
      --fs-md: 17px;
      --fs-lg: 19px;
      --fs-xl: 24px;
    }

    [data-theme="dark"] {
      /* ── Dark Theme — MD3 Futuristic ──
         Cada camada tem matiz distinto (petróleo → slate → ardósia)
         eliminando qualquer ambiguidade entre bg / surface / surface2.  */

      --bg: #0E1621;
      /* azul-noite profundo */
      --surface: #162030;
      /* slate com tint petróleo — claramente mais claro */
      --surface2: #1E2D3E;
      /* azul-ardósia — terceiro nível inequívoco */

      --border: #2B3D52;
      /* azul-grafite */
      --border2: #3C5268;
      /* azul-aço médio */

      --text: #E6EFF6;
      /* branco-azulado */
      --text2: #7AABC6;
      /* azul-gelo — muito distinto de --text */
      --text3: #3F6178;
      /* ardósia escura — guia / placeholder */

      /* Accent — Teal vibrante no escuro */
      --accent: #26C6BA;
      --accent-light: #0A2826;
      --accent-text: #80DEDB;

      /* Warn — âmbar saturado */
      --warn: #FFB300;
      --warn-light: #261C00;

      /* Crit — coral néon */
      --crit: #EF5350;
      --crit-light: #2A0808;

      /* Purple — violeta elétrico */
      --purple: #7C83FF;
      --purple-light: #181B40;

      /* Header / Footer — petróleo com shimmer index */
      --header-bg: linear-gradient(135deg, #0E1820 0%, #122030 50%, #0E1620 100%);
      --footer-bg: linear-gradient(135deg, #0E1620 0%, #122030 50%, #0E1820 100%);
      --header-border: rgba(38, 198, 186, 0.15);

      /* Rows — cores de fundo inconfundíveis entre si */
      --row-off: #1E1200;
      /* âmbar-bordô quentinho */
      --row-off-border: #5C3800;
      --row-off-hover: #261800;

      --row-ok: #041E1C;
      /* teal-verde profundo */
      --row-ok-border: #0A4040;
      --row-ok-hover: #082422;

      --row-crit: #200608;
      /* vermelho-bordô saturado */
      --row-crit-border: #601010;
      --row-crit-hover: #2A0808;

      /* Filter badges vivos e distintos */
      --filter-ok-bg: #0A3030;
      --filter-ok-hover: #103C3A;
      --filter-warn-bg: #281A00;
      --filter-warn-hover: #342200;
      --filter-crit-bg: #300808;
      --filter-crit-hover: #3E1010;
    }

    /* Mobile Typography Adjustments */
    @media (max-width: 480px) {
      :root {
        --fs-xs: 12px;
        --fs-sm: 14px;
        --fs-base: 16px;
        --fs-md: 18px;
        --fs-lg: 20px;
        --fs-xl: 26px;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background var(--transition), color var(--transition);
    }

    #app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: var(--surface);
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 60px rgba(13, 27, 42, 0.12);
    }

    #title-link {
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      text-overflow: ellipsis;
    }

    #title-link:hover {
      cursor: pointer;
    }

    /* HEADER */
    #header {
      padding: 14px 16px 0;
      background: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
      position: -webkit-sticky;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    #header-top {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      justify-content: flex-end;
      flex-wrap: nowrap;
      /* linha única; botões não somem */
      min-width: 0;
      /* permite shrink interno */
      overflow: visible;
    }

    #app-title {
      font-size: var(--fs-md);
      font-weight: 600;
      letter-spacing: -0.3px;
      display: flex;
      align-items: baseline;
      gap: 5px;
      flex-shrink: 1;
      /* pode encolher se necessário */
      min-width: 0;
      flex-wrap: wrap;
      /* timestamp quebra p/ 2ª linha se não couber */
    }

    /* "Shop List" — nome principal, opacidade plena */
    .title-main {
      opacity: 1;
    }

    /* "Semaphore" — sufixo do app, mais discreto */
    .title-suffix {
      opacity: 0.42;
      font-weight: 400;
    }

    /* Timestamp de dados — mais contrastado que antes */
    #app-title span#title-sub {
      color: var(--text2);
      font-weight: 500;
      font-size: var(--fs-xs);
      font-family: 'DM Mono', monospace;
      white-space: nowrap;
      opacity: 0.88;
      letter-spacing: 0.02em;
    }

    /* ─── Grupo de controles na linha 1 (sort · traffic · search · close) ─── */
    .header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-left: auto;
      /* empurra para a direita sem flex:1 no título */
    }

    /* ─── Botão toggle 🚦 ───────────────────────────────────────────────── */
    #btn-traffic {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      transition: all var(--transition);
      flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(13, 27, 42, 0.06);
      -webkit-tap-highlight-color: transparent;
    }

    #btn-traffic:hover {
      background: var(--border);
    }

    #btn-traffic.active {
      background: var(--surface2);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0, 121, 107, 0.18);
    }

    /* ─── Segunda linha: filtros crit/warn/ok ────────────────────────────── */
    #filter-bar {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.22s ease, padding 0.22s ease;
      padding: 0;
    }

    #filter-bar.open {
      max-height: 56px;
      padding: 4px 0 10px;
    }

    .filter-badge-group {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    /* Divider vertical dentro do grupo de filtros */
    /* .filter-divider {
      width: 1px;
      height: 20px;
      background: var(--border2);
      flex-shrink: 0;
      margin: 0 2px;
    } */

    /* ── Botões de filtro: mesma base visual que .hbtn ── */
    .filter-btn {
      width: 40px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: var(--fs-sm);
      transition: all var(--transition);
      flex-shrink: 0;
      background: var(--surface2);
      color: var(--text2);
      box-shadow: 0 1px 3px rgba(13, 27, 42, 0.06);
      -webkit-tap-highlight-color: transparent;
    }

    .filter-btn:hover {
      background: var(--border);
      transform: scale(0.95);
    }

    /* Estado ativo: ring de foco accent (igual ao .hbtn.active) */
    .filter-btn[data-active="true"] {
      background: var(--surface2);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0, 121, 107, 0.18);
    }

    [data-theme="dark"] .filter-btn[data-active="true"] {
      box-shadow: 0 0 0 2px rgba(38, 198, 186, 0.18);
    }

    .filter-btn[data-active="true"]:hover {
      background: var(--border);
    }

    /* Req 2 — Botão fav minimalista dentro do search-wrap */
    #search-fav-btn {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 15px;
      color: var(--text3);
      background: none;
      border: none;
      border-radius: 7px;
      transition: color var(--transition), transform var(--transition);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      line-height: 1;
    }

    #search-fav-btn:active {
      transform: scale(0.82);
    }

    #search-fav-btn.on {
      color: #F5C518;
    }

    [data-theme="dark"] #search-fav-btn.on {
      color: #F5C518;
    }

    /* Req 3 — sec-label-count herda a cor de sec-label-text (accent) */
    .sec-label-count {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-light);
      border: 1px solid var(--row-ok-border);
      border-radius: 20px;
      padding: 1px 7px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    #btn-sort {
      width: 40px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text2);
      transition: all var(--transition);
      flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(13, 27, 42, 0.06);
    }

    #btn-sort:hover {
      background: var(--border);
    }

    #btn-sort.active {
      background: var(--purple-light);
      border-color: var(--purple);
      color: var(--purple);
      box-shadow: 0 0 0 2px rgba(63, 81, 181, 0.15);
    }

    #btn-sort.fav-active {
      background: var(--purple-light);
      border-color: var(--purple);
      color: var(--purple);
      box-shadow: 0 0 0 2px rgba(63, 81, 181, 0.15);
    }

    [data-theme="dark"] #btn-sort.active,
    [data-theme="dark"] #btn-sort.fav-active {
      background: var(--purple-light);
      border-color: var(--purple);
      color: var(--purple);
      box-shadow: 0 0 0 2px rgba(124, 131, 255, 0.18);
    }

    .right-buttons {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .hbtn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      color: var(--text2);
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
      flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(13, 27, 42, 0.06);
    }

    .hbtn:hover {
      background: var(--border);
      box-shadow: 0 2px 6px rgba(13, 27, 42, 0.10);
    }

    .hbtn.active {
      background: var(--purple-light);
      border-color: var(--purple);
      color: var(--purple);
      box-shadow: 0 0 0 2px rgba(63, 81, 181, 0.15);
    }

    /* SEARCH BAR */
    #search-bar {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.22s ease, padding 0.22s ease;
      padding: 0;
    }

    #search-bar.open {
      max-height: 64px;
      /* era 52 — aumentado para acomodar padding-top */
      padding: 6px 0 10px;
      /* padding-top cria o espaço interno que evita o clip da borda */
    }

    #search-wrap {
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0 12px;
      gap: 8px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    #search-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 121, 107, 0.12);
    }

    [data-theme="dark"] #search-wrap:focus-within {
      box-shadow: 0 0 0 3px rgba(38, 198, 186, 0.14);
    }

    #search-wrap svg {
      color: var(--text3);
      flex-shrink: 0;
    }

    #search-input {
      -webkit-flex: 1;
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: var(--fs-sm);
      /* iOS: impede zoom automático ao focar — font-size mínimo 16px no input */
      font-size: max(16px, var(--fs-sm));
      color: var(--text);
      padding: 10px 0;
      outline: none;
      /* Remove aparência nativa no Safari */
      -webkit-appearance: none;
      appearance: none;
    }

    #search-input::placeholder {
      color: var(--text3);
    }

    #search-clear {
      font-size: var(--fs-xs);
      color: var(--purple);
      font-weight: 500;
      cursor: pointer;
      padding: 4px;
    }

    /* TABS */
    #tabs {
      display: flex;
      gap: 0;
      padding-bottom: 0;
      border-top: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 11px 4px;
      font-size: var(--fs-base);
      font-weight: 600;
      color: var(--text3);
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      transition: color var(--transition), border-color var(--transition), background var(--transition);
      user-select: none;
      letter-spacing: 0.01em;
    }

    .tab:hover {
      color: var(--text2);
      background: var(--surface2);
    }

    .tab.active {
      color: var(--accent);
      border-bottom: 2.5px solid var(--accent);
      background: transparent;
    }

    .tab-badge {
      display: inline-block;
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      background: var(--surface2);
      color: var(--text3);
      border-radius: 20px;
      padding: 1px 6px;
      margin-left: 3px;
      border: 1px solid var(--border);
    }

    .tab.active .tab-badge {
      background: var(--accent-light);
      color: var(--accent-text);
      border-color: var(--row-ok-border);
    }

    /* PANELS */
    #panels {
      -webkit-flex: 1;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      /* Evita flash de borda no Safari ao scrollar */
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    /* Painel de Estoque: contexto de scroll para stock-header sticky */
    #panel-1 {
      display: none;
      -webkit-flex-direction: column;
      flex-direction: column;
    }

    #panel-1.active {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
    }

    /* Remove aparência nativa do Safari em inputs de texto e número */
    input[type="text"],
    input[type="number"],
    input[type="search"] {
      -webkit-appearance: none;
      appearance: none;
      border-radius: 0;
    }

    /* EMPTY STATE */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 56px 32px 40px;
      gap: 10px;
      min-height: 240px;
    }

    .empty-icon {
      font-size: 40px;
      line-height: 1;
      margin-bottom: 4px;
      opacity: 0.85;
    }

    .empty-title {
      font-size: var(--fs-md);
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    .empty-sub {
      font-size: var(--fs-sm);
      color: var(--text3);
      line-height: 1.5;
      max-width: 240px;
    }

    .empty-action {
      margin-top: 8px;
      font-size: var(--fs-sm);
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-light);
      border: 1px solid var(--row-ok-border);
      border-radius: 9px;
      padding: 8px 18px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background var(--transition), transform var(--transition);
      -webkit-tap-highlight-color: transparent;
    }

    .empty-action:active {
      transform: scale(0.94);
    }

    /* SECTION LABEL */
    .sec-label {
      font-size: var(--fs-base);
      font-weight: 500;
      letter-spacing: 0.10em;
      color: var(--accent);
      padding: 10px 16px 6px;
      text-transform: capitalize;
      font-family: 'DM Mono', monospace;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      opacity: 0.92;
    }

    /* .sec-label::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 11px;
      border-radius: 2px;
      background: var(--accent);
      flex-shrink: 0;
      opacity: 0.7;
    } */

    /* Texto da seção — ocupa espaço disponível */
    .sec-label-text {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Pill com contagem de itens na seção — ver Req 3 abaixo */

    /* Botão ⋯ de ações da seção */
    .sec-menu-btn {
      width: 24px;
      height: 24px;
      border-radius: 7px;
      border: 1px solid transparent;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text3);
      font-size: 15px;
      font-family: 'DM Mono', monospace;
      flex-shrink: 0;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -1px;
    }

    .sec-menu-btn:hover {
      background: var(--border);
      color: var(--text2);
      border-color: var(--border2);
    }

    /* Sec-label variante: busca textual ativa */
    .sec-label.sec-search {
      color: var(--purple);
      background: var(--purple-light);
      border-bottom-color: var(--border);
      opacity: 1;
    }

    .sec-label.sec-search::before {
      background: var(--purple);
    }

    /* Dropdown de ações da seção */
    .sec-action-menu {
      position: fixed;
      z-index: 500;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 32px rgba(13, 27, 42, 0.18);
      min-width: 210px;
      overflow: hidden;
      animation: acFadeIn 0.14s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] .sec-action-menu {
      box-shadow: 0 10px 32px rgba(0, 0, 0, 0.40);
    }

    .sec-action-header {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 9px 14px 7px;
      background: var(--accent-light);
      border-bottom: 1px solid var(--border);
    }

    .sec-action-header.danger-header {
      color: var(--crit);
      background: var(--crit-light);
    }

    .sec-action-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      font-size: var(--fs-sm);
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
      -webkit-tap-highlight-color: transparent;
    }

    .sec-action-item:last-child {
      border-bottom: none;
    }

    .sec-action-item:hover {
      background: var(--surface2);
    }

    .sec-action-item.danger {
      color: var(--crit);
    }

    .sec-action-item.danger:hover {
      background: var(--crit-light);
    }

    .sec-action-icon {
      font-size: 15px;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    /* Inline rename input dentro do sec-label */
    .sec-label-input {
      flex: 1;
      border: none;
      background: var(--surface);
      color: var(--text);
      font-size: var(--fs-xs);
      font-weight: 700;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      border-radius: 5px;
      padding: 2px 6px;
      outline: none;
      border: 1.5px solid var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 121, 107, 0.12);
    }

    [data-theme="dark"] .sec-label-input {
      box-shadow: 0 0 0 3px rgba(38, 198, 186, 0.14);
    }

    /* ITEM ROW */
    .item-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      /* border-bottom: 1px solid var(--border); */
      gap: 12px;
      transition: background var(--transition);
    }

    /* Status indicator: minimalist border-left only — no background tinting */
    .stock-row.row-off,
    .item-row.row-off {
      border-left: 3px solid var(--warn);
      padding-left: 13px;
    }

    .stock-row.row-ok,
    .item-row.row-ok {
      border-left: 3px solid var(--accent);
      padding-left: 13px;
    }

    .stock-row.row-crit,
    .item-row.row-crit {
      border-left: 3px solid var(--crit);
      padding-left: 13px;
    }

    .stock-row.row-warn,
    .item-row.row-warn {
      border-left: 3px solid var(--warn);
      padding-left: 13px;
    }

    .item-cb {
      width: 20px;
      height: 20px;
      border-radius: 7px;
      border: 1.5px solid var(--border2);
      background: var(--surface);
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
    }

    .item-cb:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 121, 107, 0.10);
    }

    .item-cb.on {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 2px 6px rgba(0, 121, 107, 0.25);
    }

    [data-theme="dark"] .item-cb.on {
      box-shadow: 0 2px 6px rgba(38, 198, 186, 0.25);
    }

    .item-cb svg {
      display: none;
      color: #fff;
    }

    .item-cb.on svg {
      display: block;
    }

    .item-info {
      flex: 1;
      min-width: 0;
      cursor: pointer;
    }

    .item-name {
      font-size: var(--fs-base);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-sub {
      font-size: var(--fs-xs);
      color: var(--text2);
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
    }

    /* .status-tag {
      font-size: var(--fs-xs);
      font-weight: 500;
      border-radius: 6px;
      padding: 2px 8px;
      flex-shrink: 0;
      font-family: 'DM Mono', monospace;
    } */

    .tag-ok {
      background: var(--accent-light);
      color: var(--accent-text);
    }

    .tag-warn {
      background: var(--warn-light);
      color: var(--warn);
    }

    .tag-crit {
      background: var(--crit-light);
      color: var(--crit);
    }

    /* ===================== SWIPE ROW SYSTEM ===================== */
    .swipe-wrap {
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    .swipe-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    .swipe-bg-left {
      background: linear-gradient(90deg, var(--crit) 70%, transparent 100%);
      justify-content: flex-start;
      padding-left: 20px;
      color: #fff;
      font-size: 18px;
      opacity: 0;
      transition: opacity 0.12s ease;
    }

    .swipe-bg-right {
      background: linear-gradient(270deg, var(--accent) 70%, transparent 100%);
      justify-content: flex-end;
      padding-right: 20px;
      color: #fff;
      font-size: 18px;
      opacity: 0;
      transition: opacity 0.12s ease;
    }

    .swipe-content {
      position: relative;
      z-index: 1;
      background: inherit;
      will-change: transform;
      transition: transform 0.22s cubic-bezier(0.25, 1, 0.5, 1);
      touch-action: pan-y;
    }

    .swipe-wrap.swiping .swipe-content {
      transition: none;
    }

    .swipe-wrap.snap-back .swipe-content {
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* ===================== FAVORITE BUTTON (ícone limpo) ===================== */
    .fav-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text3);
      background: none;
      border: none;
      border-radius: 8px;
      padding: 0;
      flex-shrink: 0;
      transition: color var(--transition), transform var(--transition);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .fav-btn:active {
      transform: scale(0.82);
    }

    .fav-btn.on {
      color: #F5C518;
    }

    [data-theme="dark"] .fav-btn.on {
      color: #F5C518;
    }

    /* dark-mode fav button: OFF state inherits .filter-btn base (surface2 / text2 / border);
       ON state is handled by [data-active="true"] selector above */

    /* Item row when favorited — star button only; no border-left (avoids conflict with status indicator) */
    /* .item-row.fav-on, .stock-row.fav-on, .buy-row.fav-on — border suppressed intentionally */

    /* Sort button active state for fav mode */

    /* STOCK ROWS */
    .stock-header {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      padding: 8px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      position: -webkit-sticky;
      position: sticky;
      top: 0;
      z-index: 10;
      /* Sombra sutil ao ficar fixo */
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
    }

    .stock-header-name {
      flex: 1;
      font-size: var(--fs-xs);
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
    }

    .stock-header-col {
      width: 92px;
      font-size: var(--fs-xs);
      font-weight: 600;
      color: var(--text3);
      text-align: center;
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
    }

    .stock-row {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      /* border-bottom: 1px solid var(--border); */
      gap: 10px;
    }

    .stock-name {
      flex: 1;
      min-width: 0;
    }

    /* STEPPER */
    .stepper-wrap {
      width: 92px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    /* Req 1 — Min stepper: oculto por padrão, revelado quando "current" ganha foco */
    .stepper-wrap.stepper-min-wrap {
      max-width: 0;
      width: 0;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: max-width 0.22s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.18s cubic-bezier(0.4, 0, 0.2, 1),
        width 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stepper-wrap.stepper-min-wrap.min-visible {
      max-width: 92px;
      width: 92px;
      opacity: 1;
      pointer-events: auto;
    }

    .stepper {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
      width: 100%;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .stepper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 2.5px rgba(0, 121, 107, 0.12);
    }

    [data-theme="dark"] .stepper:focus-within {
      box-shadow: 0 0 0 2.5px rgba(38, 198, 186, 0.15);
    }

    .stepper-btn {
      width: 30px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      font-weight: 300;
      color: var(--text2);
      background: var(--surface2);
      border: none;
      flex-shrink: 0;
      transition: background var(--transition), color var(--transition);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .stepper-btn:active {
      background: var(--accent-light);
      color: var(--accent);
    }

    .stepper-btn.minus {
      border-right: 1px solid var(--border);
      border-radius: 0;
    }

    .stepper-btn.plus {
      border-left: 1px solid var(--border);
      border-radius: 0;
    }

    .stepper-val {
      flex: 1;
      text-align: center;
      font-size: var(--fs-sm);
      font-family: 'DM Mono', monospace;
      font-weight: 600;
      color: var(--text);
      border: none;
      background: transparent;
      outline: none;
      width: 0;
      min-width: 0;
      padding: 0;
      cursor: text;
    }

    /* Remove native number spinners */
    .stepper-val::-webkit-inner-spin-button,
    .stepper-val::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .stepper-val[type=number] {
      -moz-appearance: textfield;
    }

    .stepper-label {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.05em;
    }

    /* COMPRAS */
    .buy-row {
      display: flex;
      align-items: flex-start;
      padding: 12px 16px;
      /* border-bottom: 1px solid var(--row-crit-border); */
      gap: 12px;
      border-left: 3px solid var(--crit);
    }

    .buy-row.done {
      opacity: 0.72;
      background: var(--surface2);
      border-left-color: var(--accent);
      border-bottom-color: var(--border);
    }

    .buy-row.done .item-name {
      text-decoration: line-through;
    }

    .buy-cb {
      width: 20px;
      height: 20px;
      border-radius: 10px;
      border: 1.5px solid var(--border2);
      background: var(--surface);
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .buy-cb.on {
      background: var(--accent);
      border-color: var(--accent);
    }

    .buy-cb svg {
      display: none;
      color: #fff;
    }

    .buy-cb.on svg {
      display: block;
    }

    .buy-info {
      flex: 1;
      min-width: 0;
    }

    .buy-deficit {
      flex-shrink: 0;
      margin-left: auto;
      font-size: max(16px, var(--fs-sm));
      font-family: 'DM Mono', monospace;
      color: var(--crit);
      font-weight: 700;
      background: var(--crit-light);
      border: 1.5px solid var(--row-crit-border);
      border-radius: 8px;
      padding: 3px 10px;
      min-width: 38px;
      text-align: center;
    }

    /* FOOTER */
    #footer {
      position: -webkit-sticky;
      position: sticky;
      bottom: 0;
      background: var(--footer-bg);
      border-top: 1px solid var(--header-border);
      padding: 8px 12px;
      padding-bottom: max(8px, calc(8px + env(safe-area-inset-bottom, 0px)));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    /* Grupo de ícones à esquerda */
    #footer-left {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    /* Separador vertical */
    /* .footer-divider {
      width: 1px;
      height: 20px;
      background: var(--border2, var(--border));
      flex-shrink: 0;
      margin: 0 4px;
    } */

    /* Botões de ícone no rodapé */
    .fbtn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text2);
      flex-shrink: 0;
      transition: background var(--transition), color var(--transition),
        border-color var(--transition), transform var(--transition), box-shadow var(--transition);
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 1px 3px rgba(13, 27, 42, 0.06);
    }

    .fbtn:active {
      transform: scale(0.88);
    }

    .fbtn:hover {
      background: var(--border);
      box-shadow: 0 2px 6px rgba(13, 27, 42, 0.10);
    }

    /* Botão Compartilhar */
    #share-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: var(--fs-sm);
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--accent) 0%, #00897B 100%);
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background var(--transition), transform var(--transition),
        box-shadow var(--transition);
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 3px 10px rgba(0, 121, 107, 0.30);
    }

    #share-btn:hover {
      background: linear-gradient(135deg, #00695C 0%, #00796B 100%);
      box-shadow: 0 4px 14px rgba(0, 121, 107, 0.38);
    }

    #share-btn:active {
      transform: scale(0.93);
      box-shadow: none;
    }

    [data-theme="dark"] #share-btn {
      background: linear-gradient(135deg, #00897B 0%, #26C6BA 100%);
      box-shadow: 0 3px 10px rgba(38, 198, 186, 0.28);
    }

    [data-theme="dark"] #share-btn:hover {
      background: linear-gradient(135deg, #26C6BA 0%, #00BCD4 100%);
    }

    /* Botão Adicionar */
    #add-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: var(--fs-sm);
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-light);
      border: 1.5px solid var(--row-ok-border);
      border-radius: 10px;
      padding: 8px 14px;
      cursor: pointer;
      flex-shrink: 0;
      margin-left: auto;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 1px 4px rgba(0, 121, 107, 0.12);
    }

    #add-btn:hover {
      background: var(--filter-ok-bg);
      box-shadow: 0 2px 8px rgba(0, 121, 107, 0.18);
    }

    #add-btn:active {
      transform: scale(0.93);
    }

    /* MODAL */
    #overlay {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      background: rgba(13, 27, 42, 0.55);
      z-index: 200;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      padding: 20px;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
    }

    #overlay.open {
      display: -webkit-flex;
      display: flex;
    }

    .modal {
      background: var(--surface);
      border-radius: 20px;
      width: 100%;
      max-width: 360px;
      border: 1px solid var(--border);
      overflow: hidden;
      animation: slideUp 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 20px 60px rgba(13, 27, 42, 0.22);
    }

    [data-theme="dark"] .modal {
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    @keyframes slideUp {
      from {
        -webkit-transform: translateY(24px) scale(0.97);
        transform: translateY(24px) scale(0.97);
        opacity: 0;
      }

      to {
        -webkit-transform: translateY(0) scale(1);
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    @-webkit-keyframes slideUp {
      from {
        -webkit-transform: translateY(24px) scale(0.97);
        opacity: 0;
      }

      to {
        -webkit-transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    .modal-header {
      padding: 22px 22px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .modal-title {
      font-size: var(--fs-md);
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .modal-sub {
      font-size: var(--fs-xs);
      color: var(--text2);
      font-family: 'DM Mono', monospace;
      margin-top: 5px;
      line-height: 1.4;
    }

    .modal-body {
      padding: 16px 22px 20px;
    }

    .modal-label {
      font-size: var(--fs-sm);
      color: var(--text2);
      margin-bottom: 8px;
      display: block;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .modal-input-big {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      font-size: var(--fs-xl);
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      text-align: center;
      background: var(--surface2);
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .modal-input-big:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 121, 107, 0.12);
    }

    [data-theme="dark"] .modal-input-big:focus {
      box-shadow: 0 0 0 3px rgba(38, 198, 186, 0.14);
    }

    .modal-foot {
      display: flex;
      border-top: 1px solid var(--border);
    }

    .modal-btn {
      flex: 1;
      padding: 16px;
      text-align: center;
      font-size: var(--fs-sm);
      cursor: pointer;
      font-weight: 600;
      transition: background var(--transition);
    }

    .modal-btn:hover {
      background: var(--surface2);
    }

    .modal-btn.cancel {
      color: var(--text2);
      border-right: 1px solid var(--border);
    }

    .modal-btn.confirm {
      color: var(--accent);
    }

    .modal-btn.danger-btn {
      color: var(--crit);
    }

    /* CONFIG PANEL */
    .cfg-row {
      display: flex;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      gap: 14px;
      cursor: pointer;
    }

    .cfg-row:hover {
      background: var(--surface2);
    }

    .cfg-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .cfg-icon.exp {
      background: var(--accent-light);
      color: var(--accent);
    }

    .cfg-icon.imp {
      background: #E3F0FC;
      color: #1565C0;
    }

    [data-theme="dark"] .cfg-icon.imp {
      background: #0D1E3A;
      color: #64B5F6;
    }

    .cfg-icon.cpy {
      background: var(--purple-light);
      color: var(--purple);
    }

    .cfg-icon.theme {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .cfg-text {
      flex: 1;
    }

    .cfg-title {
      font-size: var(--fs-base);
      font-weight: 500;
    }

    .cfg-desc {
      font-size: var(--fs-xs);
      color: var(--text2);
      margin-top: 2px;
    }

    .cfg-note {
      font-size: 10px;
      color: var(--text3);
      padding: 16px;
      font-family: 'DM Mono', monospace;
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--text);
      color: var(--surface);
      font-size: var(--fs-sm);
      font-weight: 500;
      border-radius: 24px;
      padding: 11px 22px;
      opacity: 0;
      transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 300;
      white-space: nowrap;
      pointer-events: none;
      box-shadow: 0 8px 24px rgba(13, 27, 42, 0.22);
      letter-spacing: 0.01em;
    }

    [data-theme="dark"] #toast {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.40);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* BACKUP BANNER */
    #backup-banner {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--warn-light);
      border-bottom: 1px solid var(--row-off-border);
      padding: 10px 16px;
      font-size: var(--fs-xs);
      color: var(--warn);
      font-weight: 500;
      font-family: 'DM Mono', monospace;
      cursor: pointer;
      transition: background var(--transition);
    }

    #backup-banner.visible {
      display: flex;
    }

    #backup-banner:hover {
      background: var(--filter-warn-hover);
    }

      font-size: 16px;

  <script>
    // ==================== ICONS CENTRALIZADOS ====================
    const ICONS = {
      check: `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,
      chevron: `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>`,
      search: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>`,
      edit: `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
      trash: `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
      plus: `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>`,
      settings: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>`,
      close: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>`,
      starOff: `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
      starOn: `<svg width="14" height="14" fill="currentColor" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
    };

    // ==================== CONSTANTES E VARIÁVEIS ====================
    const STORAGE_KEY = 'Shop_List_v20260523';
    const THEME_KEY = 'Shop_List_theme';
    const UI_KEY = 'Shop_List_ui';
    const BACKUP_THRESHOLD = 10; // alterações antes de sugerir backup
    let items = [];
    let currentTab = 0;
    let searchQuery = '';
    let pendingDoneId = null;
    let changeCounter = 0;
    let bannerDismissed = false;
    let sortMode = 'az';          // 'az' | 'cat' | 'fav'
    let activeQuickFilter = '';   // '' | 'fav' | 'warn' | 'crit'

    // ==================== UTILITÁRIOS ====================
    function uid() {
      return 'id-' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36);
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), 2200);
    }

    // ==================== LOCALSTORAGE COM TRATAMENTO DE ERRO ====================
    let startupSavedAt = null; // timestamp da base encontrada no storage

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          // Suporte aos dois formatos: legado (array direto) e novo (objeto com .data)
          if (Array.isArray(parsed)) {
            items = parsed;
            startupSavedAt = null; // base legada sem timestamp
          } else if (parsed && Array.isArray(parsed.data)) {
            items = parsed.data;
            startupSavedAt = parsed.savedAt || null;
          } else {
            throw new Error('Formato de dados desconhecido');
          }
        } else {
          items = defaultItems();
          startupSavedAt = null;
        }
      } catch (e) {
        console.error('Erro ao carregar dados do localStorage:', e);
        toast('Corrupted data. Starting with default values.');
        items = defaultItems();
        startupSavedAt = null;
        try { localStorage.removeItem(STORAGE_KEY); } catch (_) { }
      }

      // Carregar tema
      try {
        const savedTheme = localStorage.getItem(THEME_KEY) || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
      } catch (e) {
        console.warn('Erro ao carregar tema:', e);
      }

      // Carregar preferências de UI (sortMode, filtro ativo)
      try {
        const rawUI = localStorage.getItem(UI_KEY);
        if (rawUI) {
          const ui = JSON.parse(rawUI);
          if (['az', 'cat', 'fav'].includes(ui.sortMode)) sortMode = ui.sortMode;
          if (['', 'fav', 'warn', 'crit'].includes(ui.activeQuickFilter)) activeQuickFilter = ui.activeQuickFilter;
        }
      } catch (e) {
        console.warn('Erro ao carregar preferências de UI:', e);
      }
    }

    // Formata o timestamp salvo de forma legível e calcula a idade da base
    function formatSavedAt(isoStr) {
      if (!isoStr) return { label: 'unknown date', age: '' };
      const d = new Date(isoStr);
      if (isNaN(d)) return { label: 'invalid date', age: '' };

      const now = new Date();
      const diffMs = now - d;
      const diffMin = Math.floor(diffMs / 60000);
      const diffH = Math.floor(diffMs / 3600000);
      const diffD = Math.floor(diffMs / 86400000);

      const pad = n => String(n).padStart(2, '0');
      const label = `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()}`
        + ` às ${pad(d.getHours())}:${pad(d.getMinutes())}`;

      let age;
      if (diffMin < 2) age = 'just now';
      else if (diffMin < 60) age = `${diffMin} minutes ago`;
      else if (diffH < 24) age = `${diffH} hour${diffH > 1 ? 's' : ''} ago`;
      else if (diffD === 1) age = 'yesterday';
      else if (diffD < 7) age = `${diffD} days ago`;
      else if (diffD < 30) age = `${Math.floor(diffD / 7)} week${Math.floor(diffD / 7) > 1 ? 's' : ''} ago`;
      else age = `${Math.floor(diffD / 30)} month(s) ago`;

      return { label, age };
    }

    function showStartupDialog() {
      if (!startupSavedAt && items !== defaultItems()) {
        // Legacy base without timestamp — don't block the user
        return;
      }
      if (!startupSavedAt) return; // first run, no prior data

      const { label, age } = formatSavedAt(startupSavedAt);
      const count = items.length;
      const inStock = items.filter(i => i.inStock).length;

      const diffD = Math.floor((new Date() - new Date(startupSavedAt)) / 86400000);
      const ageColor = diffD < 7 ? 'var(--accent)' : diffD < 30 ? 'var(--warn)' : 'var(--crit)';
      const ageIcon = diffD < 7 ? '🟢' : diffD < 30 ? '🟡' : '🔴';

      openModal(`
        <div class="modal-header">
          <div class="modal-title">Local database</div>
          <div class="modal-sub">Startup check</div>
        </div>
        <div class="modal-body">
          <div style="
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 4px;
          ">
            <div style="font-size:var(--fs-xs);color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.06em">Last saved</div>
            <div style="font-size:var(--fs-md);font-weight:600;color:var(--text)">${label}</div>
            <div style="font-size:var(--fs-sm);color:${ageColor};font-weight:500">${ageIcon} ${age}</div>
          </div>
          <div style="
            display: flex;
            gap: 8px;
            margin-top: 10px;

    function save() {
      try {
        // Remove _done antes de persistir — é estado de sessão, não de dados
        const toSave = items.map(({ _done, ...rest }) => rest);
        const payload = { savedAt: new Date().toISOString(), data: toSave };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        changeCounter++;
        if (changeCounter >= BACKUP_THRESHOLD && !bannerDismissed) {
          document.getElementById('backup-banner').classList.add('visible');
        }
      } catch (e) {
        console.error('Erro ao salvar no localStorage:', e);
        toast('Error saving data locally');
      }

    // ==================== STATUS ====================
    function getStatus(item) {
      if (!item.inStock) return 'off';
      if (item.qty > item.min) return 'ok';
      if (item.qty === item.min) return 'warn';
      return 'crit';
    }

    function statusLabel(s) {
      if (s === 'ok') return '🟢';
      if (s === 'warn') return '🟡';
      if (s === 'crit') return '🔴';
      return '';
    }

    function fuzzyMatch(text, query) {
      if (!query) return true;
      const t = text.toLowerCase();
      const q = query.toLowerCase();
      let qi = 0;
      for (let i = 0; i < t.length && qi < q.length; i++) {
        if (t[i] === q[qi]) qi++;
      }
      return qi === q.length;
    }

    function filteredItems() {
      let result = [...items];

      // filtro rápido
      if (activeQuickFilter === 'fav') {
        result = result.filter(it => it.fav);
      } else if (activeQuickFilter) {
        result = result.filter(it => getStatus(it) === activeQuickFilter);
      }

      // busca textual
      const q = searchQuery.trim();

      if (q) {
        result = result.filter(it => {
          const s = getStatus(it);
          const statusText = s === 'off' ? 'inactive' : statusLabel(s);

          return fuzzyMatch(
            it.name + ' ' + it.desc + ' ' + statusText,
            q
          );
        });
      }

      return result;
    }

    function stockItems() { return filteredItems().filter(it => it.inStock); }
    function buyItems() { return filteredItems().filter(it => it.inStock && (it.qty < it.min || it._done)); }

    // Extrai a primeira categoria (#tag) do campo desc de um item
    function getCategoryOf(it) {
      if (!it.desc) return '—';
      const m = it.desc.match(/#([^\s·,]+)/);
      return m ? m[1].toLowerCase() : '—';
    }

    // Ordena conforme o modo atual
    function sorted(arr) {
      const collator = new Intl.Collator('en', { sensitivity: 'base' });
      if (sortMode === 'az') {
        return [...arr].sort((a, b) => collator.compare(a.name, b.name));
      }
      if (sortMode === 'cat') {
        return [...arr].sort((a, b) => {
          const ca = getCategoryOf(a), cb = getCategoryOf(b);
          if (ca !== cb) return collator.compare(ca, cb);
          return collator.compare(a.name, b.name);
        });
      }
      // Modo fav: favoritos primeiro, depois A-Z dentro de cada grupo
      return [...arr].sort((a, b) => {
        const fa = a.fav ? 0 : 1, fb = b.fav ? 0 : 1;
        if (fa !== fb) return fa - fb;
        return collator.compare(a.name, b.name);
      });
    }

    // Retorna o "rótulo de seção" do item conforme o modo de ordenação
    function sectionKeyOf(it) {
      if (sortMode === 'az') {
        // Normalize to remove diacritics so accented chars group with their base letter
        const firstChar = it.name[0] || '';
        const normalized = firstChar.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase();
        return normalized || firstChar.toUpperCase();
      }
      if (sortMode === 'cat') {
        const cat = getCategoryOf(it);
        return cat === '—' ? '—' : '#' + cat;
      }
      // Modo fav: duas seções — favoritos e o resto
      return it.fav ? '★ Favorites' : '· Other items';
    }

    function toggleSortMode() {
      // Cicla entre os três estados
      if (sortMode === 'az') sortMode = 'cat';
      else if (sortMode === 'cat') sortMode = 'fav';
      else sortMode = 'az';

      const btn = document.getElementById('btn-sort');

    }

    // ==================== SWIPE GESTURE ====================
    function attachSwipe(wrap, itemId) {
      const content = wrap.querySelector('.swipe-content');
      const bgLeft = wrap.querySelector('.swipe-bg-left');
      const bgRight = wrap.querySelector('.swipe-bg-right');

      const THRESHOLD = 72;   // px para confirmar ação
      const MAX_DRAG = 110;  // px máximo de arrasto visual

      let startX = 0, startY = 0, dx = 0;
      let dragging = false, dirLocked = false, isHorizontal = false;

      function onStart(e) {
        const t = e.touches ? e.touches[0] : e;
        startX = t.clientX;
        startY = t.clientY;
        dx = 0;
        dragging = true;
        dirLocked = false;
        isHorizontal = false;
        wrap.classList.add('swiping');
      }

      function onMove(e) {
        if (!dragging) return;
        const t = e.touches ? e.touches[0] : e;
        const curDx = t.clientX - startX;
        const curDy = t.clientY - startY;

        // Determina direção dominante na primeira oportunidade
        if (!dirLocked && (Math.abs(curDx) > 6 || Math.abs(curDy) > 6)) {
          dirLocked = true;
          isHorizontal = Math.abs(curDx) > Math.abs(curDy);
        }

        if (!isHorizontal) return; // scroll vertical — não interfere

        e.preventDefault(); // impede scroll enquanto arrasta na horizontal
        dx = Math.sign(curDx) * Math.min(Math.abs(curDx), MAX_DRAG);

        // Resistência suave próximo ao limite
        const ratio = Math.abs(dx) / MAX_DRAG;
        const visual = dx * (1 - 0.3 * ratio);

        content.style.transform = `translateX(${visual}px)`;

        // Intensidade dos backgrounds
        const intensity = Math.min(Math.abs(dx) / THRESHOLD, 1);
        bgLeft.style.opacity = dx < 0 ? intensity : 0;
        bgRight.style.opacity = dx > 0 ? intensity : 0;
      }

      function onEnd() {
        if (!dragging) return;
        dragging = false;
        wrap.classList.remove('swiping');

        const confirmed = Math.abs(dx) >= THRESHOLD;

        if (confirmed) {
          // Flash do fundo e snap de volta
          content.style.transform = `translateX(${dx < 0 ? -MAX_DRAG : MAX_DRAG}px)`;
          wrap.classList.add('snap-back');

          setTimeout(() => {
            content.style.transform = '';
            bgLeft.style.opacity = 0;
            bgRight.style.opacity = 0;
            wrap.classList.remove('snap-back');

            if (dx < 0) {
              confirmDelete(itemId);  // swipe left → delete
            } else {
              toggleStock(itemId);    // swipe right → toggle stock
            }
          }, 180);
        } else {
          // Cancela — retorna suavemente
          content.style.transform = '';
          bgLeft.style.opacity = 0;
          bgRight.style.opacity = 0;
        }
      }

      // Touch
      content.addEventListener('touchstart', onStart, { passive: true });
      content.addEventListener('touchmove', onMove, { passive: false });
      content.addEventListener('touchend', onEnd);
      content.addEventListener('touchcancel', onEnd);

      // Mouse (desktop preview)
      content.addEventListener('mousedown', e => { onStart(e); });
      window.addEventListener('mousemove', e => { if (dragging) onMove(e); });
      window.addEventListener('mouseup', e => { if (dragging) onEnd(); });
    }

    // Swipe para aba Refill: right = toggle done, left = desmarcar (se done)
    function attachSwipeRefill(wrap, itemId) {
      const content = wrap.querySelector('.swipe-content');
      const bgLeft = wrap.querySelector('.swipe-bg-left');
      const bgRight = wrap.querySelector('.swipe-bg-right');

      const THRESHOLD = 68;
      const MAX_DRAG = 100;

      let startX = 0, startY = 0, dx = 0;
      let dragging = false, dirLocked = false, isHorizontal = false;

      function getItem() { return items.find(i => i.id === itemId); }

      function onStart(e) {
        const t = e.touches ? e.touches[0] : e;
        startX = t.clientX; startY = t.clientY;
        dx = 0; dragging = true; dirLocked = false; isHorizontal = false;
        wrap.classList.add('swiping');
      }

      function onMove(e) {
        if (!dragging) return;
        const t = e.touches ? e.touches[0] : e;
        const curDx = t.clientX - startX;
        const curDy = t.clientY - startY;
        if (!dirLocked && (Math.abs(curDx) > 6 || Math.abs(curDy) > 6)) {
          dirLocked = true;
          isHorizontal = Math.abs(curDx) > Math.abs(curDy);
        }
        if (!isHorizontal) return;
        e.preventDefault();
        dx = Math.sign(curDx) * Math.min(Math.abs(curDx), MAX_DRAG);
        const ratio = Math.abs(dx) / MAX_DRAG;
        const visual = dx * (1 - 0.3 * ratio);
        content.style.transform = `translateX(${visual}px)`;
        const intensity = Math.min(Math.abs(dx) / THRESHOLD, 1);
        // right → check; left → uncheck
        bgRight.style.opacity = dx > 0 ? intensity : 0;
        bgLeft.style.opacity = dx < 0 ? intensity : 0;
      }

      function onEnd() {
        if (!dragging) return;
        dragging = false;
        wrap.classList.remove('swiping');
        const confirmed = Math.abs(dx) >= THRESHOLD;

        if (confirmed) {
          content.style.transform = `translateX(${dx < 0 ? -MAX_DRAG : MAX_DRAG}px)`;
          wrap.classList.add('snap-back');
          setTimeout(() => {
            content.style.transform = '';
            bgLeft.style.opacity = 0;
            bgRight.style.opacity = 0;
            wrap.classList.remove('snap-back');

            const it = getItem();
            if (!it) return;

            if (dx > 0) {
              // Swipe right: abre modal "units acquired" (mesmo fluxo do toque no checkbox)
              toggleDone(it.id);
            } else {
              // Swipe left: desmarcar
              if (it._done) {
                it._done = false;
                save();
                const row = content;
                row.classList.remove('done');
                const cb = row.querySelector('.buy-cb');
                if (cb) { cb.classList.remove('on'); cb.innerHTML = ''; }
                const nameEl = row.querySelector('.item-name');
                if (nameEl) nameEl.style.textDecoration = '';
                toast('↩ Unmarked');
              }
            }
          }, 180);
        } else {
          content.style.transform = '';
          bgLeft.style.opacity = 0;
          bgRight.style.opacity = 0;
        }
      }

      content.addEventListener('touchstart', onStart, { passive: true });
      content.addEventListener('touchmove', onMove, { passive: false });
      content.addEventListener('touchend', onEnd);
      content.addEventListener('touchcancel', onEnd);
      content.addEventListener('mousedown', e => onStart(e));
      window.addEventListener('mousemove', e => { if (dragging) onMove(e); });
      window.addEventListener('mouseup', e => { if (dragging) onEnd(); });
    }

    // ==================== RENDERIZAÇÃO COM DOCUMENTFRAGMENT ====================
    function createElement(tag, className = '', innerHTML = '') {
      const el = document.createElement(tag);
      if (className) el.className = className;
      if (innerHTML) el.innerHTML = innerHTML;
      return el;
    }

        cb.onclick = () => toggleStock(it.id);
        row.appendChild(cb);

        // Info
        const info = createElement('div', 'item-info');

        favBtn.onclick = () => toggleFav(it.id);

        wrap.appendChild(row);

      }

      container.appendChild(fragment);

      // Header
      // const header = createElement('div', 'stock-header', `

      //   <div class="stock-header-col">Atual</div>

        const section = sectionKeyOf(it);
        if (section !== lastSection) {
          const label = createElement('div', 'sec-label', section);
          fragment.appendChild(label);

        const row = createElement('div', `stock-row ${rowClass}`);

        const nameDiv = createElement('div', 'stock-name');
