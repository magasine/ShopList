        favBtn.title = it.fav ? 'Remove from favorites' : 'Add to favorites';
        favBtn.onclick = () => toggleFav(it.id);
        row.appendChild(favBtn);

        // ── Helper: constrói um stepper sem handlers inline ──────────────────
        function buildStepper({ wrapClass, stepperId, initialVal, label, onChange, onStepChange }) {
          const wrap = createElement('div', `stepper-wrap ${wrapClass}`);
          const stepperEl = createElement('div', 'stepper');
          stepperEl.id = stepperId;

          const btnMinus = createElement('div', 'stepper-btn minus', '−');
          const input = createElement('input', 'stepper-val');
          const btnPlus = createElement('div', 'stepper-btn plus', '+');

          input.type = 'number';
          input.min = '0';
          input.value = initialVal;
          input.inputMode = 'numeric';
          input.onchange = (e) => onChange(e.target.value);

          stepperEl.appendChild(btnMinus);
          stepperEl.appendChild(input);
          stepperEl.appendChild(btnPlus);

          const labelEl = createElement('div', 'stepper-label', label);
          wrap.appendChild(stepperEl);
          wrap.appendChild(labelEl);

          // ── Controle de foco robusto ──────────────────────────────────────
          // Impede que o pointerdown nos botões roube o foco do input:
          // o foco permanece no input durante todo o ciclo de incremento.
          [btnMinus, btnPlus].forEach(btn => {
            btn.addEventListener('pointerdown', (e) => {
              e.preventDefault(); // evita blur do input ativo
            });
          });

          // Incremento/decremento via pointer (mouse + touch unificado)
          // Atualiza o input visualmente e chama onStepChange com o novo valor
          function doStep(delta) {
            const cur = parseInt(input.value, 10) || 0;
            const next = Math.max(0, cur + delta);
            input.value = next;
            onStepChange(next);  // passa o valor já calculado
          }
          btnMinus.addEventListener('pointerup', () => doStep(-1));
          btnPlus.addEventListener('pointerup', () => doStep(+1));

          return { wrap, input };
        }

        // Min stepper — oculto por padrão (stepper-min-wrap)
        const { wrap: minWrap, input: minInput } = buildStepper({
          wrapClass: 'stepper-min-wrap',
          stepperId: `stepper-min-${it.id}`,
          initialVal: it.min,
          label: 'min.',
          onChange: (v) => updateMin(it.id, v),
          onStepChange: (v) => updateMin(it.id, v, { silent: true }),
        });
        row.appendChild(minWrap);

        // Qty stepper — sempre visível; controla exibição do minWrap
        const { wrap: qtyWrap, input: qtyInput } = buildStepper({
          wrapClass: '',
          stepperId: `stepper-qty-${it.id}`,
          initialVal: it.qty,
          label: 'current',
          onChange: (v) => updateQty(it.id, v),
          onStepChange: (v) => updateQty(it.id, v, { silent: true }),
        });

        // ── Visibilidade do minWrap: baseada em foco real nos dois wrappers ──
        // Um único timer compartilhado evita race conditions entre focus/blur events.
        let hideTimer = null;

        function scheduleHide() {
          clearTimeout(hideTimer);
          hideTimer = setTimeout(() => {
            const active = document.activeElement;
            if (!minWrap.contains(active) && !qtyWrap.contains(active)) {
              minWrap.classList.remove('min-visible');
            }
          }, 250);
        }

        function cancelHide() {
          clearTimeout(hideTimer);
          minWrap.classList.add('min-visible');
        }

        qtyInput.addEventListener('focus', cancelHide);
        qtyInput.addEventListener('blur', scheduleHide);
        minInput.addEventListener('focus', cancelHide);
        minInput.addEventListener('blur', scheduleHide);

        // pointerdown nos botões ±  também cancela o timer de ocultação
        // (o preventDefault já está no buildStepper, aqui só garantimos o cancelHide)
        minWrap.querySelectorAll('.stepper-btn').forEach(b => b.addEventListener('pointerdown', cancelHide));
        qtyWrap.querySelectorAll('.stepper-btn').forEach(b => b.addEventListener('pointerdown', cancelHide));

        row.appendChild(qtyWrap);

        fragment.appendChild(row);
      }

      container.appendChild(fragment);
    }

    function renderPanel2() {
      const container = document.getElementById('panel-2');
      container.innerHTML = '';

      const list = sorted(buyItems());
      if (!list.length) {
        const hasStock = stockItems().length > 0;
        container.innerHTML = hasStock
          ? emptyState('✅', 'All stocked up!', 'No item below minimum right now')
          : emptyState('📦', 'No items in stock', 'Add items on the All tab and enable them in Stock to track refills');
        return;
      }

      const fragment = document.createDocumentFragment();
      let lastSection = '';

      for (const it of list) {
        const section = sectionKeyOf(it);
        if (section !== lastSection) {
          const label = createElement('div', 'sec-label', section);
          fragment.appendChild(label);
          lastSection = section;
        }

        // ── Swipe wrapper ─────────────────────────────────────────────────
        const wrap = createElement('div', 'swipe-wrap');

        // Bg esquerdo: desmarcar (cinza/undo)
        const bgLeft = createElement('div', 'swipe-bg swipe-bg-left');
        bgLeft.style.background = 'linear-gradient(90deg, var(--text3) 70%, transparent 100%)';
        bgLeft.innerHTML = '↩';
        wrap.appendChild(bgLeft);

        // Bg direito: marcar como done (verde/check)
        const bgRight = createElement('div', 'swipe-bg swipe-bg-right');
        bgRight.style.background = 'linear-gradient(270deg, var(--accent) 70%, transparent 100%)';
        bgRight.innerHTML = '✅';
        wrap.appendChild(bgRight);

        const row = createElement('div', `swipe-content buy-row ${it._done ? 'done' : ''} ${it.fav ? 'fav-on' : ''}`);

        // Checkbox — toque abre modal de quantidade
        const cb = createElement('div', `buy-cb ${it._done ? 'on' : ''}`);
        cb.innerHTML = it._done ? ICONS.check : '';
        cb.onclick = () => toggleDone(it.id);
        row.appendChild(cb);

        // Info
        const info = createElement('div', 'buy-info');
        info.innerHTML = `
          <div class="item-name" style="${it._done ? 'text-decoration:line-through' : ''}">${esc(it.name)}</div>
          <div class="item-sub">${esc(it.desc)}</div>
        `;
        row.appendChild(info);

        // Fav
        const favBtn = createElement('div', `fav-btn ${it.fav ? 'on' : ''}`);
        favBtn.dataset.favId = it.id;
        favBtn.innerHTML = it.fav ? ICONS.starOn : ICONS.starOff;
        favBtn.title = it.fav ? 'Remove from favorites' : 'Add to favorites';
        favBtn.onclick = () => toggleFav(it.id);
        row.appendChild(favBtn);

        // Deficit
        const deficit = createElement('div', 'buy-deficit', `+${it.min - it.qty}`);
        row.appendChild(deficit);

        wrap.appendChild(row);
        attachSwipeRefill(wrap, it.id);
        fragment.appendChild(wrap);
      }

      container.appendChild(fragment);
    }

    function emptyState(icon, title, sub, actionLabel = '', actionFn = '') {
      const btn = actionLabel
        ? `<div class="empty-action" onclick="${actionFn}">${actionLabel}</div>`
        : '';
      return `
        <div class="empty">
          <div class="empty-icon">${icon}</div>
          <div class="empty-title">${title}</div>
          <div class="empty-sub">${sub}</div>
          ${btn}
        </div>`;
    }

    function render() {
      updateBadges();
      updateFooter();
      renderPanel0();
      renderPanel1();
      renderPanel2();
    }

    // Salva e re-renderiza — use em mutações de dados reais
    function saveAndRender() {
      save();
      render();
    }

    function updateBadges() {
      const all = filteredItems();
      document.getElementById('badge-0').textContent = all.length;
      document.getElementById('badge-1').textContent = stockItems().length;
      document.getElementById('badge-2').textContent = buyItems().filter(it => !it._done).length;
      // Timestamp compacto sempre visível no título
      (function () {
        const el = document.getElementById('title-sub');
        if (!el) return;
        if (!startupSavedAt) { el.textContent = ''; return; }
        const d = new Date(startupSavedAt);
        if (isNaN(d)) { el.textContent = ''; return; }
        const pad = n => String(n).padStart(2, '0');
        el.textContent = `${pad(d.getDate())}/${pad(d.getMonth() + 1)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      })();
    }

    function updateFooter() {
      const addBtn = document.getElementById('add-btn');
      addBtn.style.display = currentTab === 0 ? 'flex' : 'none';
    }

    // ==================== EVENTOS E AÇÕES ====================
    function switchTab(idx) {
      currentTab = idx;
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
      document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === idx));
      render();
    }

    function toggleFilterBar() {
      const bar = document.getElementById('filter-bar');
      const btn = document.getElementById('btn-traffic');
      const open = bar.classList.toggle('open');
      btn.classList.toggle('active', open);
      btn.textContent = open ? '🚥' : '🚦';

      // Ao fechar: reseta qualquer filtro de status ativo (crit/warn/ok)
      if (!open && ['crit', 'warn', 'ok'].includes(activeQuickFilter)) {
        activeQuickFilter = '';
        document.querySelectorAll('.filter-btn').forEach(b => b.removeAttribute('data-active'));
        saveUI();
        render();
      }
    }

    function toggleSearch() {
      const bar = document.getElementById('search-bar');
      const btn = document.getElementById('btn-search');
      bar.classList.toggle('open');
      btn.classList.toggle('active');
      if (bar.classList.contains('open')) {
        document.getElementById('search-input').focus();
      } else {
        clearSearch();
      }
    }

    function onSearch() {
      const input = document.getElementById('search-input');
      searchQuery = input.value;
      // Autocomplete de categoria no campo de busca
      acOnInputSearch(input);
      render();
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      searchQuery = '';
      // Ao fechar o search, desativa o filtro fav junto — botão oculto não deve manter estado ativo
      if (activeQuickFilter === 'fav') {
        activeQuickFilter = '';
        syncFavBtn();
        saveUI();
      }
      render();
    }

    // Sincroniza o botão ⭐ do search-wrap com o estado real de activeQuickFilter
    function syncFavBtn() {
      const sfBtn = document.getElementById('search-fav-btn');
      if (!sfBtn) return;
      const on = activeQuickFilter === 'fav';
      sfBtn.classList.toggle('on', on);
      sfBtn.innerHTML = on ? '⭐' : '☆';
      sfBtn.title = on ? 'Favorites filter ON — click to disable' : 'Filter favorites';
    }

    function applyQuickFilter(type) {
      const wasActive = activeQuickFilter === type;

      // Limpa estado ativo de todos os botões
      document.querySelectorAll('.filter-btn').forEach(b => b.removeAttribute('data-active'));

      if (wasActive) {
        activeQuickFilter = '';
        if (type === 'fav') toast('Favorites filter off');
      } else {
        // Garante que o filter-bar esteja visível ao ativar um filtro de status
        if (['crit', 'warn', 'ok'].includes(type)) {
          const fb = document.getElementById('filter-bar');
          const tb = document.getElementById('btn-traffic');
          if (fb && !fb.classList.contains('open')) {
            fb.classList.add('open');
            if (tb) { tb.classList.add('active'); tb.textContent = '🚥'; }
          }
        }
        activeQuickFilter = type;
        const btn = document.querySelector(`.filter-btn[data-filter="${type}"]`);
        if (btn) btn.setAttribute('data-active', 'true');
        if (type === 'fav') {
          const favCount = items.filter(i => i.fav).length;
          toast(favCount > 0
            ? `⭐ ${favCount} favorite${favCount !== 1 ? 's' : ''} shown`
            : '⭐ No favorites added yet');
        }
      }

      syncFavBtn();
      saveUI();
      render();
    }
    function toggleStock(id) {
      const it = items.find(i => i.id === id);
      if (!it) return;
      it.inStock = !it.inStock;
      if (!it.inStock) {
        it.qty = 0;
        it._done = false;
      }
      saveAndRender();
    }

    function toggleFav(id) {
      const it = items.find(i => i.id === id);
      if (!it) return;
      it.fav = !it.fav;

      // Micro-feedback: atualiza TODOS os botões fav deste item em qualquer painel renderizado
      document.querySelectorAll(`[data-fav-id="${id}"]`).forEach(btn => {
        btn.classList.toggle('on', !!it.fav);
        btn.innerHTML = it.fav ? ICONS.starOn : ICONS.starOff;
        btn.title = it.fav ? 'Remove from favorites' : 'Add to favorites';
        const row = btn.closest('.item-row, .stock-row, .buy-row');
        if (row) row.classList.toggle('fav-on', !!it.fav);
      });

      // Re-render completo apenas se o modo fav estiver ativo (para reordenar)
      if (sortMode === 'fav' || activeQuickFilter === 'fav') {
        saveAndRender();
      } else {
        save();
      }
      // Garante sincronização do #search-fav-btn se o filtro fav estiver ativo
      syncFavBtn();
    }

    function stepperChange(field, id, delta) {
      // Lê o valor atual do input dentro do stepper
      const stepper = document.getElementById(`stepper-${field}-${id}`);
      if (!stepper) return;
      const input = stepper.querySelector('input');
      const current = parseInt(input.value, 10) || 0;
      const next = Math.max(0, current + delta);
      input.value = next;
      if (field === 'min') updateMin(id, next);
      else updateQty(id, next);
    }

    function updateMin(id, val, { silent = false } = {}) {
      const it = items.find(i => i.id === id);
      if (it) {
        it.min = Math.max(0, parseInt(val) || 0);
        silent ? save() : saveAndRender();
      }
    }

    function updateQty(id, val, { silent = false } = {}) {
      const it = items.find(i => i.id === id);
      if (it) {
        it.qty = Math.max(0, parseInt(val) || 0);
        // Qualquer ajuste no current sugere nova necessidade de refill — restaura estado
        if (it._done) it._done = false;
        silent ? save() : saveAndRender();
      }
    }

    function toggleDone(id) {
      const it = items.find(i => i.id === id);
      if (!it) return;

      if (it._done) {
        it._done = false;
        saveAndRender();
        return;
      }

      pendingDoneId = id;
      const deficit = Math.max(0, it.min - it.qty);

      openModal(`
        <div class="modal-header">
          <div class="modal-title">${esc(it.name)}</div>
          <div class="modal-sub">${esc(it.desc)} · current stock: <strong>${it.qty}</strong> · minimum: <strong>${it.min}</strong></div>
        </div>
        <div class="modal-body">
          <label class="modal-label">How many units did you acquire?</label>
          <div style="display:flex;justify-content:center;margin-top:8px">
            <div class="stepper-wrap" style="width:160px">
              <div class="stepper">
                <div class="stepper-btn minus" ontouchstart="" onmousedown="doneStepperChange(-1)">−</div>
                <input class="stepper-val" id="done-qty" type="number" min="0" value="${deficit}" />
                <div class="stepper-btn plus" ontouchstart="" onmousedown="doneStepperChange(+1)">+</div>
              </div>
              <div class="stepper-label">units acquired</div>
            </div>
          </div>
        </div>
        <div class="modal-foot">
          <div class="modal-btn cancel" onclick="closeModal()">Cancel</div>
          <div class="modal-btn confirm" onclick="confirmDone()">Confirm</div>
        </div>
      `);
    }

    function doneStepperChange(delta) {
      const input = document.getElementById('done-qty');
      if (!input) return;
      input.value = Math.max(0, (parseInt(input.value, 10) || 0) + delta);
    }

    function confirmDone() {
      const val = parseInt(document.getElementById('done-qty').value || 0) || 0;
      if (val <= 0) {
        closeModal();
        return;
      }
      const it = items.find(i => i.id === pendingDoneId);
      if (it) {
        it.qty += val;
        it._done = true;
      }
      closeModal();
      saveAndRender();
      toast(`+${val} added to stock`);
    }

    function openAddModal() {
      openModal(`
        <div class="modal-header"><div class="modal-title">New item</div></div>
        <div class="modal-body">
          <label class="modal-label">Item name</label>
          <input class="modal-input-big" style="font-size:18px;text-align:left" id="add-name" type="text" placeholder="e.g.: Butter" autofocus />
          <label class="modal-label" style="margin-top:12px">Description (Unit/#Category)</label>

        </div>
        <div class="modal-foot">
          <div class="modal-btn cancel" onclick="closeModal()">Cancel</div>
          <div class="modal-btn confirm" onclick="confirmAdd()">Add</div>
        </div>
      `);
    }

    function confirmAdd() {
      const name = (document.getElementById('add-name').value || '').trim();
      const desc = (document.getElementById('add-desc').value || '').trim();
      if (!name) return;
      items.push({ id: uid(), name, desc, inStock: false, min: 1, qty: 0, fav: false });
      closeModal();
      saveAndRender();
      toast('Item added');
    }

    function openEditModal(id) {
      const it = items.find(i => i.id === id);
      if (!it) return;
      openModal(`
        <div class="modal-header"><div class="modal-title">Edit item</div></div>
        <div class="modal-body">
          <label class="modal-label">Item name</label>
          <input class="modal-input-big" style="font-size:18px;text-align:left" id="edit-name" type="text" value="${esc(it.name)}" />
          <label class="modal-label" style="margin-top:12px">Description</label>
          <input class="modal-input-big" style="font-size:14px;text-align:left" id="edit-desc" type="text" value="${esc(it.desc)}" />
        </div>
        <div class="modal-foot">
          <div class="modal-btn cancel" onclick="closeModal()">Cancel</div>
          <div class="modal-btn confirm" onclick="confirmEdit('${id}')">Save</div>
        </div>
      `);
    }

    function confirmEdit(id) {
      const name = (document.getElementById('edit-name').value || '').trim();
      const desc = (document.getElementById('edit-desc').value || '').trim();
      if (!name) return;
      const it = items.find(i => i.id === id);
      if (it) {
        it.name = name;
        it.desc = desc;
      }
      closeModal();
      saveAndRender();
    }

    function confirmDelete(id) {
      const it = items.find(i => i.id === id);
      if (!it) return;
      openModal(`
        <div class="modal-header">
          <div class="modal-title">Remove item?</div>
          <div class="modal-sub">${esc(it.name)} will be permanently deleted.</div>
        </div>
        <div class="modal-foot">
          <div class="modal-btn cancel" onclick="closeModal()">Cancel</div>
          <div class="modal-btn danger-btn" onclick="doDelete('${id}')">Remove</div>
        </div>
      `);
    }

    function doDelete(id) {
      items = items.filter(i => i.id !== id);
      closeModal();
      saveAndRender();
      toast('Item removed');
    }

    // ══════════════════════════════════════════════════════════════
    // SECTION MENU SYSTEM
    // ══════════════════════════════════════════════════════════════

    let _secMenuEl = null;

    function closeSectionMenu() {
      if (_secMenuEl) {
        _secMenuEl.remove();
        _secMenuEl = null;
      }
    }

    // Posiciona e exibe o dropdown próximo ao botão ⋯
    function _showSectionMenu(triggerEl, html) {
      closeSectionMenu();

      const menu = document.createElement('div');
      menu.className = 'sec-action-menu';
      menu.innerHTML = html;
      document.body.appendChild(menu);
      _secMenuEl = menu;

      // Posicionamento: abaixo do trigger, alinhado à direita
      const rect = triggerEl.getBoundingClientRect();
      const menuW = 220;
      let left = rect.right - menuW;
      let top = rect.bottom + 6;

      // Garante que não sai da tela
      if (left < 8) left = 8;
      if (top + 220 > window.innerHeight) top = rect.top - 220;

      menu.style.left = left + 'px';
      menu.style.top = top + 'px';
      menu.style.width = menuW + 'px';

      // Fecha ao clicar fora
      setTimeout(() => {
        document.addEventListener('mousedown', _outsideMenuHandler);
        document.addEventListener('touchstart', _outsideMenuHandler, { passive: true });
      }, 0);
    }

    function _outsideMenuHandler(e) {
      if (_secMenuEl && !_secMenuEl.contains(e.target)) {
        closeSectionMenu();
        document.removeEventListener('mousedown', _outsideMenuHandler);
        document.removeEventListener('touchstart', _outsideMenuHandler);
      }
    }

    // ── Menu para categoria (sortMode === 'cat') ───────────────────────────
    function openCatSectionMenu(triggerEl, cat) {
      const catItems = items.filter(i => getCategoryOf(i) === cat);
      const count = catItems.length;
      const key = _registerBulk(catItems.map(i => i.id));

      _showSectionMenu(triggerEl, `
        <div class="sec-action-header">#${esc(cat)} · ${count} item${count !== 1 ? 's' : ''}</div>
        <div class="sec-action-item" data-action="rename-cat" data-cat="${esc(cat)}">
          <span class="sec-action-icon">✏️</span> Rename category
        </div>
        <div class="sec-action-item danger" data-action="delete-cat" data-key="${key}" data-cat="${esc(cat)}">
          <span class="sec-action-icon">🗑️</span> Delete all ${count} item${count !== 1 ? 's' : ''}
        </div>
      `);

      // Listener delegado no menu — evita onclick inline com dados interpolados
      _secMenuEl.addEventListener('click', e => {
        const item = e.target.closest('[data-action]');
        if (!item) return;
        const action = item.dataset.action;
        closeSectionMenu();
        if (action === 'rename-cat') {
          startCatRename(item.dataset.cat);
        } else if (action === 'delete-cat') {
          confirmBulkDeleteByKey(item.dataset.key, item.dataset.cat);
        }
      });
    }

    // ── Menu genérico (sortMode A-Z ou fav) ───────────────────────────────
    function openGenericSectionMenu(triggerEl, sectionKey) {
      const secItems = sorted(filteredItems()).filter(i => sectionKeyOf(i) === sectionKey);
      const count = secItems.length;
      const key = _registerBulk(secItems.map(i => i.id));
      const label = sectionKey;

      _showSectionMenu(triggerEl, `
        <div class="sec-action-header">${esc(sectionKey)} · ${count} item${count !== 1 ? 's' : ''}</div>
        <div class="sec-action-item danger" data-action="bulk-delete" data-key="${key}" data-label="${esc(label)}">
          <span class="sec-action-icon">🗑️</span> Delete all ${count} item${count !== 1 ? 's' : ''}
        </div>
      `);

      _secMenuEl.addEventListener('click', e => {
        const item = e.target.closest('[data-action]');
        if (!item) return;
        closeSectionMenu();
        confirmBulkDeleteByKey(item.dataset.key, item.dataset.label);
      });
    }

    // ── Menu para resultado de busca ───────────────────────────────────────
    function openSearchSectionMenu(triggerEl, query, count) {
      const matchIds = sorted(filteredItems()).map(i => i.id);
      const key = _registerBulk(matchIds);
      const label = `search results for "${query}"`;

      _showSectionMenu(triggerEl, `
        <div class="sec-action-header">Search: &ldquo;${esc(query)}&rdquo; · ${count} result${count !== 1 ? 's' : ''}</div>
        <div class="sec-action-item danger" data-action="bulk-delete" data-key="${key}" data-label="${esc(label)}">
          <span class="sec-action-icon">🗑️</span> Delete all ${count} result${count !== 1 ? 's' : ''}
        </div>
      `);

      _secMenuEl.addEventListener('click', e => {
        const item = e.target.closest('[data-action]');
        if (!item) return;
        closeSectionMenu();
        confirmBulkDeleteByKey(item.dataset.key, item.dataset.label);
      });
    }

    // ── Rename de categoria inline ─────────────────────────────────────────
    // Substitui o sec-label pelo campo de edição inline; confirma com Enter/blur
    function startCatRename(cat) {
      // Acha o sec-label cujo texto começa com #cat
      const labels = document.querySelectorAll('.sec-label');
      let targetLabel = null;
      for (const l of labels) {
        const txt = l.querySelector('.sec-label-text');
        if (txt && txt.textContent.trim().toLowerCase() === ('#' + cat).toLowerCase()) {
          targetLabel = l;
          break;
        }
      }
      if (!targetLabel) return;

      // Guarda innerHTML original para cancelar
      const originalHTML = targetLabel.innerHTML;

      // Remove o ::before pseudo via classe temporária
      targetLabel.style.setProperty('--before-opacity', '0');

      // Cria input inline
      const input = document.createElement('input');
      input.className = 'sec-label-input';
      input.value = cat;
      input.maxLength = 40;
      input.spellcheck = false;

      targetLabel.innerHTML = '';
      // Mantém o pseudo ::before visual mas o sec-label vira container do input
      const bar = document.createElement('span');
      bar.style.cssText = 'width:3px;height:11px;border-radius:2px;background:var(--accent);flex-shrink:0;opacity:0.5';
      targetLabel.appendChild(bar);
      targetLabel.appendChild(input);

      const hint = document.createElement('span');
      hint.style.cssText = 'font-size:10px;color:var(--text3);font-weight:400;letter-spacing:0.02em;flex-shrink:0';
      hint.textContent = 'Enter ↵ to save';
      targetLabel.appendChild(hint);

      input.focus();
      input.select();

      function applyRename() {
        const newCat = input.value.trim().toLowerCase().replace(/\s+/g, '-');
        if (!newCat || newCat === cat) {
          targetLabel.innerHTML = originalHTML;
          return;
        }
        // Atualiza o campo desc de todos os itens da categoria
        items.forEach(it => {
          if (getCategoryOf(it) === cat) {
            it.desc = it.desc.replace(new RegExp('#' + cat.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), '#' + newCat);
          }
        });
        saveAndRender();
        toast(`Category renamed to #${newCat}`);
      }

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); applyRename(); }
        if (e.key === 'Escape') { targetLabel.innerHTML = originalHTML; }

    // ── Executa bulk delete ───────────────────────────────────────────────
    // Registro temporário de lotes — evita serialização de arrays em atributos HTML
    const _bulkRegistry = {};

    function _registerBulk(ids) {
      const key = 'b' + Date.now();
      _bulkRegistry[key] = ids;
      return key;
    }

    function doBulkDelete(key) {
      const ids = _bulkRegistry[key];
      if (!ids) return;
      delete _bulkRegistry[key];
      const idSet = new Set(ids);
      const before = items.length;
      items = items.filter(i => !idSet.has(i.id));
      const removed = before - items.length;
      closeModal();
      saveAndRender();
      toast(`${removed} item${removed !== 1 ? 's' : ''} deleted`);
    }

      const key = _registerBulk(catItems.map(i => i.id));

      openModal(`

    function importFile(e) {

      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const parsed = JSON.parse(ev.target.result);
          // Suporte a arquivo exportado com payload ou array legado
          const data = Array.isArray(parsed) ? parsed
            : Array.isArray(parsed.data) ? parsed.data

          if (!data) throw new Error('Invalid format');
          items = data;

    function copyBuyList() {
      // Usa buyItems() para respeitar activeQuickFilter e searchQuery ativos
      const base = buyItems();
      if (!base.length) {
        toast('No pending items');
        return;
      }

      // Aplica a mesma ordenação visível na aba Reposição
      const list = sorted(base);

      // ── Helper: descrição limpa (sem a #tag, mantém anotações extras) ──
      function cleanDesc(it) {
        if (!it.desc) return '';
        // Remove a #hashtag de categoria mas preserva o resto (ex: "· 500g")
        return it.desc.replace(/#[^\s·,]+\s*/g, '').replace(/^[\s·,]+|[\s·,]+$/g, '').trim();
      }

      // ── Helper: linha de item ──
      function itemLine(it, showFavStar = true) {
        const star = (showFavStar && it.fav) ? '⭐ ' : '';
        const qty = `+${it.min - it.qty}`;
        const desc = cleanDesc(it);
        const detail = desc ? ` _(${desc})_` : '';
        return `- ${star}*${it.name}*: ${qty}${detail}`;
      }

      // ── Cabeçalho dinâmico reflete o modo ativo ──
      const modeLabel = {
        az: 'A–Z',
        cat: 'by category',
        fav: 'favorites first',
      }[sortMode];

      const filterLabel = activeQuickFilter === 'fav' ? ' · favorites only' : '';
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const datestamp = `${pad(now.getDate())}/${pad(now.getMonth() + 1)} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

      let lines = [];
      lines.push(`🛒 *SHOP LIST* · ${modeLabel}${filterLabel}`);
      lines.push(`_${datestamp} · ${list.length} ite${list.length !== 1 ? 'ns' : 'm'}_`);

      // ── Corpo: espelha exatamente a renderização do painel ──
      if (sortMode === 'cat') {
        // Agrupa por categoria com cabeçalho *#categoria* em negrito
        let lastSection = null;
        list.forEach(it => {
          const section = sectionKeyOf(it); // ex: "#laticínios" ou "—"
          if (section !== lastSection) {
            lines.push('');
            lines.push(`*${section}*`);
            lastSection = section;
          }
          lines.push(itemLine(it));
        });

      } else if (sortMode === 'fav') {
        // Dois blocos: ⭐ Favoritos e · Demais itens
        const favs = list.filter(it => it.fav);
        const others = list.filter(it => !it.fav);

        if (favs.length) {
          lines.push('');
          lines.push('*⭐ Favorites*');
          favs.forEach(it => lines.push(itemLine(it, false)));
        }
        if (others.length) {
          lines.push('');
          lines.push('*· Other items*');
          others.forEach(it => lines.push(itemLine(it, false)));
        }

      } else {
        // A–Z: lista simples; favoritos recebem ⭐ inline
        lines.push('');
        list.forEach(it => lines.push(itemLine(it)));
      }

      const text = lines.join('\n');

      // ── Disparo: Web Share API (mobile) ou clipboard (desktop) ──
      if (navigator.share) {
        closeModal();
        navigator.share({ title: 'Shop List', text: text.trim() })
          .then(() => toast('List shared!'))
          .catch(err => {
            if (err.name !== 'AbortError')
              navigator.clipboard.writeText(text.trim()).then(() => toast('List copied!'));
          });
      } else {
        navigator.clipboard.writeText(text.trim()).then(() => {
          closeModal();
          toast('List copied to clipboard!');
        }).catch(() => toast('Error copying list'));
      }
    }

    function acOnInputSearch(input) {
      const val = input.value;
      const hashPos = val.lastIndexOf('#');
      if (hashPos !== -1) {
        const afterHash = val.slice(hashPos + 1);
        if (!/\s/.test(afterHash)) {
          const cats = getExistingCategories(afterHash);
          if (cats.length) {
            acOpen(input, 'search-cat', cats, '🏷️ Filter by category');
            return;
          }
        }
      }
      acClose();
    }

    // ==================== AUTOCOMPLETE ====================
    const UNIT_SUGGESTIONS = [
      { label: 'bx', icon: '📦', desc: 'box' },
      { label: 'dz', icon: '🔢', desc: 'dozen' },
      { label: 'jar', icon: '🫙', desc: 'jar' },
      { label: 'g', icon: '⚖️', desc: 'grams' },
      { label: 'kg', icon: '⚖️', desc: 'kilograms' },
      { label: 'can', icon: '🥛', desc: 'can' },
      { label: 'l', icon: '🧴', desc: 'liters' },
      { label: 'ml', icon: '🧴', desc: 'milliliters' },
      { label: 'pkg', icon: '📦', desc: 'package' },
      { label: 'bag', icon: '📦', desc: 'bag' },
      { label: 'bar', icon: '📦', desc: 'bar/tablet' },
      { label: 'un', icon: '🔢', desc: 'unit' },
    ];

    // De-duplica por label para lista limpa
    const UNITS = [...new Map(UNIT_SUGGESTIONS.map(u => [u.label, u])).values()];

    let acTarget = null;       // input sendo monitorado
    let acMode = null;         // 'category' | 'unit'
    let acFocusIdx = -1;       // índice do item com foco de teclado

    function getExistingCategories(query = '') {
      const cats = new Set();
      items.forEach(it => {
        if (!it.desc) return;
        // Extrai todos os tokens #palavra do desc, ignorando o que vier depois
        const matches = it.desc.matchAll(/#([^\s·,;#]+)/g);
        for (const m of matches) {
          const cat = m[1].trim().toLowerCase();
          if (cat) cats.add(cat);
        }
      });
      const q = query.toLowerCase();
      return [...cats]
        .filter(c => !q || c.startsWith(q))
        .sort()
        .map(c => ({ label: c, icon: '🏷️', desc: '' }));
    }

    function getUnitSuggestions(query = '') {
      const q = query.toLowerCase();
      // Unidades padrão filtradas
      const defaults = UNITS.filter(u => !q || u.label.startsWith(q));
      // Unidades já usadas nos itens
      const usedSet = new Set();
      items.forEach(it => {
        if (!it.desc) return;
        const m = it.desc.match(/\d+\s*([a-zA-Záàãéíóú]+)/g);
        if (m) m.forEach(tok => {
          const unit = tok.replace(/\d+\s*/, '').toLowerCase();
          if (unit && unit.length <= 5) usedSet.add(unit);
        });
      });
      const extra = [...usedSet]
        .filter(u => !UNITS.find(d => d.label === u) && (!q || u.startsWith(q)))
        .map(u => ({ label: u, icon: '📐', desc: 'used before' }));
      return [...defaults, ...extra];
    }

    function acPositionBelow(input) {
      const rect = input.getBoundingClientRect();
      const drop = document.getElementById('ac-dropdown');
      drop.style.top = (rect.bottom + 4) + 'px';
      drop.style.left = rect.left + 'px';
      drop.style.width = rect.width + 'px';
    }

    function acOpen(input, mode, suggestions, headerLabel) {
      acTarget = input;
      acMode = mode;
      acFocusIdx = -1;
      const drop = document.getElementById('ac-dropdown');

      if (!suggestions.length) {
        acClose();
        return;
      }

      const itemsHtml = suggestions.map((s, i) => {
        const descHtml = s.desc ? `<span style="font-size:10px;color:var(--text3);margin-left:4px">${s.desc}</span>` : '';
        return `<div class="ac-item" data-idx="${i}" onmousedown="acPick(${i})" onmouseover="acHover(${i})">
          <span class="ac-icon">${s.icon}</span>
          <span class="ac-label">${s.label}</span>${descHtml}
        </div>`;
      }).join('');

      drop.innerHTML = `<div class="ac-header">${headerLabel}</div>${itemsHtml}`;
      acPositionBelow(input);
      drop.classList.add('open');

      // Guarda sugestões no dataset para acPick
      drop._suggestions = suggestions;
    }

    function acClose() {
      const drop = document.getElementById('ac-dropdown');
      drop.classList.remove('open');
      drop._suggestions = null;
      acTarget = null;
      acMode = null;
      acFocusIdx = -1;
    }

    function acHover(idx) {
      acFocusIdx = idx;
      document.querySelectorAll('#ac-dropdown .ac-item').forEach((el, i) =>
        el.classList.toggle('focused', i === idx)
      );
    }

    function acPick(idx) {
      const drop = document.getElementById('ac-dropdown');
      const sugs = drop._suggestions;
      if (!sugs || !acTarget) return;
      const val = acTarget.value;

      if (acMode === 'category') {
        // Substitui o #token sendo digitado pelo término selecionado
        const hashPos = val.lastIndexOf('#');
        acTarget.value = val.slice(0, hashPos) + '#' + sugs[idx].label;
      } else if (acMode === 'search-cat') {
        // No campo de busca: substitui tudo após o # pelo termo e dispara busca
        const hashPos = val.lastIndexOf('#');
        acTarget.value = val.slice(0, hashPos) + '#' + sugs[idx].label;
        searchQuery = acTarget.value;
        render();
      } else if (acMode === 'unit') {
        // Substitui "NNN " pelo "NNN sugestão"
        acTarget.value = val.replace(/(\d+)\s*$/, '$1') + sugs[idx].label;
      }

      acClose();
      acTarget.focus();
    }

    function acOnInput(e) {
      const input = e.target;
      const val = input.value;
      const drop = document.getElementById('ac-dropdown');

      // --- MODO CATEGORIA: disparado por "#" ---
      const hashPos = val.lastIndexOf('#');
      if (hashPos !== -1) {
        const afterHash = val.slice(hashPos + 1);
        // Só dispara se não há espaço após o # (ainda digitando a categoria)
        if (!/\s/.test(afterHash)) {
          const cats = getExistingCategories(afterHash);
          if (cats.length) {
            acOpen(input, 'category', cats, '🏷️ Categories');
            return;
          }
        }
      }

      // --- MODO UNIDADE: disparado por "NNN " (número seguido de espaço) ---
      const unitMatch = val.match(/(\d+)\s(\S*)$/);
      if (unitMatch) {
        const typed = unitMatch[2] || '';
        const units = getUnitSuggestions(typed);
        if (units.length) {
          acOpen(input, 'unit', units, '📐 Units');
          return;
        }
      }

      acClose();
    }

    function acOnKeydown(e) {
      const drop = document.getElementById('ac-dropdown');
      if (!drop.classList.contains('open')) return;
      const items = drop.querySelectorAll('.ac-item');

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        acFocusIdx = Math.min(acFocusIdx + 1, items.length - 1);
        acHover(acFocusIdx);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        acFocusIdx = Math.max(acFocusIdx - 1, 0);
        acHover(acFocusIdx);
      } else if (e.key === 'Enter' || e.key === 'Tab') {
        if (acFocusIdx >= 0) {
          e.preventDefault();
          acPick(acFocusIdx);
        } else if (items.length === 1) {
          e.preventDefault();
          acPick(0);
        }
      } else if (e.key === 'Escape') {
        acClose();
      }
    }

    document.addEventListener('mousedown', e => {
      if (!document.getElementById('ac-dropdown').contains(e.target) &&
        e.target !== acTarget) {

    showStartupDialog();

    // ── Query params: ?tab=N e ?action=add ──────────────────
    (function handleQueryParams() {
      const params = new URLSearchParams(location.search);
      const tab = parseInt(params.get('tab'), 10);
      if (!isNaN(tab) && tab >= 0 && tab <= 2) switchTab(tab);
      if (params.get('action') === 'add') setTimeout(openAddModal, 350);
    })();

    // ── Service Worker ───────────────────────────────────────
    let swRegistration = null;
    let newWorker = null;

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => {
          swRegistration = reg;

          // Detecta atualização disponível
          reg.addEventListener('updatefound', () => {
            newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // Há um SW novo esperando — exibe banner de update
                document.getElementById('update-banner').classList.add('visible');
              }
            });
          });
        })
        .catch(err => console.warn('SW: falha no registro:', err));

      // Quando o SW novo tomar controle, recarrega para aplicar atualização
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }

    function applyUpdate() {
      if (newWorker) newWorker.postMessage('SKIP_WAITING');

    // ── Install Prompt (Android/Chrome) ──────────────────────
    let deferredInstallPrompt = null;

    window.addEventListener('beforeinstallprompt', e => {

      if (!window.matchMedia('(display-mode: standalone)').matches) {

    function triggerInstall(e) {
      e.stopPropagation();
      if (!deferredInstallPrompt) {
        // Fallback: abre instruções manuais (iOS Safari não suporta beforeinstallprompt)
        showPWAInstructions();
        return;
      }
      deferredInstallPrompt.prompt();
      deferredInstallPrompt.userChoice.then(result => {
        if (result.outcome === 'accepted') toast('Installing Shop List…');
        deferredInstallPrompt = null;
        document.getElementById('install-banner').classList.remove('visible');
      });
    }

    function dismissInstallBanner(e) {
      e.stopPropagation();
      document.getElementById('install-banner').classList.remove('visible');
      // Não exibe de novo nessa sessão
      sessionStorage.setItem('install-dismissed', '1');
    }

    // Não reexibe o banner se foi dispensado nessa sessão
    if (sessionStorage.getItem('install-dismissed')) {
      document.getElementById('install-banner').classList.remove('visible');
    }
  </script>
</body>

</html>
