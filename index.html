<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Shop List</title>
  <meta name="theme-color" content="#00796B" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0E1621" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shop List">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <!-- Google Identity Services (OAuth 2.0 implicit flow) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Google Picker API -->
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      /* ── Light Theme — MD3 Futuristic ── */

      /* Base surfaces: fundo frio mineral com leve tint cyan */
      --bg: #F2F5F8;
      --surface: #FFFFFF;
      --surface2: #EBF0F5;

      /* Borders */
      --border: #CDD8E0;
      --border2: #AABBC8;

      /* Typography */
      --text: #0D1B2A;
      --text2: #4A6070;
      --text3: #8AA0AE;

      /* Accent — Teal Esmeralda MD3 */
      --accent: #00796B;
      --accent-light: #E0F2F1;
      --accent-text: #004D40;

      /* Warn — âmbar dourado */
      --warn: #B45309;
      --warn-light: #FEF3C7;

      /* Crit — coral-vermelho */
      --crit: #C62828;
      --crit-light: #FFEBEE;

      /* Purple — Índigo suave para destaques UI secundários */
      --purple: #5C6BC0;
      --purple-light: #EEF0FB;
      --purple-text: #283593;

      /* Radii & shadows */
      --radius: 10px;
      --radius-lg: 16px;
      --shadow: 0 1px 4px rgba(13, 27, 42, 0.08);
      --transition: 0.16s cubic-bezier(0.4, 0, 0.2, 1);

      /* Row semantic tints */
      --row-off: #FFF8F0;
      --row-off-border: #F5D9B0;
      --row-off-hover: #FDEFD6;
      --row-ok: #E8F5F3;
      --row-ok-border: #A7D7D2;
      --row-ok-hover: #D0EDEA;
      --row-crit: #FFEBEE;
      --row-crit-border: #FFCDD2;
      --row-crit-hover: #FFCDD2;

      /* Filter badge fills */
      --filter-ok-bg: #D0EDEA;
      --filter-ok-hover: #B2DDD9;
      --filter-warn-bg: #FDEFD6;
      --filter-warn-hover: #FADDAA;
      --filter-crit-bg: #FFCDD2;
      --filter-crit-hover: #FFAAB3;

      /* Header / Footer */
      --header-bg: linear-gradient(135deg, #E4EEF5 0%, #EBF3F8 45%, #E2EBF5 100%);
      --footer-bg: linear-gradient(135deg, #E2EBF5 0%, #EBF3F8 55%, #E4EEF5 100%);
      --header-border: rgba(0, 121, 107, 0.14);

      /* Typography Scaling */
      --fs-xs: 11px;
      --fs-sm: 13px;
      --fs-base: 15px;
      --fs-md: 17px;
      --fs-lg: 19px;
      --fs-xl: 24px;
    }

    [data-theme="dark"] {
      /* ── Dark Theme — MD3 Futuristic ──
         Cada camada tem matiz distinto (petróleo → slate → ardósia)
         eliminando qualquer ambiguidade entre bg / surface / surface2.  */

      --bg: #0E1621;
      /* azul-noite profundo */
      --surface: #162030;
      /* slate com tint petróleo — claramente mais claro */
      --surface2: #1E2D3E;
      /* azul-ardósia — terceiro nível inequívoco */

      --border: #2B3D52;
      /* azul-grafite */
      --border2: #3C5268;
      /* azul-aço médio */

      --text: #E6EFF6;
      /* branco-azulado */
      --text2: #7AABC6;
      /* azul-gelo — muito distinto de --text */
      --text3: #3F6178;
      /* ardósia escura — guia / placeholder */

      /* Accent — Teal vibrante no escuro */
      --accent: #26C6BA;
      --accent-light: #0A2826;
      --accent-text: #80DEDB;

      /* Warn — âmbar saturado */
      --warn: #FFB300;
      --warn-light: #261C00;

      /* Crit — coral néon */
      --crit: #EF5350;
      --crit-light: #2A0808;

      /* Purple — violeta suave para dark */
      --purple: #8C92F0;
      --purple-light: #1E2148;
      --purple-text: #C5C8FF;

      /* Header / Footer — petróleo com shimmer index */
      --header-bg: linear-gradient(135deg, #0E1820 0%, #122030 50%, #0E1620 100%);
      --footer-bg: linear-gradient(135deg, #0E1620 0%, #122030 50%, #0E1820 100%);
      --header-border: rgba(38, 198, 186, 0.15);

      /* Rows — cores de fundo inconfundíveis entre si */
      --row-off: #1E1200;
      /* âmbar-bordô quentinho */
      --row-off-border: #5C3800;
      --row-off-hover: #261800;

      --row-ok: #041E1C;
      /* teal-verde profundo */
      --row-ok-border: #0A4040;
      --row-ok-hover: #082422;

      --row-crit: #200608;
      /* vermelho-bordô saturado */
      --row-crit-border: #601010;
      --row-crit-hover: #2A0808;

      /* Filter badges vivos e distintos */
      --filter-ok-bg: #0A3030;
      --filter-ok-hover: #103C3A;
      --filter-warn-bg: #281A00;
      --filter-warn-hover: #342200;
      --filter-crit-bg: #300808;
      --filter-crit-hover: #3E1010;
    }

    /* Mobile Typography Adjustments */
    @media (max-width: 480px) {
      :root {
        --fs-xs: 12px;
        --fs-sm: 14px;
        --fs-base: 16px;
        --fs-md: 18px;
        --fs-lg: 20px;
        --fs-xl: 26px;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background var(--transition), color var(--transition);
    }

    #app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: var(--surface);
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 60px rgba(13, 27, 42, 0.12);
    }

    #title-link {
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      text-overflow: ellipsis;
    }

    #title-link:hover {
      cursor: pointer;
    }

    /* HEADER */
    #header {
      padding: 14px 16px 0;
      background: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
      position: -webkit-sticky;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    #header-top {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      justify-content: flex-end;
      flex-wrap: nowrap;
      /* linha única; botões não somem */
      min-width: 0;
      /* permite shrink interno */
      overflow: visible;
      align-items: flex-start;
    }

    #app-title {
      font-size: var(--fs-md);
      font-weight: 600;
      letter-spacing: -0.3px;
      display: flex;
      align-items: baseline;
      gap: 3px;
      flex-shrink: 1;
      /* pode encolher se necessário */
      min-width: 0;
      flex-wrap: wrap;
      /* timestamp quebra p/ 2ª linha se não couber */
    }

    /* "Shop List" — nome principal, opacidade plena */
    .title-main {
      opacity: 1;
    }

    /* "Semaphore" — sufixo do app, mais discreto */
    .title-suffix {
      opacity: 0.6;
      font-weight: 400;
    }

    /* Timestamp de dados — mais contrastado que antes */
    #app-title span#title-sub {
      color: inherit;
      font-weight: 500;
      font-size: var(--fs-xs);
      font-family: 'DM Mono', monospace;
      white-space: nowrap;
      opacity: 0.6;
      letter-spacing: 0.02em;
      margin-right: 4px;
    }

    /* Badge de localidade do sync (owner · shared · ⚠️ duplicate) */
    #sync-locality {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 20px;
      margin-left: 0px;
      vertical-align: middle;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: opacity var(--transition), transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    #sync-locality:active {
      transform: scale(0.90);
    }

    /* Badge de localidade — usa CSS vars do tema; dark mode automático via [data-theme="dark"] no :root */
    #sync-locality.loc-shared {
      background: var(--accent-light);
      border-color: var(--row-ok-border);
      color: var(--accent-text);
    }

    #sync-locality.loc-owner {
      background: var(--purple-light);
      border-color: var(--border2);
      color: var(--purple);
    }

    #sync-locality.loc-duplicate {
      background: var(--warn-light);
      border-color: var(--row-off-border);
      color: var(--warn);
    }

    /* ─── Grupo de controles na linha 1 (sort · traffic · search · close) ─── */
    .header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-left: auto;
      /* empurra para a direita sem flex:1 no título */
    }

    /* ─── Botão toggle 🚦 ───────────────────────────────────────────────── */
    #btn-traffic {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      transition: all var(--transition);
      flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(13, 27, 42, 0.06);
      -webkit-tap-highlight-color: transparent;
    }

    #btn-traffic:hover {
      background: var(--border);
    }

    #btn-traffic.active {
      background: var(--surface2);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0, 121, 107, 0.18);
    }

    /* ─── Segunda linha: filtros crit/warn/ok ────────────────────────────── */
    #filter-bar {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.22s ease, padding 0.22s ease;
      padding: 0;
    }

    #filter-bar.open {
      max-height: 56px;
      padding: 4px 0 10px;
    }

    .filter-badge-group {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    /* Divider vertical dentro do grupo de filtros */
    /* .filter-divider {
      width: 1px;
      height: 20px;
      background: var(--border2);
      flex-shrink: 0;
      margin: 0 2px;
    } */

    /* ── Botões de filtro: mesma base visual que .hbtn ── */
    .filter-btn {
      width: 40px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: var(--fs-sm);
      transition: all var(--transition);
      flex-shrink: 0;
      background: var(--surface2);
      color: var(--text2);
      box-shadow: 0 1px 3px rgba(13, 27, 42, 0.06);
      -webkit-tap-highlight-color: transparent;
    }

    .filter-btn:hover {
      background: var(--border);
      transform: scale(0.95);
    }

    /* Estado ativo: ring de foco accent (igual ao .hbtn.active) */
    .filter-btn[data-active="true"] {
      background: var(--surface2);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0, 121, 107, 0.18);
    }

    [data-theme="dark"] .filter-btn[data-active="true"] {
      box-shadow: 0 0 0 2px rgba(38, 198, 186, 0.18);
    }

    .filter-btn[data-active="true"]:hover {
      background: var(--border);
    }

    /* Fav filter button — agora no filter-badge-group como .filter-btn */
    /* Remove a versão antiga do search-wrap (search-fav-btn mantido para compatibilidade) */
    #search-fav-btn {
      display: none !important;
    }

    /* ── Ícone duplo do toggle 3 estados ──────────────────────────── */
    .fav-filter-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--fs-sm);
      position: relative;
      line-height: 1;
    }

    /* Estado default: exibe ⭐ e ✩ lado a lado compactados */
    .fav-filter-icon.fav-default .fav-star--on {
      opacity: 0.55;
      font-size: 11px;
    }

    .fav-filter-icon.fav-default .fav-star--off {
      opacity: 0.55;
      font-size: 11px;
    }

    /* Estado fav-on: só ⭐ visível, brilhante */
    .fav-filter-icon.fav-on .fav-star--on {
      opacity: 1;
      font-size: 16px;
    }

    .fav-filter-icon.fav-on .fav-star--off {
      display: none;
    }

    /* Estado fav-off: só ✩ visível com diagonal strike */
    .fav-filter-icon.fav-off .fav-star--on {
      display: none;
    }

    .fav-filter-icon.fav-off .fav-star--off {
      opacity: 0.9;
      font-size: 16px;
      position: relative;
    }

    .fav-filter-icon.fav-off .fav-star--off::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom right,
          transparent calc(50% - 0.8px),
          var(--text2) calc(50% - 0.8px),
          var(--text2) calc(50% + 0.8px),
          transparent calc(50% + 0.8px));
    }

    /* Borda accent quando fav-on ativo */
    #fav-filter-btn[data-state="fav-on"] {
      border-color: #F5C518;
      box-shadow: 0 0 0 2px rgba(245, 197, 24, 0.22);
      background: #FFF9E6;
    }

    [data-theme="dark"] #fav-filter-btn[data-state="fav-on"] {
      background: #2A2200;
      border-color: #F5C518;
      box-shadow: 0 0 0 2px rgba(245, 197, 24, 0.22);
    }

    /* Borda crit-suave quando fav-off ativo */
    #fav-filter-btn[data-state="fav-off"] {
      border-color: var(--border2);
      box-shadow: 0 0 0 2px rgba(100, 116, 139, 0.15);
      background: var(--surface2);
    }

    #search-fav-btn {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      color: var(--text3);
      background: none;
      border: none;
      border-radius: 7px;
      transition: color var(--transition), transform var(--transition);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      line-height: 1;
    }

    #search-fav-btn:active {
      transform: scale(0.82);
    }

    #search-fav-btn.on {
      color: #F5C518;
    }

    [data-theme="dark"] #search-fav-btn.on {
      color: #F5C518;
    }

    /* Req 3 — sec-label-count herda a cor de sec-label-text (accent) */
    .sec-label-count {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-light);
      border: 1px solid var(--row-ok-border);
      border-radius: 20px;
      padding: 1px 7px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    #btn-sort {
      width: 40px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text2);
      transition: all var(--transition);
      flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(13, 27, 42, 0.06);
    }

    #btn-sort:hover {
      background: var(--border);
    }

    #btn-sort.active {
      background: var(--purple-light);
      border-color: var(--purple);
      color: var(--purple);
      box-shadow: 0 0 0 2px rgba(63, 81, 181, 0.15);
    }

    #btn-sort.fav-active {
      background: var(--purple-light);
      border-color: var(--purple);
      color: var(--purple);
      box-shadow: 0 0 0 2px rgba(63, 81, 181, 0.15);
    }

    [data-theme="dark"] #btn-sort.active,
    [data-theme="dark"] #btn-sort.fav-active {
      background: var(--purple-light);
      border-color: var(--purple);
      color: var(--purple);
      box-shadow: 0 0 0 2px rgba(124, 131, 255, 0.18);
    }

    .right-buttons {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .hbtn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      color: var(--text2);
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
      flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(13, 27, 42, 0.06);
    }

    .hbtn:hover {
      background: var(--border);
      box-shadow: 0 2px 6px rgba(13, 27, 42, 0.10);
    }

    .hbtn.active {
      background: var(--purple-light);
      border-color: var(--purple);
      color: var(--purple);
      box-shadow: 0 0 0 2px rgba(63, 81, 181, 0.15);
    }

    /* SEARCH BAR */
    #search-bar {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.22s ease, padding 0.22s ease;
      padding: 0;
    }

    #search-bar.open {
      max-height: 96px;
      /* aumentado para acomodar chips de filtro */
      padding: 6px 0 10px;
      /* padding-top cria o espaço interno que evita o clip da borda */
    }

    #search-wrap {
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 0 12px;
      gap: 8px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    #search-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 121, 107, 0.12);
    }

    [data-theme="dark"] #search-wrap:focus-within {
      box-shadow: 0 0 0 3px rgba(38, 198, 186, 0.14);
    }

    #search-wrap svg {
      color: var(--text3);
      flex-shrink: 0;
    }

    #search-input {
      -webkit-flex: 1;
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: var(--fs-sm);
      /* iOS: impede zoom automático ao focar — font-size mínimo 16px no input */
      font-size: max(16px, var(--fs-sm));
      color: var(--text);
      padding: 10px 0;
      outline: none;
      /* Remove aparência nativa no Safari */
      -webkit-appearance: none;
      appearance: none;
    }

    #search-input::placeholder {
      color: var(--text3);
    }

    #search-clear {
      font-size: var(--fs-xs);
      color: var(--purple);
      font-weight: 500;
      cursor: pointer;
      padding: 4px;
    }

    /* TABS */
    #tabs {
      display: flex;
      gap: 0;
      padding-bottom: 0;
      border-top: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 11px 4px;
      font-size: var(--fs-base);
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      transition: color var(--transition), border-color var(--transition), background var(--transition);
      user-select: none;
      letter-spacing: 0.01em;
    }

    .tab:hover {
      color: var(--text2);
      background: var(--surface2);
    }

    .tab.active {
      color: var(--accent);
      border-bottom: 2.5px solid var(--accent);
      background: transparent;
    }

    .tab-badge {
      display: inline-block;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      background: var(--surface2);
      color: var(--text3);
      border-radius: 20px;
      padding: 1px 6px;
      margin-left: 3px;
      border: 1px solid var(--border);
    }

    .tab.active .tab-badge {
      background: var(--accent-light);
      color: var(--accent-text);
      border-color: var(--row-ok-border);
    }

    /* PANELS */
    #panels {
      -webkit-flex: 1;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      /* Evita flash de borda no Safari ao scrollar */
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    /* Painel de Estoque: contexto de scroll para stock-header sticky */
    #panel-1 {
      display: none;
      -webkit-flex-direction: column;
      flex-direction: column;
    }

    #panel-1.active {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
    }

    /* Remove aparência nativa do Safari em inputs de texto e número */
    input[type="text"],
    input[type="number"],
    input[type="search"] {
      -webkit-appearance: none;
      appearance: none;
      border-radius: 0;
    }

    /* EMPTY STATE */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;

    .item-cb {

    /* ===================== SWIPE ROW SYSTEM ===================== */
    .swipe-wrap {
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    .swipe-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    .swipe-bg-left {
      background: linear-gradient(90deg, var(--crit) 70%, transparent 100%);
      justify-content: flex-start;
      padding-left: 16px;
      color: #fff;
      font-size: 18px;
      opacity: 0;
      transition: opacity 0.12s ease;
      gap: 8px;
    }

    .swipe-bg-right {
      background: linear-gradient(270deg, var(--accent) 70%, transparent 100%);
      justify-content: flex-end;
      padding-right: 16px;
      color: #fff;
      font-size: 18px;
      opacity: 0;
      transition: opacity 0.12s ease;
      gap: 8px;
    }

    /*
     * Labels de swipe — vivem dentro do swipe-content (o elemento que se move).
     * São pills posicionados absolutamente nas margens internas da row,
     * colados nos extremos do padding (16px), abaixo dos elementos reais (z-index: 0).
     * Ficam escondidos sob o conteúdo da row enquanto não há arrasto suficiente;
     * à medida que o item desliza, a margem oposta fica exposta e o label aparece.
     *
     * Mapeamento:
     *   arrasto → direita  →  label-left  aparece na margem esquerda
     *   arrasto ← esquerda →  label-right aparece na margem direita
     */
    .swipe-label {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      white-space: nowrap;
      line-height: 1;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 0;
      /* abaixo do conteúdo real da row */
      /* pill com fundo para não vazar sobre texto quando parcialmente exposto */
      padding: 3px 7px;
      border-radius: 4px;
    }

    /* Label de swipe-direita: colado na margem esquerda do padding da row */
    .swipe-label-left {
      left: 4px;
      background: rgba(0, 0, 0, 0.18);
      color: rgba(255, 255, 255, 0.95);
    }

    /* Label de swipe-esquerda: colado na margem direita do padding da row */
    .swipe-label-right {
      right: 4px;
      background: rgba(0, 0, 0, 0.18);
      color: rgba(255, 255, 255, 0.95);
    }

    /* Ativação via classe no swipe-content:
       eleva o z-index do label acima dos elementos da row (z-index:1)
       apenas durante o arrasto ativo — no estado estático fica enterrado abaixo */
    .swipe-content.show-label-left .swipe-label-left {
      opacity: 1;
      z-index: 2;
    }

    .swipe-content.show-label-right .swipe-label-right {
      opacity: 1;
      z-index: 2;
    }

    .swipe-content {
      position: relative;
      z-index: 1;
      background: inherit;
      will-change: transform;
      transition: transform 0.22s cubic-bezier(0.25, 1, 0.5, 1);
      touch-action: pan-y;
    }

    .swipe-wrap.swiping .swipe-content {
      transition: none;
    }

    .swipe-wrap.snap-back .swipe-content {
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* ===================== FAVORITE BUTTON (ícone limpo) ===================== */
    .fav-btn {

    /* STEPPER */
    .stepper-wrap {
      width: 92px;

      gap: 3px;
    }

    /* Req 1 — Min stepper: oculto por padrão, revelado quando "current" ganha foco */
    .stepper-wrap.stepper-min-wrap {
      max-width: 0;
      width: 0;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: max-width 0.22s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.18s cubic-bezier(0.4, 0, 0.2, 1),
        width 0.22s cubic-bezier(0.4, 0, 0.2, 1);

      width: 92px;
      opacity: 1;
      pointer-events: auto;
    }

    .stepper {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--border);

      background: var(--surface);

      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;

      justify-content: center;
      padding: 20px;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
    }

    #overlay.open {
      display: -webkit-flex;
      display: flex;
    }

    .modal {
      background: var(--surface);
      border-radius: 20px;
      width: 100%;
      max-width: 360px;
      border: 1px solid var(--border);
      overflow: hidden;
      animation: slideUp 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 20px 60px rgba(13, 27, 42, 0.22);
    }

    [data-theme="dark"] .modal {
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    @keyframes slideUp {
      from {
        -webkit-transform: translateY(24px) scale(0.97);
        transform: translateY(24px) scale(0.97);
        opacity: 0;
      }

      to {
        -webkit-transform: translateY(0) scale(1);
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    @-webkit-keyframes slideUp {
      from {
        -webkit-transform: translateY(24px) scale(0.97);
        opacity: 0;
      }

      to {
        -webkit-transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    .modal-header {
      padding: 22px 22px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .modal-title {
      font-size: var(--fs-md);
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .modal-sub {
      font-size: var(--fs-xs);
      color: var(--text2);
      font-family: 'DM Mono', monospace;
      margin-top: 5px;
      line-height: 1.4;
    }

    .modal-body {
      padding: 16px 22px 20px;
    }

    .modal-label {
      font-size: var(--fs-sm);
      color: var(--text2);
      margin-bottom: 8px;
      display: block;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .modal-input-big {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      font-size: var(--fs-xl);
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      text-align: center;
      background: var(--surface2);
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .modal-input-big:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 121, 107, 0.12);
    }

    [data-theme="dark"] .modal-input-big:focus {
      box-shadow: 0 0 0 3px rgba(38, 198, 186, 0.14);
    }

    .modal-foot {
      display: flex;
      border-top: 1px solid var(--border);
    }

    .modal-btn {
      flex: 1;
      padding: 16px;
      text-align: center;
      font-size: var(--fs-sm);
      cursor: pointer;
      font-weight: 600;
      transition: background var(--transition);
    }

    .modal-btn:hover {
      background: var(--surface2);
    }

    .modal-btn.cancel {
      color: var(--text2);
      border-right: 1px solid var(--border);
    }

    .modal-btn.confirm {
      color: var(--accent);
    }

    .modal-btn.danger-btn {
      color: var(--crit);
    }

    /* CONFIG PANEL */
    .cfg-row {
      display: flex;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      gap: 14px;
      cursor: pointer;
    }

    .cfg-row:hover {
      background: var(--surface2);
    }

    .cfg-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .cfg-icon.exp {
      background: var(--accent-light);
      color: var(--accent);
    }

    .cfg-icon.imp {
      background: var(--purple-light);
      color: var(--purple);
    }

    .cfg-icon.cpy {
      background: var(--purple-light);
      color: var(--purple);
    }

    .cfg-icon.theme {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .cfg-text {
      flex: 1;
    }

    .cfg-title {
      font-size: var(--fs-base);
      font-weight: 500;
    }

    .cfg-desc {
      font-size: var(--fs-xs);
      color: var(--text2);
      margin-top: 2px;
    }

    .cfg-note {
      font-size: 10px;
      color: var(--text3);
      padding: 16px;
      font-family: 'DM Mono', monospace;
    }

    /* ── GOOGLE DRIVE SYNC ─────────────────────────────────────── */
    /* Botão no footer */
    #btn-drive {
      position: relative;
    }

    #btn-drive .drive-dot {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1.5px solid var(--surface);
      background: var(--text3);
      transition: background 0.2s;
    }

    #btn-drive.connected .drive-dot {
      background: var(--accent);
    }

    #btn-drive.syncing .drive-dot {
      background: var(--warn);
      animation: drive-pulse 0.9s ease-in-out infinite;
    }

    #btn-drive.error .drive-dot {
      background: var(--crit);
    }

    @keyframes drive-pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    /* Banner de sync — usa CSS vars do tema */
    #sync-banner {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--purple-light);
      border-bottom: 1px solid var(--border2);
      padding: 10px 16px;
      font-size: var(--fs-xs);
      color: var(--purple);
      font-weight: 500;
      font-family: 'DM Mono', monospace;
      cursor: default;
      transition: background var(--transition);
    }

    #sync-banner.visible {
      display: flex;
    }

    #sync-banner .banner-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    #sync-banner .banner-text {
      flex: 1;
    }

    #sync-banner .banner-close {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      color: var(--purple);
      cursor: pointer;
    }

    /* cfg-icon para Drive no modal de settings — usa CSS vars do tema */
    .cfg-icon.drive {
      background: var(--purple-light);
      color: var(--purple);
    }

    /* ── CHIPS DE CHECKBOX (search bar) ─────────────────────────────────────── */
    #search-chips {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 8px 0 4px;
    }

    #search-bar.open #search-chips {
      display: flex;
    }

    .sch-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: var(--fs-xs);
      font-weight: 600;
      font-family: 'DM Mono', monospace;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: background var(--transition), color var(--transition),
        border-color var(--transition);
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .sch-chip:active {
      transform: scale(0.92);
    }

    .sch-chip.active-checked {
      background: var(--accent-light);
      border-color: var(--row-ok-border);
      color: var(--accent);
    }

    .sch-chip.active-unchecked {
      background: var(--filter-warn-bg);
      border-color: var(--warn);
      color: var(--warn);
    }

    [data-theme="dark"] .sch-chip.active-checked {
      background: var(--filter-ok-bg);
      border-color: var(--row-ok-border);
    }

    [data-theme="dark"] .sch-chip.active-unchecked {
      background: var(--filter-warn-bg);
      border-color: var(--warn);
    }

    .sch-chip-label {
      font-size: 10px;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding-left: 2px;
      flex-shrink: 0;
    }

    /* chips só relevantes nas abas All e Refill — JS esconde na aba Stock */
    #search-chips.hidden {
      display: none !important;
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--text);
      color: var(--surface);
      font-size: var(--fs-sm);
      font-weight: 500;
      border-radius: 24px;
      padding: 11px 22px;
      opacity: 0;
      transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 300;
      white-space: nowrap;
      pointer-events: none;
      box-shadow: 0 8px 24px rgba(13, 27, 42, 0.22);
      letter-spacing: 0.01em;
    }

    [data-theme="dark"] #toast {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.40);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* BACKUP BANNER */
    #backup-banner {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--warn-light);
      border-bottom: 1px solid var(--row-off-border);
      padding: 10px 16px;
      font-size: var(--fs-xs);
      color: var(--warn);
      font-weight: 500;
      font-family: 'DM Mono', monospace;
      cursor: pointer;
      transition: background var(--transition);
    }

    #backup-banner.visible {
      display: flex;
    }

    #backup-banner:hover {
      background: var(--filter-warn-hover);
    }

    #backup-banner .banner-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    #backup-banner .banner-text {
      flex: 1;
    }

    #backup-banner .banner-close {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      color: var(--warn);
    }

    /* INSTALL BANNER (PWA) */
    #install-banner {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--accent-light);
      border-bottom: 1px solid var(--row-ok-border);
      padding: 10px 16px;
      font-size: var(--fs-xs);
      color: var(--accent);
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition);
    }

    #install-banner.visible {
      display: flex;
    }

    #install-banner:hover {
      background: var(--filter-ok-hover, #c8dfc9);
    }

    #install-banner .banner-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    #install-banner .banner-text {
      flex: 1;
      line-height: 1.4;
    }

    #install-banner .banner-text strong {
      display: block;
      font-size: var(--fs-sm);
      font-weight: 600;
      color: var(--accent);
    }

    #install-banner .install-cta {
      background: var(--accent);
      color: #fff;
      border-radius: 7px;
      padding: 5px 12px;
      font-size: var(--fs-xs);
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #install-banner .banner-close {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      color: var(--accent);
    }

    /* SW update banner */
    #update-banner {
      display: none;
      align-items: center;
      gap: 10px;
      background: #ECEDFF;
      border-bottom: 1px solid #C5C8F0;
      padding: 10px 16px;
      font-size: var(--fs-xs);
      color: var(--purple);
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition);
    }

    [data-theme="dark"] #update-banner {
      background: #181C42;
      border-color: #2A2E68;
    }

    #update-banner.visible {
      display: flex;
    }

    #update-banner .banner-text {
      flex: 1;
    }

    #update-banner .update-cta {
      background: var(--purple);
      color: #fff;
      border-radius: 7px;
      padding: 5px 12px;
      font-size: var(--fs-xs);
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* SHARE BUTTON (cfg-icon.share) */
    .cfg-icon.share {
      background: var(--filter-ok-bg);
      color: var(--accent);
    }

    /* AUTOCOMPLETE DROPDOWN */
    #ac-dropdown {
      position: fixed;
      background: var(--surface);
      border: 1.5px solid var(--accent);
      border-radius: 14px;
      box-shadow: 0 10px 32px rgba(13, 27, 42, 0.16);
      z-index: 9999;
      min-width: 160px;
      max-width: 320px;
      overflow: hidden;
      display: none;
      flex-direction: column;
      animation: acFadeIn 0.14s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] #ac-dropdown {
      box-shadow: 0 10px 32px rgba(0, 0, 0, 0.35);
    }

    #ac-dropdown.open {
      display: flex;
    }

    @keyframes acFadeIn {
      from {
        opacity: 0;
        transform: translateY(-6px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .ac-header {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 8px 12px 6px;
      border-bottom: 1px solid var(--border);
      background: var(--accent-light);
    }

    .ac-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      font-size: var(--fs-sm);
      font-family: 'DM Mono', monospace;
      color: var(--text);
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
      user-select: none;
    }

    .ac-item:last-child {
      border-bottom: none;
    }

    .ac-item:hover,
    .ac-item.focused {
      background: var(--accent-light);
      color: var(--accent-text);
    }

    .ac-item .ac-icon {
      font-size: 14px;
      flex-shrink: 0;
      width: 20px;
      text-align: center;
    }

    .ac-item .ac-label {
      font-weight: 600;
    }

    .ac-item .ac-match {
      color: var(--accent);
      font-weight: 700;
    }

    .ac-empty {
      padding: 10px 12px;
      font-size: var(--fs-xs);
      font-family: 'DM Mono', monospace;
      color: var(--text3);
      font-style: italic;
    }

    @media (min-width: 520px) {
      body {
        padding: 24px 0;
        background: linear-gradient(160deg, #D4E8ED 0%, #E8EEF5 50%, #D8E4F0 100%);
      }

      [data-theme="dark"] body {
        background: linear-gradient(160deg, #070E18 0%, #0B1520 50%, #070D18 100%);
      }

      #app {
        border-radius: 24px;
        min-height: auto;
        max-height: 90vh;
        box-shadow: 0 24px 80px rgba(13, 27, 42, 0.20);
      }

      [data-theme="dark"] #app {
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.50);
      }

      #panels {
        max-height: calc(90vh - 180px);
      }
    }

    /* Safari: stepper-val font-size para evitar zoom */
    .stepper-val {
      font-size: max(16px, var(--fs-sm));
    }

    /* ═══════════════════════════════════════════════════════════════
       DRIVE SYNC MODAL — classes extraídas do inline JS
       Nomenclatura: .ds- (DriveSync) para evitar colisões
       ═══════════════════════════════════════════════════════════════ */

    /* ── Card de pasta ──────────────────────────────────────────── */
    .ds-card {
      border-radius: 12px;
      border-width: 1.5px;
      border-style: solid;
      padding: 12px 14px;
      margin-bottom: 10px;
    }

    /* Paleta: pasta compartilhada (dono = outro usuário) */
    .ds-card--shared {
      background: var(--accent-light);
      border-color: var(--row-ok-border);
    }

    /* Paleta: pasta própria (owned by me) */
    .ds-card--owned {
      background: var(--purple-light);
      border-color: var(--border2);
    }

    /* Borda mais forte quando em uso */
    .ds-card--shared.ds-card--inuse {
      border-color: var(--accent);
    }

    .ds-card--owned.ds-card--inuse {
      border-color: var(--purple);
    }

    /* ── Header do card (ícone + nome + badges) ──────────────────── */
    .ds-card__head {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      /* permite truncamento no filho flex */
    }

    .ds-card__icon {
      font-size: 17px;
      line-height: 1;
      flex-shrink: 0;
    }

    .ds-card__name {
      font-size: var(--fs-sm);
      font-weight: 700;
      flex: 1;
      min-width: 0;
      /* habilita text-overflow no elemento */
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ds-card--shared .ds-card__name {
      color: var(--accent-text);
    }

    .ds-card--owned .ds-card__name {
      color: var(--purple-text);
    }

    /* ── Badge de tipo (Shared with you / Owned by you) ─────────── */
    .ds-card__type {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ds-card--shared .ds-card__type {
      background: var(--row-ok-border);
      color: var(--accent-text);
    }

    .ds-card--owned .ds-card__type {
      background: var(--border2);
      color: var(--purple-text);
    }

    /* ── Badge IN USE ─────────────────────────────────────────────── */
    .ds-card__inuse {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
      background: var(--surface);
      border-width: 1px;
      border-style: solid;
    }

    .ds-card--shared .ds-card__inuse {
      border-color: var(--accent);
      color: var(--accent-text);
    }

    .ds-card--owned .ds-card__inuse {
      border-color: var(--purple);
      color: var(--purple-text);
    }

    /* ── Linha de info de arquivos ────────────────────────────────── */
    .ds-card__files {
      font-size: var(--fs-xs);
      font-family: 'DM Mono', monospace;
      opacity: 0.72;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ds-card--shared .ds-card__files {
      color: var(--accent-text);
    }

    .ds-card--owned .ds-card__files {
      color: var(--purple-text);
    }

    /* ── Botões de ação (Use this folder / trash) ─────────────────── */
    .ds-card__actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .ds-card__btn {
      font-size: var(--fs-xs);
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 8px;
      border-width: 1.5px;
      border-style: solid;
      background: var(--surface);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity var(--transition);
    }

    .ds-card__btn:active {
      opacity: 0.7;
    }

    .ds-card--shared .ds-card__btn {
      border-color: var(--row-ok-border);
      color: var(--accent-text);
    }

    .ds-card--owned .ds-card__btn {
      border-color: var(--border2);
      color: var(--purple-text);
    }

    .ds-card__btn--trash {
      padding: 5px 9px;
    }

    /* ── Banner de duplicata ─────────────────────────────────────── */
    .ds-warn-banner {
      background: var(--warn-light);
      border: 1.5px solid var(--row-off-border);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .ds-warn-banner__icon {
      font-size: 17px;
      flex-shrink: 0;
    }

    .ds-warn-banner__text {
      font-size: var(--fs-xs);
      color: var(--warn);
      line-height: 1.5;
    }

    /* ── Painel de last-sync ─────────────────────────────────────── */
    .ds-sync-panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }

    .ds-sync-panel__label {
      font-size: var(--fs-xs);
      color: var(--text2);
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .ds-sync-panel__date {
      font-size: var(--fs-sm);
      font-weight: 600;
      color: var(--text);
    }

    .ds-sync-panel__file {
      font-size: var(--fs-xs);
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      word-break: break-all;
    }

    /* ── Nota de rodapé do modal ─────────────────────────────────── */
    .ds-note {
      font-size: var(--fs-xs);
      color: var(--text2);
      line-height: 1.6;
      margin-bottom: 4px;
    }

    /* ── Warning de configuração (CLIENT_ID) ─────────────────────── */
    .ds-config-warn {
      font-size: var(--fs-xs);
      color: var(--warn);
      background: var(--warn-light);
      border: 1px solid var(--row-off-border);

  <script>
    // ─── STUB DriveSync ────────────────────────────────────────────────────────
    // Declarado antes de qualquer outro código para que onclick inline no HTML
    // (btn-drive, sync-locality) nunca lance ReferenceError, mesmo que o módulo
    // DriveSync ainda não tenha sido parseado/executado.
    // Quando o módulo real é carregado, ele sobrescreve window.DriveSync
    // completamente — este stub é apenas um guarda de corrida.
    window.DriveSync = {
      _ready: false,
      _call(method, args) {
        if (this._ready) return;           // módulo real já assumiu
        const wait = () => {
          if (window.DriveSync && window.DriveSync._ready) {
            window.DriveSync[method](...args);
          } else {
            setTimeout(wait, 80);
          }
        };
        setTimeout(wait, 80);
      },
      openPanel() { this._call('openPanel', []); },
      connect() { this._call('connect', []); },
      disconnect() { this._call('disconnect', []); },
      manualSync() { this._call('manualSync', []); },
      resolveFolder(id) { this._call('resolveFolder', [id]); },
      trashFolder(id, u) { this._call('trashFolder', [id, u]); },
      pickSharedFolder() { this._call('pickSharedFolder', []); },
    };

    // ==================== ICONS CENTRALIZADOS ====================
    const ICONS = {
      check: `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,
      chevron: `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>`,
      search: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>`,
      edit: `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
      trash: `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
      plus: `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>`,
      settings: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>`,
      close: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>`,
      starOff: `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
      starOn: `<svg width="14" height="14" fill="currentColor" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
    };

    // ==================== CONSTANTES E VARIÁVEIS ====================
    const STORAGE_KEY = 'Shop_List_v20260529';
    const THEME_KEY = 'Shop_List_theme';
    const UI_KEY = 'Shop_List_ui';
    const BACKUP_THRESHOLD = 10; // alterações antes de sugerir backup
    let items = [];
    let currentTab = 0;
    let searchQuery = '';
    let checkFilter = '';         // '' | 'checked' | 'unchecked'
    let pendingDoneId = null;
    let changeCounter = 0;
    let bannerDismissed = false;
    let sortMode = 'az';          // 'az' | 'cat' | 'fav'
    let activeQuickFilter = '';   // '' | 'fav' | 'warn' | 'crit'

    // ==================== UTILITÁRIOS ====================
    function uid() {
      return 'id-' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36);
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), 2200);
    }

    // ==================== LOCALSTORAGE COM TRATAMENTO DE ERRO ====================
    // Fonte da verdade para o timestamp: sempre lida direto do localStorage via readSavedAt()
    function readSavedAt() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return (!Array.isArray(parsed) && parsed.savedAt) ? parsed.savedAt : null;
      } catch (_) { return null; }
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          // Suporte aos dois formatos: legado (array direto) e novo (objeto com .data)
          if (Array.isArray(parsed)) {
            items = parsed;
          } else if (parsed && Array.isArray(parsed.data)) {
            items = parsed.data;
          } else {
            throw new Error('Formato de dados desconhecido');
          }
        } else {
          // Primeiro uso — carrega modelo.
          // Identificação intrínseca: todos os IDs começam com MODEL_ID_PREFIX ('model-').
          // Nenhuma flag de payload necessária — isModelData() detecta pelo dado.
          items = defaultItems();
        }
      } catch (e) {
        console.error('Erro ao carregar dados do localStorage:', e);
        toast('Corrupted data. Starting with default values.');
        items = defaultItems();
        try { localStorage.removeItem(STORAGE_KEY); } catch (_) { }
      }

      // Carregar tema
      try {
        const savedTheme = localStorage.getItem(THEME_KEY) || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
      } catch (e) {
        console.warn('Erro ao carregar tema:', e);
      }

      // Carregar preferências de UI (sortMode, filtro ativo)
      try {
        const rawUI = localStorage.getItem(UI_KEY);
        if (rawUI) {
          const ui = JSON.parse(rawUI);
          if (['az', 'cat', 'fav'].includes(ui.sortMode)) sortMode = ui.sortMode;
          if (['', 'fav', 'fav-off', 'warn', 'crit'].includes(ui.activeQuickFilter)) activeQuickFilter = ui.activeQuickFilter;
        }
      } catch (e) {
        console.warn('Erro ao carregar preferências de UI:', e);
      }
    }

    // Formata o timestamp salvo de forma legível e calcula a idade da base
    function formatSavedAt(isoStr) {
      if (!isoStr) return { label: 'unknown date', age: '' };
      const d = new Date(isoStr);
      if (isNaN(d)) return { label: 'invalid date', age: '' };

      const now = new Date();
      const diffMs = now - d;
      const diffMin = Math.floor(diffMs / 60000);
      const diffH = Math.floor(diffMs / 3600000);
      const diffD = Math.floor(diffMs / 86400000);

      const pad = n => String(n).padStart(2, '0');
      const label = `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()}`
        + ` às ${pad(d.getHours())}:${pad(d.getMinutes())}`;

      let age;
      if (diffMin < 2) age = 'just now';
      else if (diffMin < 60) age = `${diffMin} minutes ago`;
      else if (diffH < 24) age = `${diffH} hour${diffH > 1 ? 's' : ''} ago`;
      else if (diffD === 1) age = 'yesterday';
      else if (diffD < 7) age = `${diffD} days ago`;
      else if (diffD < 30) age = `${Math.floor(diffD / 7)} week${Math.floor(diffD / 7) > 1 ? 's' : ''} ago`;
      else age = `${Math.floor(diffD / 30)} month(s) ago`;

      return { label, age };
    }

    function showStartupDialog() {
      // ATENÇÃO: esta função é estritamente read-only — nunca deve escrever no storage.
      // O savedAt exibido aqui é lido via readSavedAt() e não deve ser modificado aqui.
      const _startupTs = readSavedAt();
      if (!_startupTs && items !== defaultItems()) return; // base legada sem timestamp
      if (!_startupTs) return; // primeiro uso, sem dados prévios

      const { label, age } = formatSavedAt(_startupTs);
      const count = items.length;
      const inStock = items.filter(i => i.inStock).length;

      const diffD = Math.floor((new Date() - new Date(_startupTs)) / 86400000);
      const ageColor = diffD < 7 ? 'var(--accent)' : diffD < 30 ? 'var(--warn)' : 'var(--crit)';
      const ageIcon = diffD < 7 ? '🟢' : diffD < 30 ? '🟡' : '🔴';

      openModal(`
        <div class="modal-header">
          <div class="modal-title">Local database</div>
          <div class="modal-sub">Startup check</div>
        </div>
        <div class="modal-body">
          <div style="
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 4px;
          ">
            <div style="font-size:var(--fs-xs);color:var(--text2);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.06em">Last saved</div>
            <div style="font-size:var(--fs-md);font-weight:600;color:var(--text)">${label}</div>
            <div style="font-size:var(--fs-sm);color:${ageColor};font-weight:500">${ageIcon} ${age}</div>
          </div>
          <div style="
            display: flex;
            gap: 8px;
            margin-top: 10px;
          ">
            <div style="
              flex: 1;
              background: var(--surface2);
              border: 1px solid var(--border);
              border-radius: 8px;
              padding: 10px 12px;
              text-align: center;
            ">
              <div style="font-size:20px;font-weight:700;color:var(--text)">${count}</div>
              <div style="font-size:var(--fs-xs);color:var(--text2);font-family:'DM Mono',monospace">items</div>
            </div>
            <div style="
              flex: 1;
              background: var(--accent-light);
              border: 1px solid var(--row-ok-border);
              border-radius: 8px;
              padding: 10px 12px;
              text-align: center;
            ">
              <div style="font-size:20px;font-weight:700;color:var(--accent)">${inStock}</div>
              <div style="font-size:var(--fs-xs);color:var(--accent);font-family:'DM Mono',monospace">in stock</div>

    function save() {
      try {
        // Remove _done antes de persistir — é estado de sessão, não de dados
        const toSave = items.map(({ _done, ...rest }) => rest);
        const now = new Date().toISOString();
        const payload = { savedAt: now, data: toSave };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        changeCounter++;
        if (changeCounter >= BACKUP_THRESHOLD && !bannerDismissed) {
          document.getElementById('backup-banner').classList.add('visible');
        }
        // Atualiza o timestamp no badge imediatamente
        updateBadges();
      } catch (e) {
        console.error('Erro ao salvar no localStorage:', e);
        toast('Error saving data locally');
      }
    }

    function saveUI() {
      try {
        localStorage.setItem(UI_KEY, JSON.stringify({ sortMode, activeQuickFilter }));
      } catch (e) {
        console.warn('Erro ao salvar preferências de UI:', e);
      }
    }

    function exportDataFromBanner() {
      exportDataSilent();

    function exportDataSilent() {
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const ts = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}.${pad(now.getHours())}${pad(now.getMinutes())}`;
      const filename = `${ts}-Shop-List.json`;

      // Regrava no storage com savedAt = momento exato do export.
      // Isso garante que o arquivo baixado, o storage e o badge fiquem 100% sincronizados.
      const toSave = items.map(({ _done, ...rest }) => rest);
      const exportedAt = now.toISOString();
      const freshPayload = { savedAt: exportedAt, data: toSave };
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(freshPayload));
      } catch (_) { /* storage cheio: continua e exporta mesmo assim */ }

      const exportPayload = JSON.stringify(freshPayload, null, 2);

      const blob = new Blob([exportPayload], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);

      // Atualiza o badge com o savedAt recém-gravado
      updateBadges();
    }

    // Retorna true se o array de itens é inteiramente composto por dados modelo.
    // Função pura — não depende de flags, payload ou estado externo.
    // Desativa-se automaticamente quando o usuário adiciona qualquer item real
    // (uid() gera 'id-xxxxx', quebrando o every()).
    function isModelData(arr) {
      return Array.isArray(arr)
        && arr.length > 0
        && arr.every(i => typeof i.id === 'string' && i.id.startsWith(MODEL_ID_PREFIX));
    }

    // ==================== STATUS ====================
    function getStatus(item) {
      if (!item.inStock) return 'off';
      if (item.qty > item.min) return 'ok';
      if (item.qty === item.min) return 'warn';
      return 'crit';
    }

    function statusLabel(s) {
      if (s === 'ok') return '🟢';
      if (s === 'warn') return '🟡';
      if (s === 'crit') return '🔴';
      return '';
    }

    // ─── BUSCA SIMPLES ────────────────────────────────────────────────────────
    // Normaliza string: remove acentos e converte para minúsculas
    function norm(str) {
      return (str || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    }

    // Converte padrão com curinga (*) em RegExp
    // Exemplos: "A*" → /^a.*/i  |  "*leite" → /^.*leite/i  |  "pó*de" → /^pó.*de/i
    function wildcardToRegex(pattern) {
      const escaped = norm(pattern).replace(/[.+?^${}()|[\]\\]/g, '\\$&').replace(/\*/g, '.*');
      return new RegExp('^' + escaped + '$', 'i');
    }

    // Decide a estratégia de match e retorna true/false
    function simpleMatch(item, rawQuery) {
      const q = rawQuery.trim();
      if (!q) return true;

      const hasWildcard = q.includes('*');

      // ── Curinga de inicial: "A*" → filtra pelo grupo A-Z ──────────────────
      if (/^[a-záàãâéêíóôõúüç]\*$/i.test(norm(q))) {
        const letter = norm(q)[0];
        const itemLetter = norm(item.name[0] || '');
        return itemLetter === letter;
      }

      // ── Curinga livre: qualquer padrão com * ───────────────────────────────
      if (hasWildcard) {
        const rx = wildcardToRegex(q);
        return rx.test(norm(item.name)) || rx.test(norm(item.desc || ''));
      }

      // ── Busca por #categoria ───────────────────────────────────────────────
      if (q.startsWith('#')) {
        const tag = norm(q.slice(1));
        return norm(item.desc || '').includes(tag);
      }

      // ── Substring simples (case/accent insensitive) ────────────────────────
      const nq = norm(q);
      return norm(item.name).includes(nq) || norm(item.desc || '').includes(nq);
    }

    function filteredItems() {
      let result = [...items];

      // filtro rápido (🚦 / ⭐)
      if (activeQuickFilter === 'fav') {
        result = result.filter(it => it.fav);
      } else if (activeQuickFilter === 'fav-off') {
        result = result.filter(it => !it.fav);
      } else if (activeQuickFilter) {
        result = result.filter(it => getStatus(it) === activeQuickFilter);
      }

      // busca textual
      const q = searchQuery.trim();
      if (q) result = result.filter(it => simpleMatch(it, q));

      // filtro de checkbox — só aplicável na aba Refill (tab 2), onde _done existe
      if (currentTab === 2 && checkFilter === 'checked') result = result.filter(it => !!it._done);
      if (currentTab === 2 && checkFilter === 'unchecked') result = result.filter(it => !it._done);

      return result;
    }

    function toggleChipFilter(type) {
      checkFilter = checkFilter === type ? '' : type;
      syncChips();
      render();
    }

    function syncChips() {
      const chips = document.getElementById('search-chips');
      if (!chips) return;

      const cc = document.getElementById('chip-checked');
      const cu = document.getElementById('chip-unchecked');

      if (cc) cc.className = 'sch-chip' + (checkFilter === 'checked' ? ' active-checked' : '');
      if (cu) cu.className = 'sch-chip' + (checkFilter === 'unchecked' ? ' active-unchecked' : '');

      // Chips só relevantes na aba Refill (tab 2) — _done é estado de sessão exclusivo dela
      chips.classList.toggle('hidden', currentTab !== 2);
    }

    function stockItems() { return filteredItems().filter(it => it.inStock); }
    function buyItems() { return filteredItems().filter(it => it.inStock && (it.qty < it.min || it._done)); }

    // Extrai a primeira categoria (#tag) do campo desc de um item
    function getCategoryOf(it) {
      if (!it.desc) return '—';
      const m = it.desc.match(/#([^\s·,]+)/);
      return m ? m[1].toLowerCase() : '—';
    }

    // Ordena conforme o modo atual
    function sorted(arr) {
      const collator = new Intl.Collator('en', { sensitivity: 'base' });
      if (sortMode === 'az') {
        return [...arr].sort((a, b) => collator.compare(a.name, b.name));
      }
      if (sortMode === 'cat') {
        return [...arr].sort((a, b) => {
          const ca = getCategoryOf(a), cb = getCategoryOf(b);
          if (ca !== cb) return collator.compare(ca, cb);
          return collator.compare(a.name, b.name);
        });
      }
      // Modo fav: favoritos primeiro, depois A-Z dentro de cada grupo
      return [...arr].sort((a, b) => {
        const fa = a.fav ? 0 : 1, fb = b.fav ? 0 : 1;
        if (fa !== fb) return fa - fb;
        return collator.compare(a.name, b.name);
      });
    }

    // Retorna o "rótulo de seção" do item conforme o modo de ordenação
    function sectionKeyOf(it) {
      if (sortMode === 'az') {
        // Normalize to remove diacritics so accented chars group with their base letter
        const firstChar = it.name[0] || '';
        const normalized = firstChar.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase();
        return normalized || firstChar.toUpperCase();
      }
      if (sortMode === 'cat') {
        const cat = getCategoryOf(it);
        return cat === '—' ? '—' : '#' + cat;
      }
      // Modo fav: duas seções — favoritos e o resto
      return it.fav ? '★ Favorites' : '· Other items';
    }

    function toggleSortMode() {
      // Cicla entre os três estados
      if (sortMode === 'az') sortMode = 'cat';
      else if (sortMode === 'cat') sortMode = 'fav';
      else sortMode = 'az';

      const btn = document.getElementById('btn-sort');
      const icon = document.getElementById('sort-icon');

      btn.classList.remove('active', 'fav-active');

      if (sortMode === 'cat') {
        icon.innerHTML = '<span style="font-size:12px;font-family:\'DM Mono\',monospace;font-weight:700;letter-spacing:-0.5px">#·Z</span>';
        btn.classList.add('active');
        toast('Sorting by category');
      } else if (sortMode === 'fav') {
        // Ícone ★↕ — diferencia visualmente do filtro ⭐ no badge amarelo
        icon.innerHTML = '<span style="font-size:11px;font-family:\'DM Mono\',monospace;font-weight:700;letter-spacing:-1px">★↕</span>';
        btn.classList.add('fav-active');
        toast('Sorting by favorites');
      } else {
        icon.innerHTML = '<span style="font-size:12px;font-family:\'DM Mono\',monospace;font-weight:700;letter-spacing:-0.5px">A·Z</span>';
        toast('Sorting A–Z');
      }
      render();
      saveUI();
    }

    // ==================== SWIPE GESTURE ====================
    function attachSwipe(wrap, itemId) {
      const content = wrap.querySelector('.swipe-content');
      const bgLeft = wrap.querySelector('.swipe-bg-left');
      const bgRight = wrap.querySelector('.swipe-bg-right');

      const THRESHOLD = 72;   // px para confirmar ação
      const MAX_DRAG = 110;  // px máximo de arrasto visual

      let startX = 0, startY = 0, dx = 0;
      let dragging = false, dirLocked = false, isHorizontal = false;

      function onStart(e) {
        const t = e.touches ? e.touches[0] : e;
        startX = t.clientX;
        startY = t.clientY;
        dx = 0;
        dragging = true;
        dirLocked = false;
        isHorizontal = false;
        wrap.classList.add('swiping');
      }

      function onMove(e) {
        if (!dragging) return;
        const t = e.touches ? e.touches[0] : e;
        const curDx = t.clientX - startX;
        const curDy = t.clientY - startY;

        // Determina direção dominante na primeira oportunidade
        if (!dirLocked && (Math.abs(curDx) > 6 || Math.abs(curDy) > 6)) {
          dirLocked = true;
          isHorizontal = Math.abs(curDx) > Math.abs(curDy);
        }

        if (!isHorizontal) return; // scroll vertical — não interfere

        e.preventDefault(); // impede scroll enquanto arrasta na horizontal
        dx = Math.sign(curDx) * Math.min(Math.abs(curDx), MAX_DRAG);

        // Resistência suave próximo ao limite
        const ratio = Math.abs(dx) / MAX_DRAG;
        const visual = dx * (1 - 0.3 * ratio);

        content.style.transform = `translateX(${visual}px)`;

        // Intensidade dos backgrounds
        const intensity = Math.min(Math.abs(dx) / THRESHOLD, 1);
        bgLeft.style.opacity = dx < 0 ? intensity : 0;
        bgRight.style.opacity = dx > 0 ? intensity : 0;

        // Label aparece na extremidade oposta ao arrasto, a partir de 40% do threshold
        const LABEL_TRIGGER = THRESHOLD * 0.4;
        const pastTrigger = Math.abs(dx) >= LABEL_TRIGGER;
        content.classList.toggle('show-label-left', dx > 0 && pastTrigger); // arrasto direita → label borda esquerda
        content.classList.toggle('show-label-right', dx < 0 && pastTrigger); // arrasto esquerda → label borda direita
      }

      function onEnd() {
        if (!dragging) return;
        dragging = false;
        wrap.classList.remove('swiping');
        content.classList.remove('show-label-left', 'show-label-right');

        const confirmed = Math.abs(dx) >= THRESHOLD;

        if (confirmed) {
          // Flash do fundo e snap de volta
          content.style.transform = `translateX(${dx < 0 ? -MAX_DRAG : MAX_DRAG}px)`;
          wrap.classList.add('snap-back');

          setTimeout(() => {
            content.style.transform = '';
            bgLeft.style.opacity = 0;
            bgRight.style.opacity = 0;
            wrap.classList.remove('snap-back');

            if (dx < 0) {
              confirmDelete(itemId);  // swipe left → delete
            } else {
              toggleStock(itemId);    // swipe right → toggle stock
            }
          }, 180);
        } else {
          // Cancela — retorna suavemente
          content.style.transform = '';
          bgLeft.style.opacity = 0;
          bgRight.style.opacity = 0;
        }
      }

      // Touch
      content.addEventListener('touchstart', onStart, { passive: true });
      content.addEventListener('touchmove', onMove, { passive: false });
      content.addEventListener('touchend', onEnd);
      content.addEventListener('touchcancel', onEnd);

      // Mouse (desktop preview)
      content.addEventListener('mousedown', e => { onStart(e); });
      window.addEventListener('mousemove', e => { if (dragging) onMove(e); });
      window.addEventListener('mouseup', e => { if (dragging) onEnd(); });
    }

    // Swipe para aba Refill: right = toggle done, left = desmarcar (se done)
    function attachSwipeRefill(wrap, itemId) {
      const content = wrap.querySelector('.swipe-content');
      const bgLeft = wrap.querySelector('.swipe-bg-left');
      const bgRight = wrap.querySelector('.swipe-bg-right');

      const THRESHOLD = 68;
      const MAX_DRAG = 100;

      let startX = 0, startY = 0, dx = 0;
      let dragging = false, dirLocked = false, isHorizontal = false;

      function getItem() { return items.find(i => i.id === itemId); }

      function onStart(e) {
        const t = e.touches ? e.touches[0] : e;
        startX = t.clientX; startY = t.clientY;
        dx = 0; dragging = true; dirLocked = false; isHorizontal = false;
        wrap.classList.add('swiping');
      }

      function onMove(e) {
        if (!dragging) return;
        const t = e.touches ? e.touches[0] : e;
        const curDx = t.clientX - startX;
        const curDy = t.clientY - startY;
        if (!dirLocked && (Math.abs(curDx) > 6 || Math.abs(curDy) > 6)) {
          dirLocked = true;
          isHorizontal = Math.abs(curDx) > Math.abs(curDy);
        }
        if (!isHorizontal) return;
        e.preventDefault();
        dx = Math.sign(curDx) * Math.min(Math.abs(curDx), MAX_DRAG);
        const ratio = Math.abs(dx) / MAX_DRAG;
        const visual = dx * (1 - 0.3 * ratio);
        content.style.transform = `translateX(${visual}px)`;
        const intensity = Math.min(Math.abs(dx) / THRESHOLD, 1);
        // right → check; left → uncheck
        bgRight.style.opacity = dx > 0 ? intensity : 0;
        bgLeft.style.opacity = dx < 0 ? intensity : 0;

        // Label aparece na extremidade oposta ao arrasto, a partir de 40% do threshold
        const LABEL_TRIGGER = THRESHOLD * 0.4;
        const pastTrigger = Math.abs(dx) >= LABEL_TRIGGER;
        content.classList.toggle('show-label-left', dx > 0 && pastTrigger); // arrasto direita → label borda esquerda (Acquired)
        content.classList.toggle('show-label-right', dx < 0 && pastTrigger); // arrasto esquerda → label borda direita (Unmark)
      }

      function onEnd() {
        if (!dragging) return;
        dragging = false;
        wrap.classList.remove('swiping');
        content.classList.remove('show-label-left', 'show-label-right');
        const confirmed = Math.abs(dx) >= THRESHOLD;

        if (confirmed) {
          content.style.transform = `translateX(${dx < 0 ? -MAX_DRAG : MAX_DRAG}px)`;
          wrap.classList.add('snap-back');
          setTimeout(() => {
            content.style.transform = '';
            bgLeft.style.opacity = 0;
            bgRight.style.opacity = 0;
            wrap.classList.remove('snap-back');

            const it = getItem();
            if (!it) return;

            if (dx > 0) {
              // Swipe right: abre modal "units acquired" (mesmo fluxo do toque no checkbox)
              toggleDone(it.id);
            } else {
              // Swipe left: desmarcar
              if (it._done) {
                it._done = false;
                save();
                const row = content;
                row.classList.remove('done');
                const cb = row.querySelector('.buy-cb');
                if (cb) { cb.classList.remove('on'); cb.innerHTML = ''; }
                const nameEl = row.querySelector('.item-name');
                if (nameEl) nameEl.style.textDecoration = '';
                toast('↩ Unmarked');
              }
            }
          }, 180);
        } else {
          content.style.transform = '';
          bgLeft.style.opacity = 0;
          bgRight.style.opacity = 0;
        }
      }

      content.addEventListener('touchstart', onStart, { passive: true });
      content.addEventListener('touchmove', onMove, { passive: false });
      content.addEventListener('touchend', onEnd);
      content.addEventListener('touchcancel', onEnd);
      content.addEventListener('mousedown', e => onStart(e));
      window.addEventListener('mousemove', e => { if (dragging) onMove(e); });
      window.addEventListener('mouseup', e => { if (dragging) onEnd(); });
    }

    // ==================== RENDERIZAÇÃO COM DOCUMENTFRAGMENT ====================
    function createElement(tag, className = '', innerHTML = '') {
      const el = document.createElement(tag);
      if (className) el.className = className;
      if (innerHTML) el.innerHTML = innerHTML;
      return el;
    }

    function renderPanel0() {
      const container = document.getElementById('panel-0');
      container.innerHTML = '';

      const list = sorted(filteredItems());
      if (!list.length) {
        const hasFilter = searchQuery || activeQuickFilter;
        container.innerHTML = hasFilter
          ? emptyState('🔍', 'No results', 'Try different terms or remove the active filter')
          : emptyState('🛒', 'Empty list', 'Add the first item using the button below', '+ Add item', 'openAddModal()');
        return;
      }

      const fragment = document.createDocumentFragment();

      // ── sec-label de busca textual ─────────────────────────────────────────
      if (searchQuery.trim()) {
        const q = searchQuery.trim();
        const label = createElement('div', 'sec-label sec-search');
        label.innerHTML = `
          <span class="sec-label-text" style="text-transform:none;letter-spacing:0.04em">
            🔍 "${esc(q)}"
          </span>
          <span class="sec-label-count">${list.length}</span>
          <div class="sec-menu-btn" title="Actions for this search" onclick="openSearchSectionMenu(this,'${esc(q).replace(/'/g, "\\'")}',${list.length})">···</div>
        `;
        fragment.appendChild(label);
      }

      // ── sec-labels por modo de ordenação ──────────────────────────────────
      let lastSection = '';
      // Pré-computa contagem por seção
      const sectionCounts = {};
      for (const it of list) {
        const k = sectionKeyOf(it);
        sectionCounts[k] = (sectionCounts[k] || 0) + 1;
      }

      for (const it of list) {
        const section = sectionKeyOf(it);

        // Emite sec-label somente quando a seção muda
        // (suprimido se já emitimos o search-label acima e não há agrupamento real)
        if (section !== lastSection && !searchQuery.trim()) {
          const isCat = sortMode === 'cat';
          const rawCat = isCat ? getCategoryOf(it) : null; // null para A-Z e fav

          const label = createElement('div', 'sec-label');

          let menuOnclick = '';
          if (isCat && rawCat && rawCat !== '—') {

        // Fav

      const container = document.getElementById('panel-1');
      container.innerHTML = '';

      const list = sorted(stockItems());
